<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDAD FINANCE 2026</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111110;--ink2:#3A3A38;--ink3:#6B6B68;--ink4:#9A9A96;
  --paper:#EDE7D5;--paper-card:#FAF8F2;--paper2:#F0EFE9;--paper3:#E2E1DB;--card-border:#C9C5B5;
  --y:#F6C31C;--yd:#D9AB0E;--yl:rgba(246,195,28,.15);
  --re:#B91C1C;--rl:rgba(185,28,28,.07);
  --gr:#166534;--gl:rgba(22,101,52,.07);
  --am:#92400E;--al:rgba(146,64,14,.08);
  --bl:#1E40AF;--bll:rgba(30,64,175,.07);
  --sans:'Noto Sans TC',-apple-system,sans-serif;
  --r3:3px;--r5:5px;--r8:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}

/* ── SPLASH ─── */
#splash{position:fixed;inset:0;background:var(--ink);display:grid;place-items:center;z-index:9999;transition:opacity .35s ease;}
#splash.out{opacity:0;pointer-events:none;}
.sp-brand{font-size:10px;letter-spacing:.18em;color:rgba(246,195,28,.6);text-transform:uppercase;margin-bottom:10px;}
.sp-logo{font-size:36px;font-weight:700;color:#fff;letter-spacing:-.03em;}
.sp-logo span{color:var(--y);}
.sp-bar{width:100px;height:2px;background:rgba(255,255,255,.08);margin:18px auto 0;border-radius:1px;overflow:hidden;}
.sp-fill{height:100%;background:var(--y);animation:sfill 1.4s cubic-bezier(.25,.1,.25,1) forwards;}
@keyframes sfill{0%{width:0%}100%{width:100%}}

/* ── LAYOUT ─── */
.app{display:none;min-height:100vh;}
.app.on{display:flex;}
.is-admin .adm-only{display:flex!important;}
.is-admin .adm-section{display:block!important;}
.adm-only{display:none;}
.adm-section{display:none;}

/* ── SIDEBAR ─── */
aside{width:200px;background:var(--ink);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-top{padding:16px 15px 13px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-brand{font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:5px;}
.sb-nm{font-size:14px;font-weight:700;color:#fff;}
.sb-sub{font-size:9px;color:var(--y);letter-spacing:.06em;margin-top:1px;}
.sb-user{margin-top:10px;display:flex;align-items:center;gap:8px;}
.av{width:26px;height:26px;border-radius:50%;background:var(--y);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;}
.un{font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rb{display:inline-block;font-size:9px;padding:1px 7px;border-radius:2px;margin-top:5px;font-weight:700;letter-spacing:.04em;}
.rb.adm{background:var(--y);color:var(--ink);}
.rb.stf{background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);}
.sb-nav{flex:1;padding:6px 0;}
.ns{padding:11px 15px 3px;font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.22);text-transform:uppercase;}
.ni{display:flex;align-items:center;gap:7px;padding:7px 15px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;border-left:2px solid transparent;transition:all .1s;}
.ni:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04);}
.ni.on{color:#fff;border-left-color:var(--y);background:rgba(246,195,28,.08);}
.ni .d{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0;}
.ni.on .d{background:var(--y);opacity:1;}
.ni .bd{margin-left:auto;background:var(--re);color:#fff;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;}
.sb-ft{padding:12px 15px;border-top:1px solid rgba(255,255,255,.07);}
.lo-btn{display:block;width:100%;padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r3);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s;text-align:left;}
.lo-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}

/* ── TOPBAR ─── */
.topbar{background:var(--paper);border-bottom:1px solid var(--paper3);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--paper3);}
.tb-l{display:flex;align-items:center;gap:10px;}
.tg{font-size:9px;letter-spacing:.1em;font-weight:700;background:var(--y);color:var(--ink);padding:3px 8px;border-radius:var(--r3);}
.tb-title{font-size:15px;font-weight:700;}
.tb-sub{font-size:12px;color:var(--ink4);}
.tb-r{display:flex;gap:6px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r5);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .1s;font-family:inherit;line-height:1.4;}
.btn-y{background:var(--y);color:var(--ink);border-color:var(--yd);font-weight:700;}
.btn-del{background:transparent;color:#B91C1C;border-color:#FCA5A5;}
.btn-del:hover{background:#FEE2E2;color:#7F1D1D;}
.btn-y:hover{background:var(--yd);}
.btn-o{background:transparent;color:var(--ink3);border-color:var(--paper3);}
.btn-o:hover{background:var(--paper2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{background:transparent;color:var(--re);border-color:rgba(185,28,28,.3);}
.btn-danger:hover{background:var(--rl);}

/* ── CONTENT ─── */
.ct{padding:20px 22px;flex:1;overflow-y:auto;}
.ct-inner{max-width:1080px;margin:0 auto;}
.ld{padding:70px;text-align:center;color:var(--ink4);}

/* ── 2-COL GRID（同畫面兩個 block 並排） ─── */
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start;margin-bottom:14px;}
.grid2 > *{margin-bottom:0;min-width:0;}
.col-full{grid-column:1/-1;}
@media (max-width:980px){.grid2{grid-template-columns:1fr;}}
.ring{width:24px;height:24px;border:2px solid var(--paper3);border-top-color:var(--y);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── ALERTS ─── */
.al{display:flex;align-items:center;gap:8px;border-left:3px solid;padding:9px 13px;border-radius:0 var(--r5) var(--r5) 0;margin-bottom:12px;font-size:13px;font-weight:500;}
.al.re{background:var(--rl);border-color:var(--re);color:var(--re);}
.al.am{background:var(--al);border-color:var(--am);color:var(--am);}
.al.bl{background:var(--bll);border-color:var(--bl);color:var(--bl);}
.al.gr{background:var(--gl);border-color:var(--gr);color:var(--gr);}

/* ── KPI ─── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.kpi-row.cols3{grid-template-columns:repeat(3,1fr);}
.kpi-row.cols2{grid-template-columns:repeat(2,1fr);}
.kc{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r8);padding:14px 16px;}
.kc.yl{background:var(--y);border-color:var(--yd);}
.kl{font-size:10px;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;font-weight:600;margin-bottom:5px;}
.kc.yl .kl{color:rgba(17,17,16,.5);}
.kv{font-size:22px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1;letter-spacing:-.02em;}
.ks{font-size:12px;color:var(--ink4);margin-top:3px;}
.kc.yl .kv,.kc.yl .ks{color:var(--ink);}
.kc.re .kv{color:var(--re);}
.kc.gr .kv{color:var(--gr);}

/* ── PROGRESS ─── */
.prog{height:4px;background:var(--paper3);border-radius:2px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:2px;}
.fill-y{background:var(--y);}
.fill-am{background:#F59E0B;}
.fill-re{background:var(--re);}
.fill-gr{background:#16A34A;}

/* ── BULK DELETE ─── */
.bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:var(--r5);display:none;align-items:center;justify-content:space-between;gap:24px;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:100;}
.bulk-bar.on{display:flex;}
.bulk-cnt{font-size:14px;font-weight:600;}
.bulk-actions{display:flex;gap:8px;}
.bulk-clear{background:transparent;color:#bbb;border:1px solid #555;padding:7px 12px;border-radius:var(--r3);cursor:pointer;font-size:12px;}
.bulk-clear:hover{color:#fff;border-color:#888;}
.bulk-del{background:#B91C1C;color:#fff;border:none;padding:8px 16px;border-radius:var(--r3);cursor:pointer;font-size:13px;font-weight:700;}
.bulk-del:hover{background:#991414;}
.bulk-del:disabled{opacity:.6;cursor:wait;}
.row-cb{cursor:pointer;width:16px;height:16px;}
.cb-cell{text-align:center;cursor:default;}
.is-admin table.pay-table th.cb-th,.is-admin table.pay-table td.cb-cell,
table.pay-table th.cb-th,table.pay-table td.cb-cell{width:36px;text-align:center;padding-left:8px;padding-right:8px;}
table.pay-table th.cb-th input{cursor:pointer;}

/* ── CARD ─── */
.card{background:var(--paper-card);border:1.5px solid var(--card-border);border-radius:var(--r8);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 6px rgba(45,41,38,.06),0 1px 2px rgba(45,41,38,.04);transition:box-shadow .2s;}
.card:hover{box-shadow:0 4px 12px rgba(45,41,38,.08);}
.ch{padding:14px 18px;border-bottom:2px solid #1a1816;display:flex;align-items:center;justify-content:space-between;background:#2D2926;color:#FAF8F2;}
.ch h3{font-size:16px;font-weight:700;color:#FAF8F2;letter-spacing:-.015em;}
.ch .meta{font-size:12px;color:#C9C5B5;font-weight:500;}
.ch button.btn{color:var(--ink);}

/* 區段大標：更明顯的視覺層次（用於頁面分區，如「每月固定應付清單」） */
.sl{display:flex;align-items:center;gap:10px;margin:28px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--ink);}
.sl::before{content:'';width:4px;height:16px;background:var(--y);border-radius:2px;flex-shrink:0;}
.sl h4{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
.sl .sm{font-size:12px;color:var(--ink3);font-weight:500;margin-left:auto;}

/* ── COST STRUCTURE（清單式，適合窄欄） ─── */
.cost-list{padding:4px 0;}
.cost-list .ci{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;border-bottom:1px solid var(--paper2);}
.cost-list .ci:last-child{border-bottom:none;}
.cost-list .ci.total{background:linear-gradient(90deg,rgba(255,201,25,.12),rgba(255,201,25,.04));border-bottom:1px solid var(--yd);font-weight:700;}
.cost-list .ci-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cost-list .ci-nm{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;}
.cost-list .ci-ds{font-size:11px;color:var(--ink4);line-height:1.3;margin-top:2px;}
.cost-list .ci-right{display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.cost-list .ci-am{font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.cost-list .ci.total .ci-am{font-size:19px;}
.cost-list .ci-pct{font-size:11px;color:var(--ink4);font-variant-numeric:tabular-nums;min-width:42px;text-align:right;}

/* ── TABLES ─── */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink2);background:#E8E4D5;border-bottom:2px solid #8C8676;white-space:nowrap;}
td{padding:9px 12px;font-size:14px;border-bottom:1px solid var(--paper2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(246,195,28,.04);}
tr.rod td{background:rgba(185,28,28,.12)!important;border-bottom:1px solid rgba(185,28,28,.25);}
tr.rod td:first-child{border-left:3px solid var(--re);}
tr.rds td{background:rgba(146,64,14,.04);}
td.num{font-variant-numeric:tabular-nums;font-weight:600;text-align:right;white-space:nowrap;}
td.dt{font-size:12px;color:var(--ink4);white-space:nowrap;}
tfoot td{font-weight:700;background:var(--paper2)!important;font-size:14px;border-top:2px solid var(--paper3)!important;}

/* 付款記錄表格：固定欄寬 + 條紋背景（zebra stripe） */
table.pay-table{table-layout:fixed;}
table.pay-table tbody tr:nth-child(even) td{background:rgba(255,201,25,.08);}
table.pay-table tbody tr:hover td{background:rgba(255,201,25,.16)!important;}
table.pay-table th:nth-child(1),table.pay-table td:nth-child(1){width:108px;}  /* 日期：YYYY/MM/DD */
table.pay-table th:nth-child(2),table.pay-table td:nth-child(2){width:108px;}  /* 類別 */
table.pay-table th:nth-child(3),table.pay-table td:nth-child(3){width:120px;}  /* 廠商 */
table.pay-table th:nth-child(4),table.pay-table td:nth-child(4){width:auto;}    /* 說明：吃剩餘空間 */
table.pay-table th:nth-child(5),table.pay-table td:nth-child(5){width:90px;}    /* 金額 */
table.pay-table th:nth-child(6),table.pay-table td:nth-child(6){width:62px;}    /* 付款人 */
table.pay-table th:nth-child(7),table.pay-table td:nth-child(7){width:84px;}    /* 截止日 */
table.pay-table th:nth-child(8),table.pay-table td:nth-child(8){width:108px;}   /* 狀態 */
table.pay-table th:nth-child(9),table.pay-table td:nth-child(9){width:60px;}    /* 報價單 */
table.pay-table th:nth-child(10),table.pay-table td:nth-child(10){width:60px;}  /* 證明 */
table.pay-table th:nth-child(11),table.pay-table td:nth-child(11){width:42px;}  /* 編輯 */
table.pay-table td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Row 編輯按鈕（hover 顯示） */
/* 編輯按鈕（永久可見） */
.row-edit{background:var(--paper2);border:1px solid var(--paper3);cursor:pointer;padding:3px 7px;color:var(--ink2);font-size:13px;border-radius:var(--r3);transition:all .15s;}
.row-edit:hover{background:var(--y);border-color:var(--yd);color:var(--ink);}

/* 付款記錄整列：admin 模式可點擊編輯 */
.is-admin table.pay-table tbody tr{cursor:pointer;}
.is-admin .rr-row{cursor:pointer;}
.lk a,.row-edit{cursor:pointer;}

/* ── CHIPS ─── */
.chip{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:2px;font-weight:600;}
.chip.pd{background:var(--gl);color:var(--gr);}
.chip.pn{background:var(--yl);color:var(--am);}
.chip.qt{background:var(--paper2);color:var(--ink4);}
.chip.rc{background:var(--gl);color:var(--gr);}
.chip.pr{background:var(--yl);color:var(--am);}
.chip.od{background:var(--rl);color:var(--re);}
.ss{appearance:none;border:none;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:2px;outline:none;font-family:inherit;font-weight:600;}
.ss.pd{background:var(--gl);color:var(--gr);}
.ss.pn{background:var(--yl);color:var(--am);}
.ss.qt{background:var(--paper2);color:var(--ink4);}
.due{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:2px;font-weight:500;}
.due.od{background:var(--rl);color:var(--re);}
.due.ds{background:var(--al);color:var(--am);}
.due.ok{color:var(--ink4);}
.due.em{color:var(--paper3);}
.payer{font-size:11px;padding:1px 6px;border-radius:2px;font-weight:600;}
.py-co{background:var(--paper2);color:var(--ink4);}
.py-bo{background:var(--yl);color:var(--am);}
.lk a{color:var(--ink);font-size:12px;text-decoration:none;border-bottom:1px solid var(--y);}
.lk a:hover{border-bottom-color:var(--ink);}

/* ── FILTERS ─── */
.fr{display:flex;gap:5px;padding:9px 13px;border-bottom:1px solid var(--paper3);background:var(--paper2);flex-wrap:wrap;}
.fc{padding:3px 10px;border-radius:var(--r3);font-size:11px;cursor:pointer;border:1px solid var(--paper3);background:var(--paper);color:var(--ink4);transition:all .1s;font-weight:500;}
.fc:hover{border-color:var(--ink);color:var(--ink);}
.fc.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.fc.fc-red{border-color:var(--re);color:var(--re);}
.fc.fc-red.on{background:var(--re);color:#fff;}

/* ── BUDGET ROWS ─── */
.br-head,.br-row{display:grid;grid-template-columns:minmax(180px,300px) 88px 88px 88px 100px 70px;align-items:center;gap:14px;padding:9px 16px;border-bottom:1px solid var(--paper2);justify-content:start;}
.br-row:hover{background:rgba(246,195,28,.04);}
.br-nm{font-size:14px;font-weight:500;color:var(--ink2);display:flex;align-items:center;gap:8px;min-width:0;}
.br-nm-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.br-edit-btn{background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--ink4);font-size:12px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.br-row:hover .br-edit-btn{opacity:1;}
.br-edit-btn:hover{color:var(--ink);}
.br-num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;}
.br-num.pos{color:var(--gr);}
.br-num.neg{color:var(--re);}
.br-head{background:#E8E4D5;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink2);padding-top:11px;padding-bottom:11px;border-bottom:2px solid #8C8676;}
.br-row:last-child{border-bottom:none;}
.br-edit{display:flex;gap:4px;}

/* ── GROUP HEADERS（可摺疊分組） ─── */
.rr-group-head{display:flex;align-items:center;gap:10px;padding:11px 16px;background:#C9C5B5;border-bottom:1px solid #6B6553;cursor:pointer;user-select:none;transition:background .15s;}
.rr-group-head:hover{background:#B8B4A4;}
.rr-group-head.collapsed{background:#D4D0C0;border-bottom:1px solid #A8A290;}
.rr-gh-arrow{font-size:10px;color:var(--ink3);width:14px;display:inline-block;}
.rr-gh-icon{font-size:14px;}
.rr-gh-name{font-size:14px;font-weight:700;color:var(--ink);}
.rr-gh-count{font-size:11px;color:var(--ink4);background:var(--paper);padding:2px 8px;border-radius:10px;font-weight:600;}
.rr-gh-total{margin-left:auto;font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--ink);}

/* ── RECEIPT ROWS ─── */
.rr-head,.rr-row{display:grid;grid-template-columns:1fr 110px 110px 110px 90px 60px 40px;align-items:center;gap:14px;padding:11px 16px;border-bottom:1px solid var(--paper2);}
.rr-head{background:#E8E4D5;font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink2);padding-top:11px;padding-bottom:11px;border-bottom:2px solid #8C8676;}
/* 客戶收款進度 zebra stripe（加深反差） */
.rr-row:nth-child(even){background:rgba(255,201,25,.08);}
.rr-row:last-child{border-bottom:none;}
.rr-row:hover{background:rgba(255,201,25,.16);}

/* 預算追蹤 zebra stripe（加深反差） */
.br-row:nth-child(even){background:rgba(255,201,25,.08);}
.br-row:hover{background:rgba(255,201,25,.16);}

/* ── FIXED COST GROUPS ─── */
.fg-head{display:flex;align-items:center;gap:10px;padding:13px 16px;background:#2D2926;color:#FAF8F2;border-bottom:2px solid #1a1816;}
.fg-head .fg-name,.fg-head h3,.fg-head span{color:#FAF8F2;}
.fg-head .fg-amt{color:#FFC919;}
.fg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px var(--paper);}
.fg-nm{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.01em;}
.fg-pct{font-size:11px;color:var(--ink4);background:var(--paper2);padding:2px 8px;border-radius:10px;font-weight:600;}
.fg-total{margin-left:auto;font-size:16px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}

.fg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 16px;border-bottom:1px solid var(--paper2);}
.fg-item:last-child{border-bottom:none;}
.fg-item:nth-child(even){background:rgba(255,201,25,.07);}
.fg-item:hover{background:rgba(255,201,25,.16);}
.fi-nm{font-size:14px;font-weight:600;color:var(--ink);}
.fi-am{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;letter-spacing:-.01em;flex-shrink:0;color:var(--ink);}
.fi-ds{font-size:12px;color:var(--ink4);line-height:1.4;margin-top:3px;}
.fi-cat-head{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}

/* ── BE (BREAK EVEN) ─── */
.be-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
.be-item{padding:12px 14px;background:var(--paper2);border-radius:var(--r5);border:1px solid var(--paper3);}
.be-nm{font-size:12px;color:var(--ink3);margin-bottom:4px;}
.be-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.be-ds{font-size:11px;color:var(--ink4);margin-top:2px;}

/* ── REMINDER ─── */
.rm-item{display:grid;grid-template-columns:100px 1fr 110px 90px 90px;align-items:center;gap:12px;padding:11px 14px;background:var(--paper2);border-radius:var(--r5);border:1px solid var(--paper3);border-left:3px solid var(--paper3);margin-bottom:7px;}
.rm-item.urg{border-left-color:var(--re);}
.rm-item.soon{border-left-color:#F59E0B;}
.rm-proj{font-size:11px;color:var(--ink4);}
.rm-nm{font-size:13px;font-weight:600;}
.rm-ds{font-size:11px;color:var(--ink4);}
.rm-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;}
.rm-due{font-size:12px;color:var(--ink4);}

/* ── VENDOR ─── */
.vd-row{display:grid;grid-template-columns:minmax(120px,160px) minmax(160px,1fr) 90px 90px 90px;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--paper2);}
.vd-row.hd{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.vd-row:last-child{border-bottom:none;}
.vd-row:hover{background:rgba(246,195,28,.03);}
.vd-nm{font-size:13px;font-weight:600;}
.vd-tags{display:flex;gap:4px;flex-wrap:wrap;}
.vd-tag{font-size:10px;padding:1px 5px;border-radius:2px;background:var(--paper3);color:var(--ink3);}

/* ── ADVANCES ─── */
.adv-row{display:grid;grid-template-columns:80px minmax(100px,140px) minmax(160px,1fr) 90px 80px 90px 80px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--paper2);}
.adv-row.hd{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}

/* ── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(17,17,16,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s;}
.ov.on{opacity:1;pointer-events:all;}
.md{background:var(--paper);border-radius:var(--r8);width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;transform:translateY(8px);transition:transform .15s;border-top:3px solid var(--y);}
.ov.on .md{transform:translateY(0);}
.md-sm .md{width:420px;}
.mh{padding:15px 18px;border-bottom:1px solid var(--paper3);display:flex;align-items:center;justify-content:space-between;}
.mh h3{font-size:15px;font-weight:700;}
.mx{cursor:pointer;font-size:20px;color:var(--ink4);}
.mb{padding:18px;}
.mf{padding:12px 18px;border-top:1px solid var(--paper3);display:flex;justify-content:flex-end;gap:6px;background:var(--paper2);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fp{display:flex;flex-direction:column;gap:5px;}
.fp.full{grid-column:1/-1;}
.fl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.fi{padding:8px 11px;border:1px solid var(--paper3);border-radius:var(--r5);font-size:13px;color:var(--ink);background:var(--paper);outline:none;font-family:inherit;transition:border-color .1s;}
.fi:focus{border-color:var(--y);box-shadow:0 0 0 2px rgba(246,195,28,.12);}

/* ── INLINE EDIT ─── */
.ie-input{padding:4px 8px;border:1px solid var(--y);border-radius:var(--r3);font-size:13px;font-family:inherit;outline:none;background:var(--paper);width:100%;}
.ie-actions{display:flex;gap:4px;margin-top:4px;}
.ie-save{padding:3px 9px;background:var(--y);color:var(--ink);border:none;border-radius:var(--r3);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.ie-cancel{padding:3px 9px;background:transparent;color:var(--ink4);border:1px solid var(--paper3);border-radius:var(--r3);font-size:12px;cursor:pointer;font-family:inherit;}

/* ── TOAST ─── */
.ts{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:14px 22px;border-radius:var(--r5);font-size:14px;font-weight:500;border-left:3px solid var(--y);transform:translateY(60px);opacity:0;transition:all .2s;z-index:999;max-width:480px;box-shadow:0 8px 24px rgba(0,0,0,.18);line-height:1.5;}
.ts.on{transform:translateY(0);opacity:1;}
</style>

<script>
// ═══ CONFIG ═══════════════════════════════
const ADMINS = ['xiuxiu@handad.com.tw'];
const GAS = 'https://script.google.com/macros/s/AKfycbzZtlWYD6xGbDsundR3hYxRoofMle1gHeToNp7WNqlGysGIa5DciZOcwhuNnxf5a3MO/exec';
const CACHE_MS = 8 * 60 * 1000;

const PROJ = {'1_海保署海洋友善':'海洋友善行銷','2_海保署月曆':'海保署月曆','3_冠球共編曆':'冠球共編曆','4_冠球利百代':'冠球利百代','5_冠球SEO':'冠球SEO顧問','6_冠球小型':'冠球小型'};
const PKS = Object.keys(PROJ);
const PNS = {db:'儀表板',remind:'本月結帳提醒',vendors:'廠商清單',fixed:'公司固定成本',tax:'稅務費用',advances:'老闆代墊款',staff:'同仁填寫紀錄',...Object.fromEntries(Object.entries(PROJ))};

let cur='db', role=null;
const T0=new Date(); T0.setHours(0,0,0,0);

// ═══ IDENTITY ════════════════════════════
netlifyIdentity.on('init',u=>u?boot(u):netlifyIdentity.open());
netlifyIdentity.on('login',u=>{netlifyIdentity.close();boot(u);});
netlifyIdentity.on('logout',()=>{document.getElementById('app').classList.remove('on');netlifyIdentity.open();});

function boot(u){
  role=ADMINS.includes(u.email)?'admin':'staff';
  const ini=(u.user_metadata?.full_name||u.email)[0].toUpperCase();
  document.getElementById('uAv').textContent=ini;
  document.getElementById('uNm').textContent=u.user_metadata?.full_name||u.email.split('@')[0];
  const rb=document.getElementById('uRb'); rb.textContent=role==='admin'?'負責人':'同仁';
  rb.className='rb '+(role==='admin'?'adm':'stf');
  const app=document.getElementById('app');
  if(role==='admin'){app.classList.add('is-admin');document.getElementById('tg').textContent='ADMIN';}
  else document.getElementById('tg').textContent='STAFF';
  setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.style.display='none',380);},1400);
  app.classList.add('on');
  render();
  // 背景預載所有專案資料（不阻塞 UI），讓使用者點專案時秒開
  setTimeout(()=>{
    PKS.forEach((k,i)=>{
      // 錯開時間避免一次打 12 個 request
      setTimeout(()=>{
        gs(k+'_總覽').catch(()=>{});
        gs(k+'_付款帳').catch(()=>{});
      }, i*400);
    });
  }, 1500);
}

// ═══ CACHE ════════════════════════════════
function cget(k){try{const x=JSON.parse(sessionStorage.getItem('hf_'+k));if(x&&Date.now()-x.t<CACHE_MS)return x.d;}catch(e){}return null;}
function cset(k,d){try{sessionStorage.setItem('hf_'+k,JSON.stringify({t:Date.now(),d}));}catch(e){}}
function cdel(k){try{sessionStorage.removeItem('hf_'+k);}catch(e){}}

// ═══ FETCH ════════════════════════════════
async function gs(name){
  const c=cget(name); if(c)return c;
  const r=await fetch(GAS+'?sheetName='+encodeURIComponent(name));
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  cset(name,j.data||[]);
  return j.data||[];
}
async function post(body){
  const r=await fetch(GAS,{method:'POST',body:JSON.stringify(body)});
  const j=await r.json();
  if(j&&j.error)throw new Error(j.error);
  return j;
}

// ═══ HELPERS ══════════════════════════════
const $m=v=>'NT$'+(parseInt(v)||0).toLocaleString('zh-TW');
const $d=v=>v?String(v).substring(0,10).replace(/-/g,'/'):' ';
const $dd=d=>{if(!d)return null;const t=new Date(d);t.setHours(0,0,0,0);return Math.round((t-T0)/864e5);};
const $p=(a,b)=>b>0?Math.min(100,Math.round(a/b*100)):0;
const $sc=s=>{
  if(!s||!String(s).trim())return 'qt';
  const t=String(s);
  if(t.includes('已付'))return 'pd';
  if(t.includes('已收'))return 'rc';
  if(t.includes('待估價'))return 'qt';
  if(t.includes('待報價'))return 'qt';
  if(t.includes('待付'))return 'pn';
  if(t.includes('待收'))return 'pr';
  return 'qt';
};
const $pf=p=>p>100?'fill-re':p>85?'fill-am':'fill-y';
// Filter out template placeholder rows
const SKIP_WORDS=['(請','請新增','合計','小計','類別範','老闆代墊','執行項目類'];
const SUBHEADER_PATTERNS=[/^存在日曆\s*SEO\s*$/,/^包裝研究所\s*SEO\s*$/,/^海保署/,/^冠球/,/^利百代/,/^月曆/,/^海洋友善/];
const $valid=r=>{
  // 改為以「廠商欄(C)」為主判斷：A 欄日期可空白（待估價/待付情況），但廠商欄一定要有
  const vendor=String(r[2]||'').trim();
  if(!vendor)return false;
  if(SKIP_WORDS.some(w=>vendor.includes(w)))return false;
  if(SUBHEADER_PATTERNS.some(p=>p.test(vendor)))return false;
  // 同時也過濾 A 欄出現 SKIP_WORDS（例如 sub-header 寫在 A 欄）
  const dateCol=String(r[0]||'');
  if(dateCol&&SKIP_WORDS.some(w=>dateCol.includes(w)))return false;
  return true;
};

function $due(dl,paid){
  if(paid||!dl||dl==='undefined'||dl===' ')return dl&&dl!==' '?`<span class="due ok">${$d(dl)}</span>`:`<span class="due em">—</span>`;
  const d=$dd(dl);if(d===null)return`<span class="due em">—</span>`;
  if(d<0)return`<span class="due od">逾期${Math.abs(d)}天</span>`;
  if(d<=3)return`<span class="due ds">${d===0?'今天到期':d+'天後'}</span>`;
  return`<span class="due ok">${$d(dl)}</span>`;
}
function $lk(url,lbl){return url&&url.startsWith('http')?`<a href="${url}" target="_blank">${lbl}</a>`:`<span style="color:var(--paper3)">—</span>`;}
function $st(s,row,sheet){
  const c=$sc(s);
  const t=String(s||'').trim();
  const isEmpty = !t;
  if(role==='staff')return`<span class="chip ${c}">${t||'—'}</span>`;
  return`<select class="ss ${c}" onchange="upSt(this,${row},'${sheet}')">
    <option value="" ${isEmpty?'selected':''}>— 未設定 —</option>
    <option ${t.includes('已付')?'selected':''}>✅已付</option>
    <option ${t.includes('待付')&&!t.includes('估價')&&!t.includes('報價')?'selected':''}>⏳待付</option>
    <option ${t.includes('待估價')?'selected':''}>📋待估價</option>
    <option ${t.includes('待報價')?'selected':''}>📋待報價</option>
  </select>`;
}

function go(el){
  if(role==='staff'&&['fixed','tax','advances'].includes(el.dataset.k))return;
  cur=el.dataset.k;
  document.querySelectorAll('.ni').forEach(i=>i.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tt').textContent=PNS[cur]||cur;
  const isproj=PKS.includes(cur);
  // addBtn now embedded in 付款記錄 section
  document.getElementById('csvBtn').style.display=isproj?'':'none'; // keep CSV in topbar
  document.getElementById('advBtn').style.display=(cur==='advances'&&role==='admin')?'':'none';
  render();
}

async function render(){
  const ct=document.getElementById('ct');
  document.getElementById('ts').textContent='連線中...';
  ct.innerHTML=`<div class="ld"><div class="ring"></div>載入中...</div>`;
  try{
    if(cur==='db')await rDB();
    else if(cur==='remind')await rRemind();
    else if(cur==='vendors')await rVendors();
    else if(cur==='fixed')await rFixed();
    else if(cur==='tax')await rTax();
    else if(cur==='advances')await rAdvances();
    else if(cur==='staff')await rStaffRecords();
    else await rProj(cur);
    document.getElementById('ts').textContent='更新 '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){
    ct.innerHTML=`<div class="ld" style="color:var(--re)">⚠️ 載入失敗<br><small style="color:var(--ink4)">${e.message}</small></div>`;
    document.getElementById('ts').textContent='連線失敗';
  }
}

  results.forEach((d,i)=>{
    const k=PKS[i], rows=d.slice(5).filter($valid);
    const pR=rows.filter(r=>String(r[7]).includes('已付'));
    const pnR=rows.filter(r=>String(r[7]).includes('待付')&&!String(r[7]).includes('報價'));
    const p=pR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
    const pn=pnR.reduce((s,r)=>s+(parseInt(r[4])||0),0);

  let h='';
  if(odList.length)h+=`<div class="al re">🔴 逾期 ${odList.length} 筆：${odList.slice(0,3).map(o=>`${o.vendor}（${o.days}天）`).join('、')}${odList.length>3?'…':''}</div>`;
  
  h+=`<div class="kpi-row">
    <div class="kc yl"><div class="kl">待付款</div><div class="kv">${$m(tPn)}</div><div class="ks">需處理</div></div>
    <div class="kc gr"><div class="kl">已付款</div><div class="kv">${$m(tP)}</div><div class="ks">全部專案</div></div>
    <div class="kc ${tOD?'re':''}"><div class="kl">逾期未付</div><div class="kv">${tOD} 筆</div><div class="ks">立即處理</div></div>
    <div class="kc"><div class="kl">進行中專案</div><div class="kv">${PKS.length}</div><div class="ks">個</div></div>
  </div>
  <div class="card"><div class="ch"><h3>專案支出概覽</h3><span class="meta">點擊列可進入專案</span></div>
  <div class="tw"><table><thead><tr><th>專案</th><th style="text-align:right">已付款</th><th style="text-align:right">待付款</th><th style="min-width:120px">付款進度</th><th style="text-align:right">逾期</th><th style="text-align:right">筆數</th></tr></thead><tbody>`;
  stats.forEach(s=>{
    const tot=s.p+s.pn,pct=$p(s.p,tot);
    h+=`<tr style="cursor:pointer" onclick="document.querySelector('[data-k=${s.k}]').click()">
      <td style="font-weight:600">${s.nm}</td>
      <td class="num" style="color:var(--gr)">${$m(s.p)}</td>
      <td class="num" style="color:var(--am)">${$m(s.pn)}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill ${$pf(pct)}" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4);width:32px;text-align:right;flex-shrink:0">${pct}%</span></div></td>
      <td class="num" style="color:${s.od?'var(--re)':'var(--ink4)'}">${s.od?s.od+'筆':'—'}</td>
      <td class="num" style="color:var(--ink4)">${s.cnt}</td>
    </tr>`;
  });
  h+=`<tfoot><tr><td>合計</td><td class="num" style="color:var(--gr)">${$m(tP)}</td><td class="num" style="color:var(--am)">${$m(tPn)}</td><td></td><td class="num" style="color:${tOD?'var(--re)':'var(--ink4)'}">${tOD?tOD+'筆':'—'}</td><td></td></tr></tfoot></tbody></table></div></div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ PROJECT ══════════════════════════════
async function rProj(key){
  // 切換專案頁時重置篩選器
  _curStatusFilter='all';
  _curMonthFilter='';
  const [ov,pay]=await Promise.all([gs(key+'_總覽').catch(()=>[]),gs(key+'_付款帳').catch(()=>[])]);
  // 給每個 row 標記真實的 sheet row number（避免 filter 過後 index 偏移）
  const rows=pay.slice(5).map((r,i)=>{
    if(r&&Array.isArray(r))r.__sheetRow=i+6;  // sheet row 從 1 開始，前 5 列是 header，所以 +6
    return r;
  }).filter($valid);
  const pR=rows.filter(r=>$sc(r[7])==='pd');
  const pnR=rows.filter(r=>$sc(r[7])==='pn');
  const qR=rows.filter(r=>$sc(r[7])==='qt');
  const tP=pR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const tPn=pnR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const od=pnR.filter(r=>{const d=$dd(r[10]);return d!==null&&d<0;});
  const soon=pnR.filter(r=>{const d=$dd(r[10]);return d!==null&&d>=0&&d<=3;});

  // Parse overview
  let projTotal=0,costItems=[],budgetRows=[],receiptRows=[];
  if(ov.length>5){
    projTotal=parseInt(ov[5]?.[1])||0;
    for(let i=6;i<=9;i++){const r=ov[i];if(r?.[0]&&!String(r[0]).includes('▌'))costItems.push({nm:String(r[0]),am:parseInt(r[1])||0,pct:String(r[2]||''),ds:String(r[3]||'')});}
    // Budget rows: find rows between header and 合計
    let budgetStart=-1,budgetEnd=-1;
    for(let i=0;i<ov.length;i++){
      if(String(ov[i]?.[0]||'').includes('執行項目')&&ov[i]?.[1])budgetStart=i+1;
      if(budgetStart>0&&String(ov[i]?.[0]||'').includes('合計')&&i>budgetStart){budgetEnd=i;break;}
    }
    if(budgetStart>0){
      for(let i=budgetStart;i<(budgetEnd>0?budgetEnd:ov.length);i++){
        const r=ov[i];
        if(!r||!r[0]||String(r[0]).includes('(請')||String(r[0]).trim()==='')continue;
        budgetRows.push({nm:String(r[0]),budget:parseInt(r[1])||0,actual:parseInt(r[2])||0,remain:parseInt(r[3])||0,st:String(r[4]||''),rowNum:i+1});
      }
    }
    // 前端重算 actual：從付款記錄的備註欄 [執行:項目名稱] 累計
    // 採「已承諾」概念：已付 + 待付都算（金額已確定）；待估價/待報價不算（金額未確定）
    if(budgetRows.length>0&&rows&&rows.length>0){
      const execMap={};  // 項目名稱 → {paid: 已付金額, pending: 待付金額}
      rows.forEach(r=>{
        const status=String(r[7]||'');
        // 只跳過待估價/待報價（金額未確定）
        if(status.includes('待估價')||status.includes('待報價'))return;
        const amount=parseInt(r[4])||0;
        if(amount<=0)return;
        const tags=getExecTagsFromNote(r[8]);
        if(tags.length===0)return;  // 沒標籤的算雜支
        const share=amount/tags.length;
        const isPaid=status.includes('已付');
        tags.forEach(t=>{
          if(!execMap[t])execMap[t]={paid:0,pending:0};
          if(isPaid)execMap[t].paid+=share;
          else execMap[t].pending+=share;
        });
      });
      budgetRows.forEach(b=>{
        if(execMap[b.nm]!==undefined){
          const m=execMap[b.nm];
          b.paid=Math.round(m.paid);
          b.pending=Math.round(m.pending);
          b.actual=b.paid+b.pending;  // 已承諾 = 已付 + 待付
          b.remain=b.budget-b.actual;
          if(b.actual>b.budget)b.st='🔴 超支';
          else if(b.actual===b.budget)b.st='✅ 用罄';
          else if(b.paid>0&&b.pending>0)b.st='💰 進行中';
          else if(b.paid>0)b.st='💰 進行中';
          else if(b.pending>0)b.st='⏳ 待付款';
          else b.st='💰 尚有結餘';
        }
      });
    }
    // Receipt rows
    let rcStart=-1;
    for(let i=0;i<ov.length;i++){
      if(String(ov[i]?.[0]||'').includes('期數')||String(ov[i]?.[0]||'').includes('客戶收款'))rcStart=i+1;
    }
    if(rcStart>0){
      for(let i=rcStart;i<ov.length;i++){
        const r=ov[i];
        if(!r||!r[0]||String(r[0]).includes('合計')||String(r[0]).includes('▌'))continue;
        if(r[1])receiptRows.push({rowNum:i+1,desc:String(r[0]),amount:parseInt(r[1])||0,date:String(r[2]||''),actual:parseInt(r[3])||0,st:String(r[4]||''),invoice:String(r[5]||'')});
      }
    }
  }

  let h='';
  if(od.length)h+=`<div class="al re">🔴 ${od.length} 筆逾期付款</div>`;
  if(soon.length)h+=`<div class="al am">⚠️ ${soon.length} 筆即將到期（3天內）</div>`;
  if(role==='staff')h+=`<div class="al bl">ℹ️ 同仁模式 — 可新增記帳、查看報價單與轉帳證明</div>`;

  h+=`<div class="kpi-row">
    <div class="kc yl"><div class="kl">待付款</div><div class="kv">${$m(tPn)}</div><div class="ks">${pnR.length} 筆待處理</div></div>
    <div class="kc gr"><div class="kl">已付款</div><div class="kv">${$m(tP)}</div><div class="ks">${pR.length} 筆</div></div>
    <div class="kc ${od.length?'re':''}"><div class="kl">逾期未付</div><div class="kv">${od.length} 筆</div><div class="ks">${soon.length} 筆即將到期</div></div>
    <div class="kc"><div class="kl">待報價</div><div class="kv">${qR.length} 筆</div><div class="ks">金額未確認</div></div>
  </div>`;
  // ── 成本結構 + 客戶收款進度（各自全寬，避免欄位被擠掉）
  const _showCost = projTotal>0||costItems.length>0;
  const _showReceipt = receiptRows.length>0;


  // 成本結構（staff 看不到員工人事成本/老闆策略成本/毛利這些）
  if((projTotal>0||costItems.length>0) && role!=='staff'){
    h+=`<div class="card"><div class="ch"><h3>成本結構</h3><span class="meta">專案總金額 ${$m(projTotal)}</span></div>
    <div class="cost-list">
      <div class="ci total">
        <div class="ci-left"><div class="ci-nm">專案總金額</div></div>
        <div class="ci-right"><div class="ci-am">${$m(projTotal)}</div><div class="ci-pct">100%</div></div>
      </div>`;
    costItems.forEach(c=>h+=`<div class="ci">
      <div class="ci-left"><div class="ci-nm">${c.nm}</div>${c.ds?`<div class="ci-ds">${c.ds}</div>`:''}</div>
      <div class="ci-right"><div class="ci-am">${$m(c.am)}</div><div class="ci-pct">${c.pct}</div></div>
    </div>`);
    h+=`</div></div>`;
  }

  // 客戶收款進度
  // 月曆案撥款模板：當 receipt 為空時，admin 可一鍵初始化
  const RECEIPT_TEMPLATES = {
    '2_海保署月曆': [
      ['第1次撥款 30%（決標日 +15 工作天，函送工作規劃期程表後）', 1200000, '2026/04/30', 0, '⏳待收', ''],
      ['第2次撥款 40%（115/10/23 第一期驗收：7,000份月曆+5,000份桌曆+電子桌布）', 1600000, '2026/10/30', 0, '⏳待收', ''],
      ['運送費 實報實銷（115/11/16 前配送至指定地點，上限 NT$200,000）', 200000, '2026/11/20', 0, '⏳待收', ''],
      ['第3次撥款 30%（115/11/27 第三期驗收：5,000摺紙+5,000筆記本+5,000徽章+10,000貼紙）', 1200000, '2026/12/05', 0, '⏳待收', ''],
    ],
  };
  if(receiptRows.length===0 && role==='admin' && RECEIPT_TEMPLATES[key]){
    const tplCount = RECEIPT_TEMPLATES[key].length;
    const tplTotal = RECEIPT_TEMPLATES[key].reduce((s,r)=>s+r[1],0);
    h+=`<div class="card"><div class="ch"><h3>客戶收款進度</h3><span class="meta">尚未建立</span></div>
    <div style="padding:24px 18px;text-align:center;background:linear-gradient(180deg,var(--paper),var(--paper2))">
      <div style="font-size:14px;color:var(--ink2);margin-bottom:6px">📋 此專案尚未建立撥款項目</div>
      <div style="font-size:13px;color:var(--ink4);margin-bottom:14px">已內建合約撥款模板：共 ${tplCount} 期 / 合計 ${$m(tplTotal)}</div>
      <button class="btn btn-y" onclick="initReceiptTemplate('${key}',this)">📋 一鍵初始化撥款項目</button>
      <div style="font-size:11px;color:var(--ink4);margin-top:10px">點下後會自動寫入到 Google Sheet 的「${key}_總覽」</div>
    </div></div>`;
  }
  if(receiptRows.length>0){
    const totS=receiptRows.reduce((s,r)=>s+r.amount,0);
    const totR=receiptRows.reduce((s,r)=>s+r.actual,0);
    const pct=$p(totR,totS);
    h+=`<div class="card"><div class="ch"><h3>客戶收款進度</h3><div style="display:flex;align-items:center;gap:10px"><span class="meta">已收 ${$m(totR)} / ${$m(totS)} (${pct}%)</span>${role==='admin'?`<span style="font-size:11px;color:var(--ink4);background:var(--paper2);padding:3px 8px;border-radius:var(--r3)">💡 點 ✏️ 標記已收款</span>`:''}</div></div>
    <div style="padding:6px 14px 10px;border-bottom:1px solid var(--paper3)">
      <div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill fill-gr" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4)">${pct}%</span></div>
    </div>`;
    h+=`<div class="rr-head"><span>期數/說明</span><span style="text-align:right">應收金額</span><span>預計收款日</span><span style="text-align:right">實際到帳</span><span>狀態</span><span>發票</span><span></span></div>`;
    
    // 分組：已收 vs 待收
    const _pendingR = receiptRows.filter(r=>!r.st.includes('已收'));
    const _paidR = receiptRows.filter(r=>r.st.includes('已收'));
    
    const _renderRRow = (r,idx)=>{
      const sc=r.st.includes('已收')?'rc':'pr';
      const invLk=r.invoice&&r.invoice.startsWith('http')?`<a href="${r.invoice}" target="_blank" style="font-size:12px">📄</a>`:`<span style="color:var(--paper3)">—</span>`;
      return `<div class="rr-row">
        <span style="font-weight:600">${r.desc}</span>
        <span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right">${$m(r.amount)}</span>
        <span style="font-size:12px;color:var(--ink4)">${$d(r.date)}</span>
        <span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right;color:${r.actual>0?'var(--gr)':'var(--ink4)'}">${r.actual>0?$m(r.actual):'—'}</span>
        <span><span class="chip ${sc}">${r.st}</span></span>
        <span style="text-align:center">${invLk}</span>
        <span>${role==='admin'?`<button class="row-edit" onclick="editReceiptRow('${key}',${r.rowNum},${receiptRows.indexOf(r)})" title="編輯">✏️</button>`:''}</span>
      </div>`;
    };
    
    // 待收區（預設展開）
    if(_pendingR.length>0){
      const pendTotal=_pendingR.reduce((s,r)=>s+r.amount,0);
      h+=`<div class="rr-group-head" onclick="toggleGroup('rrec-pending')">
        <span class="rr-gh-arrow" id="rrec-pending-arrow">▼</span>
        <span class="rr-gh-icon">⏳</span>
        <span class="rr-gh-name">待收</span>
        <span class="rr-gh-count">${_pendingR.length} 筆</span>
        <span class="rr-gh-total">${$m(pendTotal)}</span>
      </div>
      <div id="rrec-pending-body">`;
      _pendingR.forEach(r=>h+=_renderRRow(r));
      h+=`</div>`;
    }
    
    // 已收區（預設折疊）
    if(_paidR.length>0){
      const paidTotal=_paidR.reduce((s,r)=>s+r.actual,0);
      h+=`<div class="rr-group-head collapsed" onclick="toggleGroup('rrec-paid')">
        <span class="rr-gh-arrow" id="rrec-paid-arrow">▶</span>
        <span class="rr-gh-icon" style="color:var(--gr)">✅</span>
        <span class="rr-gh-name">已收</span>
        <span class="rr-gh-count">${_paidR.length} 筆</span>
        <span class="rr-gh-total" style="color:var(--gr)">${$m(paidTotal)}</span>
      </div>
      <div id="rrec-paid-body" style="display:none">`;
      _paidR.forEach(r=>h+=_renderRRow(r));
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  // 執行預算追蹤
  if(budgetRows.length>0){
    const totB=budgetRows.reduce((s,r)=>s+r.budget,0);
    const totA=budgetRows.reduce((s,r)=>s+r.actual,0);
    const pct=$p(totA,totB);
    h+=`<div class="card"><div class="ch"><h3>執行預算追蹤</h3>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="meta">已承諾 ${$m(totA)} / ${$m(totB)} (${pct}%)</span>
        ${role==='admin'?`<button class="btn btn-o btn-sm" onclick="showAddBudget('${key}',${budgetRows.length>0?budgetRows[budgetRows.length-1].rowNum+1:14})">+ 新增項目</button>`:''}
      </div></div>
    <div style="padding:6px 14px 10px;border-bottom:1px solid var(--paper3)">
      <div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill ${$pf(pct)}" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4)">${pct}%</span></div>
    </div>
    <div class="br-head"><span>執行項目</span><span style="text-align:right">預算</span><span style="text-align:right">已承諾<span style="font-weight:400;font-size:10px">（已付+待付）</span></span><span style="text-align:right">剩餘</span><span style="text-align:right">使用率</span><span>狀態</span></div>`;
    budgetRows.forEach(r=>{
      const rp=$p(r.actual,r.budget);
      const stc=r.st.includes('超支')?'od':r.st.includes('用罄')?'pd':r.st.includes('結餘')?'pn':r.st.includes('待付款')?'pn':'qt';
      const paidPart=r.paid||0;
      const pendingPart=r.pending||0;
      const showSplit=paidPart>0&&pendingPart>0;
      h+=`<div class="br-row" id="br-${r.rowNum}">
        <span class="br-nm" title="${r.nm}">
          <span class="br-nm-text">${r.nm}</span>
          ${role==='admin'?`<button class="br-edit-btn" onclick="editBudgetRow('${key}',${r.rowNum},'${r.nm.replace(/'/g,"\\'")}',${r.budget})" title="編輯">✏️</button>`:''}
        </span>
        <span class="br-num">${$m(r.budget)}</span>
        <span class="br-num pos" title="${showSplit?`已付 ${$m(paidPart)} ＋ 待付 ${$m(pendingPart)}`:''}">
          ${$m(r.actual)}${showSplit?`<div style="font-size:10px;color:var(--ink4);font-weight:400;margin-top:2px">已付 ${$m(paidPart)} ⏳ ${$m(pendingPart)}</div>`:pendingPart>0?`<div style="font-size:10px;color:var(--am);font-weight:400;margin-top:2px">⏳ 全為待付</div>`:''}
        </span>
        <span class="br-num ${r.remain<0?'neg':''}">${$m(r.remain)}</span>
        <span style="text-align:right"><div style="display:flex;align-items:center;gap:5px;justify-content:flex-end"><div style="width:50px"><div class="prog"><div class="prog-fill ${$pf(rp)}" style="width:${Math.min(100,rp)}%"></div></div></div><span style="font-size:11px;color:var(--ink4);width:32px;text-align:right">${rp}%</span></div></span>
        <span><span class="chip ${stc}" style="font-size:11px">${r.st}</span></span>
      </div>`;
    });
    const totR=budgetRows.reduce((s,r)=>s+r.remain,0);
    h+=`<div class="br-row" style="background:var(--paper2);font-weight:700"><span class="br-nm"><span class="br-nm-text">合計</span></span><span class="br-num">${$m(totB)}</span><span class="br-num pos">${$m(totA)}</span><span class="br-num ${totR<0?'neg':''}">${$m(totR)}</span><span></span><span></span></div></div>`;
  }

  // 付款記錄
  // 從 rows 中抽出所有出現過的月份（用於下拉選單）
  const _months = new Set();
  rows.forEach(r=>{
    const d = String(r[0]||'');
    if(d){
      const m = d.match(/(\d{4})[-/](\d{1,2})/);
      if(m){
        _months.add(`${m[1]}-${m[2].padStart(2,'0')}`);
      }
    }
  });
  const _monthList = Array.from(_months).sort();
  const _curMonth = new Date();
  const _curMonthKey = `${_curMonth.getFullYear()}-${String(_curMonth.getMonth()+1).padStart(2,'0')}`;

  h+=`<div class="card"><div class="ch"><h3>付款記錄</h3><div style="display:flex;align-items:center;gap:8px"><span class="meta">${rows.length} 筆</span>${role==='admin'?`<span style="font-size:11px;color:var(--ink4);background:var(--paper2);padding:3px 8px;border-radius:var(--r3)">💡 點 ✏️ 編輯／補報價單</span>`:''}${PKS.includes(cur)&&role!=='readonly'?`<button class="btn btn-y btn-sm" onclick="openModal('pay')">+ 新增記帳</button>`:''}</div></div>
  <div class="fr" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span class="fc on" onclick="filt('all',this)">全部 (${rows.length})</span>
    <span class="fc" onclick="filt('pd',this)">✅ 已付 (${pR.length})</span>
    <span class="fc" onclick="filt('pn',this)">⏳ 待付 (${pnR.length})</span>
    <span class="fc" onclick="filt('qt',this)">📋 待報價 (${qR.length})</span>
    ${od.length?`<span class="fc fc-red" onclick="filt('od',this)">🔴 逾期 (${od.length})</span>`:''}
    ${_monthList.length>1?`
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
        <span style="font-size:12px;color:var(--ink4)">📅 月份</span>
        <select id="payMonthFilter" onchange="filtMonth(this.value)" style="font-size:13px;padding:5px 8px;border:1px solid var(--paper3);border-radius:var(--r3);background:var(--paper);cursor:pointer">
          <option value="">全部月份</option>
          ${_monthList.map(m=>{
            const [y,mo]=m.split('-');
            const cnt=rows.filter(r=>{
              const d=String(r[0]||'');
              return d.startsWith(`${y}-${mo}`)||d.startsWith(`${y}/${mo}`)||d.startsWith(`${y}/${parseInt(mo)}`);
            }).length;
            const isCur=m===_curMonthKey?' ⭐':'';
            return `<option value="${m}">${y}年${parseInt(mo)}月 (${cnt})${isCur}</option>`;
          }).join('')}
        </select>
      </div>
    `:''}
  </div>
  <div class="tw"><table class="pay-table" id="pt"><thead><tr><th class="cb-th"><input type="checkbox" onclick="toggleAllPayRows(this)" title="全選"></th><th>日期</th><th>類別</th><th>廠商</th><th>說明</th><th style="text-align:right">金額</th><th>付款人</th><th>截止日</th><th>狀態</th><th>報價單</th><th>證明</th><th></th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const s=String(r[7]||''),sc=$sc(s),ip=sc==='pd';
    const py=String(r[6]||''),dl=String(r[10]||'');
    const dd=$dd(dl),isOD=!ip&&dd!==null&&dd<0,isDS=!ip&&dd!==null&&dd>=0&&dd<=3;
    // 抽取月份標籤（YYYY-MM）給篩選用
    const dateStr=String(r[0]||'');
    const mMatch=dateStr.match(/(\d{4})[-/](\d{1,2})/);
    const monthTag=mMatch?`${mMatch[1]}-${mMatch[2].padStart(2,'0')}`:'';
    h+=`<tr data-sc="${sc}" data-od="${isOD}" data-month="${monthTag}" class="${isOD?'rod':isDS?'rds':''}">
      <td class="cb-cell" onclick="event.stopPropagation()"><input type="checkbox" class="row-cb" data-idx="${i}" onclick="togglePayRowCheck(this,${i})"></td>
      <td class="dt">${$d(r[0])}</td><td style="font-size:12px;color:var(--ink4)">${r[1]||''}</td>
      <td style="font-weight:600">${r[2]||''}</td>
      <td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r[3]||''}">${r[3]||''}</td>
      <td class="num">${r[4]?$m(r[4]):''}</td>
      <td><span class="payer ${py.includes('老闆')?'py-bo':'py-co'}">${py}</span></td>
      <td>${$due(dl,ip)}</td><td>${$st(s,i+6,key+'_付款帳')}</td>
      <td class="lk">${$lk(r[9],'報價單')}</td><td class="lk">${$lk(r[11],'證明')}</td>
      <td><button class="row-edit" onclick="editPayRow(${i})" title="編輯">✏️</button></td>
    </tr>`;
  });
  h+=`</tbody></table></div><div class="bulk-bar" id="bulkBar"><span class="bulk-cnt">已選 0 筆</span><div class="bulk-actions"><button class="bulk-clear" onclick="clearPayRowSelection()">取消選取</button><button class="bulk-del" id="bulkDelBtn" onclick="bulkDeletePayRows()">🗑️ 刪除選中</button></div></div></div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
  window._curRows=rows;window._curKey=key;window._curReceipts=receiptRows;
  // 重置多選狀態
  if(window._selectedPayRows)window._selectedPayRows.clear();
  updateBulkBar();
}

function editBudgetRow(key,rowNum,nm,budget){
  const row=document.getElementById('br-'+rowNum);
  if(!row)return;
  const first=row.querySelector('.br-nm');
  first.style.display='block';
  first.innerHTML=`<input class="ie-input" id="ie-nm" value="${nm}" style="width:140px"><br>
    <div style="display:flex;gap:5px;margin-top:4px">
      <input class="ie-input" id="ie-bud" type="number" value="${budget}" placeholder="預算" style="width:100px">
    </div>
    <div class="ie-actions">
      <button class="ie-save" onclick="saveBudgetRow('${key}',${rowNum})">✓ 儲存</button>
      <button class="ie-cancel" onclick="rProj('${key}')">✕ 取消</button>
    </div>`;
}

async function saveBudgetRow(key,rowNum){
  const nm=document.getElementById('ie-nm').value.trim();
  const budget=parseInt(document.getElementById('ie-bud').value)||0;
  if(!nm){toast('⚠️ 項目名稱不能空白');return;}
  cdel(key+'_總覽');
  try{
    await post({action:'updateCell',sheetName:key+'_總覽',row:rowNum,col:1,value:nm});
    await post({action:'updateCell',sheetName:key+'_總覽',row:rowNum,col:2,value:budget});
    toast('✅ 已更新');
    setTimeout(()=>rProj(key),800);
  }catch(e){toast('⚠️ 更新失敗: '+e.message);}
}

function showAddBudget(key,insertRow){

async function submitNewBudget(key,insertRow){
  const nm=document.getElementById('nb-nm').value.trim();
  const budget=parseInt(document.getElementById('nb-bud').value)||0;
  if(!nm){toast('⚠️ 請填寫項目名稱');return;}
  cdel(key+'_總覽');
  try{
    await post({action:'updateCell',sheetName:key+'_總覽',row:insertRow,col:1,value:nm});

    setTimeout(()=>rProj(key),800);
  }catch(e){toast('⚠️ 新增失敗: '+e.message);}
}

// ═══ FIXED COSTS ══════════════════════════
async function rFixed(){
  const data=await gs('公司固定成本');
  
  // 只讀取主區段（每月固定支出），遇到「其中：老闆每月代墊金額」這類 sub-header 後就停止
  // 這樣可避免「老闆代墊」項目被讀兩次（既出現在主區段也出現在參考區段）
  const mainRows = [];
  for(let i=5;i<data.length;i++){
    const r = data[i];
    const cell0 = String(r[0]||'');
    // 偵測到「其中」「代墊金額」這類 sub-header 就跳出
    if(cell0.includes('其中')||cell0.includes('代墊金額彙總')||cell0.includes('代墊金額合計')){
      break;
    }
    // 偵測到「損益平衡線」「年度費」也跳出（這些是另一區段）
    if(cell0.includes('損益平衡')||(cell0.includes('年度')&&cell0.includes('費'))){
      break;
    }
    // 過濾標題列、合計列、空列
    if(!r[0])continue;
    if(cell0.includes('📌'))continue;
    if(cell0.includes('合計'))continue;
    if(cell0.includes('▌'))continue;
    if(!cell0.trim())continue;
    mainRows.push(r);
  }
  const rows = mainRows;
  const total = rows.reduce((s,r)=>s+(parseInt(r[1])||0),0);

  // Break even
  let beRows=[];
  let inBE=false;
  for(const r of data){
    if(String(r[0]||'').includes('損益平衡'))inBE=true;
    if(inBE&&r[0]&&r[1]&&!String(r[0]).includes('損益平衡線')&&!String(r[0]).includes('▌')){
      beRows.push({nm:String(r[0]),val:parseInt(r[1])||0,ds:String(r[2]||'')});
      if(beRows.length>=3)break;
    }
  }

  // Annual costs
  let annRows=[];
  let inAnn=false;
  for(const r of data){
    if(String(r[0]||'').includes('年度')&&String(r[0]||'').includes('費'))inAnn=true;
    if(inAnn&&r[0]&&r[1]&&!String(r[0]).includes('▌')&&!String(r[0]).includes('年度費'))
      annRows.push(r);
  }

  const GROUPS=[
    {nm:'人事薪資',keys:['薪水','勞保','健保','勞退'],color:'#1E40AF'},
    {nm:'工具訂閱',keys:['Google','ChatGPT','Claude','Seameet','Notion'],color:'#7C3AED'},
    {nm:'辦公室',keys:['停車','租金','主機','會計'],color:'#065F46'},
    {nm:'其他',keys:[],color:'#6B7280'},
  ];
  const grouped=GROUPS.map(g=>({...g,items:[]}));
  rows.forEach(r=>{
    const nm=String(r[0]);
    let found=false;
    for(let i=0;i<GROUPS.length-1;i++){
      if(GROUPS[i].keys.some(k=>nm.includes(k))){grouped[i].items.push(r);found=true;break;}
    }
    if(!found)grouped[3].items.push(r);
  });

  let h=`<div class="kpi-row cols3">
    <div class="kc yl"><div class="kl">每月固定合計</div><div class="kv">${$m(total)}</div><div class="ks">每月支出</div></div>
    <div class="kc"><div class="kl">年度預估</div><div class="kv">${$m(total*12)}</div><div class="ks">×12 個月</div></div>
    <div class="kc"><div class="kl">每日成本</div><div class="kv">${$m(Math.round(total/30))}</div><div class="ks">÷30 天</div></div>
  </div>`;

  if(beRows.length>0){
    h+=`<div class="card"><div class="ch"><h3>損益平衡線</h3></div><div class="be-grid">`;
    beRows.forEach(r=>h+=`<div class="be-item"><div class="be-nm">${r.nm}</div><div class="be-v">${$m(r.val)}</div><div class="be-ds">${r.ds}</div></div>`);
    h+=`</div></div>`;
  }

  // 4 類分組 2x2 並排
  const _groups = grouped.filter(g=>g.items.length>0);
  if(_groups.length>0){
    h+=`<div class="grid2">`;
    _groups.forEach(g=>{
      const gTot=g.items.reduce((s,r)=>s+(parseInt(r[1])||0),0);
      const pct=$p(gTot,parseInt(total)||1);
      h+=`<div class="card"><div class="fg-head"><div class="fg-dot" style="background:${g.color}"></div><span class="fg-nm">${g.nm}</span><span class="fg-pct">${pct}% of total</span><span class="fg-total">${$m(gTot)}</span></div>`;
      g.items.forEach(r=>h+=`<div class="fg-item">
        <div style="min-width:0;flex:1">
          <div class="fi-nm">${r[0]}</div>
          ${(r[2]||r[3])?`<div class="fi-ds">${[r[2],r[3]].filter(Boolean).join(' · ')}</div>`:''}
        </div>
        <div class="fi-am">${$m(r[1])}</div>
      </div>`);
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  if(annRows.length>0){
    h+=`<div class="card"><div class="ch"><h3>年度 / 一次性費用</h3></div>
    <div class="tw"><table><thead><tr><th>項目</th><th style="text-align:right">金額</th><th>首次付款</th><th>週期</th><th>付款狀態</th></tr></thead><tbody>`;
    annRows.forEach(r=>h+=`<tr><td style="font-weight:500">${r[0]}</td><td class="num">${$m(r[1])}</td><td class="dt">${$d(r[2])}</td><td style="font-size:12px;color:var(--ink4)">${r[3]||''}</td><td><span class="chip ${$sc(String(r[6]||''))}">${r[6]||'—'}</span></td></tr>`);
    h+=`</tbody></table></div></div>`;
  }
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ ADVANCES ═════════════════════════════
async function rAdvances(){
  document.getElementById('advBtn').style.display='';
  const data=await gs('老闆代墊款彙整');
  // 過濾：r[0] 必須是日期、r[3] 必須有金額、且 r[0] 不是合計列
  // 同時保留 __sheetRow 讓動作按鈕可以正確找到列
  const rows=data.slice(5).map((r,i)=>{
    if(r&&Array.isArray(r))r.__sheetRow=i+6;
    return r;
  }).filter(r=>{
    if(!r||!r[0]||String(r[0])==='0'||!r[3])return false;
    const c0=String(r[0]);
    if(c0.includes('總計')||c0.includes('合計')||c0.includes('尚未'))return false;
    return true;
  });
  // 自動判定狀態：r[5] 有還款日 OR r[6] 含「已還清」 = 已還清
  rows.forEach(r=>{
    const hasReturnDate=r[5]&&String(r[5]).trim()&&String(r[5])!=='0';
    const stMarked=String(r[6]||'').includes('已還清');
    r._isPaid=hasReturnDate||stMarked;
  });
  
  const pend=rows.filter(r=>!r._isPaid);
  const done=rows.filter(r=>r._isPaid);
  const tPend=pend.reduce((s,r)=>s+(parseInt(r[3])||0),0);
  const tDone=done.reduce((s,r)=>s+(parseInt(r[3])||0),0);
  
  let h=`<div class="kpi-row cols3">
    <div class="kc yl"><div class="kl">待還款</div><div class="kv">${$m(tPend)}</div><div class="ks">${pend.length} 筆</div></div>
    <div class="kc gr"><div class="kl">已還清</div><div class="kv">${$m(tDone)}</div><div class="ks">${done.length} 筆</div></div>
    <div class="kc"><div class="kl">歷史總代墊</div><div class="kv">${$m(tPend+tDone)}</div><div class="ks">含已還清</div></div>
  </div>`;
  if(tPend>0)h+=`<div class="al am">💳 公司尚欠老闆 ${$m(tPend)}，共 ${pend.length} 筆待還清</div>`;
  h+=`<div class="al bl" style="font-size:12px">💡 點 <strong>狀態 chip</strong> 可切換已還/未還；✏️ 編輯；🗑️ 刪除</div>`;

  // 依月份分組（取 r[0] 日期的 YYYY-MM）
  const groupByMonth=(list)=>{
    const m={};
    list.forEach(r=>{
      const d=String(r[0]||'');
      const match=d.match(/(\d{4})[-/](\d{1,2})/);
      const key=match?`${match[1]}/${match[2].padStart(2,'0')}`:'其他';
      if(!m[key])m[key]=[];
      m[key].push(r);
    });
    return m;
  };
  
  const renderRow=(r)=>{
    const ip=r._isPaid;
    const sr=r.__sheetRow;
    return `<tr class="${ip?'':'rds'}">
      <td class="dt">${$d(r[0])}</td>
      <td style="font-size:12px;color:var(--ink4)">${r[1]||''}</td>
      <td style="font-size:13px">${r[2]||''}</td>
      <td class="num">${$m(r[3])}</td>
      <td style="font-size:12px;color:var(--ink4)">${r[4]||''}</td>
      <td class="dt">${$d(r[5])}</td>
      <td><span class="chip ${ip?'pd':'pn'}" onclick="toggleAdvanceStatus(${sr},${ip?0:1})" style="cursor:pointer;user-select:none" title="點擊切換狀態">${ip?'✅已還清':'⏳待還'}</span></td>
      <td style="text-align:center"><button class="row-edit" onclick="editAdvanceRow(${sr})" title="編輯">✏️</button></td>
      <td style="text-align:center"><button class="row-edit" onclick="deleteAdvanceRow(${sr})" title="刪除" style="color:var(--re)">🗑️</button></td>
    </tr>`;
  };
  
  const tableHead=`<thead><tr><th>日期</th><th>來源</th><th>說明</th><th style="text-align:right">金額</th><th>付款方式</th><th>還款日</th><th>狀態</th><th style="width:40px"></th><th style="width:40px"></th></tr></thead>`;
  
  // 待還區（按月分組，預設展開）
  if(pend.length>0){
    const groups=groupByMonth(pend);
    const months=Object.keys(groups).sort().reverse();
    h+=`<div class="card"><div class="ch"><h3>⏳ 待還款明細</h3><span class="meta">${pend.length} 筆 · ${$m(tPend)}</span></div>`;
    months.forEach((m,idx)=>{
      const list=groups[m];
      const total=list.reduce((s,r)=>s+(parseInt(r[3])||0),0);
      const gid=`adv-pend-${idx}`;
      h+=`<div class="rr-group-head" onclick="toggleGroup('${gid}')">
        <span class="rr-gh-arrow" id="${gid}-arrow">▼</span>
        <span class="rr-gh-name">${m}</span>
        <span class="rr-gh-count">${list.length} 筆</span>
        <span class="rr-gh-total" style="color:var(--am)">${$m(total)}</span>
      </div>
      <div id="${gid}-body"><div class="tw"><table>${tableHead}<tbody>`;
      list.forEach(r=>h+=renderRow(r));
      h+=`</tbody></table></div></div>`;
    });
    h+=`</div>`;
  }
  
  // 已還清區（按月分組，預設折疊）
  if(done.length>0){
    const groups=groupByMonth(done);
    const months=Object.keys(groups).sort().reverse();
    h+=`<div class="card"><div class="ch"><h3>✅ 已還清明細</h3><span class="meta">${done.length} 筆 · ${$m(tDone)}</span></div>`;
    months.forEach((m,idx)=>{
      const list=groups[m];
      const total=list.reduce((s,r)=>s+(parseInt(r[3])||0),0);
      const gid=`adv-done-${idx}`;
      h+=`<div class="rr-group-head collapsed" onclick="toggleGroup('${gid}')">
        <span class="rr-gh-arrow" id="${gid}-arrow">▶</span>
        <span class="rr-gh-name">${m}</span>
        <span class="rr-gh-count">${list.length} 筆</span>
        <span class="rr-gh-total" style="color:var(--gr)">${$m(total)}</span>
      </div>
      <div id="${gid}-body" style="display:none"><div class="tw"><table>${tableHead}<tbody>`;
      list.forEach(r=>h+=renderRow(r));
      h+=`</tbody></table></div></div>`;
    });
    h+=`</div>`;
  }
  
  // ━━━ 從專案付款記錄帶出（付款人=老闆代墊） ━━━━━━━━━━━━
  const projAdvData = await Promise.all(PKS.map(k=>gs(k+'_付款帳').catch(()=>[])));
  const projAdv = [];
  let _scanCount = 0; // 診斷用：總共掃了多少列
  projAdvData.forEach((d, idx) => {
    const projKey = PKS[idx];
    d.slice(5).forEach((r) => {
      if(!r || !$valid(r)) return;
      _scanCount++;
      // 寬鬆比對：trim + includes 防空白/全形/錯字
      const payer = String(r[5]||'').trim();
      if(!payer.includes('老闆代墊')) return;
      projAdv.push({
        date: r[0],
        proj: projKey,
        projName: PROJ[projKey] || projKey,
        vendor: r[2]||'',
        desc: r[3]||'',
        amount: parseInt(r[4])||0,
        status: r[7]||''
      });
    });
  });
  console.log('[老闆代墊聚合] 掃描', _scanCount, '筆有效記錄，找到', projAdv.length, '筆代墊');
  const projAdvTotalAll = projAdv.reduce((s,x)=>s+x.amount, 0);
  const projAdvPending = projAdv.filter(x => !String(x.status||'').includes('已付'));
  const projAdvDone = projAdv.filter(x => String(x.status||'').includes('已付'));
  const projAdvTotalPending = projAdvPending.reduce((s,x)=>s+x.amount, 0);
  
  // 永遠顯示區塊（即使 0 筆也顯示，避免使用者搞不清楚有沒有跑）
  // 排序：日期新到舊
  projAdv.sort((a, b) => String(b.date||'').localeCompare(String(a.date||'')));
  
  h+=`<div class="card" style="margin-top:18px">
    <div class="ch">
      <h3>📂 從專案付款記錄帶出</h3>
      <span class="meta">${projAdv.length} 筆 · 合計 ${$m(projAdvTotalAll)} · 待付 ${$m(projAdvTotalPending)}</span>
    </div>
    <div class="al bl" style="margin:0;border-radius:0;font-size:11.5px;line-height:1.5">💡 此區自動聚合各專案付款記錄裡「付款人=老闆代墊」的款項（信用卡只能你刷的）。<b>read-only</b>，要修改請點「→」回該專案頁。狀態跟付款進度由各專案管。</div>`;
  
  if(projAdv.length === 0){
    h+=`<div style="padding:24px;text-align:center;color:var(--ink4);font-size:13px">
      目前沒有從專案帶出的代墊款。<br>
      <span style="font-size:11px;color:var(--ink4)">已掃描 ${_scanCount} 筆專案付款記錄，篩選條件：付款人欄包含「老闆代墊」</span>
    </div></div>`;
  }else{
    h+=`<div class="tw"><table>
      <thead><tr><th>日期</th><th>專案</th><th>廠商</th><th>說明</th><th style="text-align:right">金額</th><th>狀態</th><th style="width:36px"></th></tr></thead>
      <tbody>`;
    projAdv.forEach(x => {
      const isPaid = String(x.status||'').includes('已付');
      h+=`<tr style="${isPaid?'opacity:.55':''}">
        <td class="dt">${$d(x.date)}</td>
        <td style="font-size:12px;color:var(--ink4)">${x.projName}</td>
        <td style="font-size:13px">${x.vendor}</td>
        <td style="font-size:12px;color:var(--ink4)">${x.desc}</td>
        <td class="num">${$m(x.amount)}</td>
        <td><span class="chip ${isPaid?'pd':'pn'}" style="font-size:10px;cursor:default" title="狀態由專案頁管理">${isPaid?'✅已付':'⏳待付'}</span></td>
        <td style="text-align:center"><button class="row-edit" onclick="goToProject('${x.proj}')" title="跳到 ${x.projName}">→</button></td>
      </tr>`;
    });
    h+=`</tbody></table></div></div>`;
  }
  
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ TAX（稅務費用 read-only 展示頁）═══════════
async function rTax(){
  document.getElementById('advBtn').style.display='none';
  cdel('稅務費用');
  const taxData = await gs('稅務費用').catch(()=>[]);

  // 解析（schema 同 rRemind）
  const businessRows = []; // 營業稅
  const accountingRows = []; // 會計費
  for(let i=5; i<Math.min(taxData.length, 12); i++){
    const r = taxData[i];
    if(!r || !r[0]) continue;
    const a = String(r[0]);
    if(a.includes('合計') || a.includes('▌')) break;
    if(!a.includes('年')) continue;
    businessRows.push({period:a, dueDate:r[1]||'', sales:r[2]||0, amount:r[3]||0, paidDate:r[4]||'', method:r[5]||'', status:r[6]||'', note:r[7]||''});
  }
  for(let i=15; i<taxData.length; i++){
    const r = taxData[i];
    if(!r || !r[0]) continue;
    const a = String(r[0]).trim();
    if(a.includes('合計') || a.includes('▌') || a.includes('總計')) break;
    if(!/^\d{4}$/.test(a)) continue;
    accountingRows.push({year:a, item:r[1]||'', amount:r[2]||0, paidDate:r[3]||'', method:r[4]||'', status:r[5]||'', note:r[6]||''});
  }

  const curYear = new Date().getFullYear();
  const _toInt = v => parseInt(String(v||'').replace(/[^0-9.-]/g,'')) || 0;

  // 年度合計（用 dueDate 所在年判斷營業稅；用 paidDate / year 判斷會計費）
  const yearBusinessTotal = businessRows.reduce((s,r)=>{
    const d = new Date(r.dueDate);
    if(isNaN(d.getTime())) return s;
    return d.getFullYear()===curYear ? s + _toInt(r.amount) : s;
  }, 0);
  const yearAccountingTotal = accountingRows.reduce((s,r)=>{
    return parseInt(r.year)===curYear ? s + _toInt(r.amount) : s;
  }, 0);
  const yearTotal = yearBusinessTotal + yearAccountingTotal;

  // 已繳/待繳 統計
  const businessPaid = businessRows.filter(r => String(r.status||'').includes('已繳')||String(r.status||'').includes('已付')).length;
  const businessPending = businessRows.length - businessPaid;

  let h = '';

  // KPI
  h += `<div class="kpi-row cols3">
    <div class="kc"><div class="kl">${curYear} 年度 營業稅</div><div class="kv">${$m(yearBusinessTotal)}</div><div class="ks">已繳 ${businessPaid} / ${businessRows.length} 期</div></div>
    <div class="kc"><div class="kl">${curYear} 年度 會計代辦費</div><div class="kv">${$m(yearAccountingTotal)}</div><div class="ks">${accountingRows.filter(r=>parseInt(r.year)===curYear).length>0?'已建立':'尚未建立'}</div></div>
    <div class="kc yl"><div class="kl">${curYear} 年度 稅務費用合計</div><div class="kv">${$m(yearTotal)}</div><div class="ks">不計入每月固定成本</div></div>
  </div>`;

  // 提示
  h += `<div class="al bl">ℹ️ 此頁為唯讀顯示。需要編輯（填銷售額、填應繳稅額、改狀態）請打開 <a href="https://docs.google.com/spreadsheets/d/1IsAhNuj7nLI4fKNECnVzW6p-dW_C9Lcr0ZxyAN9iNic/edit" target="_blank" style="color:var(--bl);text-decoration:underline;font-weight:700">Google Sheet 「稅務費用」分頁</a> 直接改。改完回來這裡按 ↻ 重整。</div>`;

  // 區塊 1：營業稅
  h += `<div class="card"><div class="ch"><h3>📋 營業稅申報紀錄</h3><span class="meta">雙月申報 · 每年 6 次</span></div>
    <div class="tw"><table class="pay-table" style="table-layout:auto"><thead><tr>
      <th>申報期間</th><th>申報截止日</th><th style="text-align:right">銷售額</th><th style="text-align:right">應繳稅額</th><th>付款日期</th><th>付款方式</th><th>狀態</th><th>備註</th>
    </tr></thead><tbody>`;
  if(businessRows.length===0){
    h += `<tr><td colspan="8" style="text-align:center;color:var(--ink4);padding:24px">稅務 sheet 沒有資料</td></tr>`;
  }else{
    businessRows.forEach(r=>{
      const stTrim = String(r.status||'').trim();
      const isPaid = stTrim.includes('已繳')||stTrim.includes('已付');
      const isWait = stTrim.includes('待');
      const stChip = isPaid ? `<span class="chip pd">${stTrim}</span>` : isWait ? `<span class="chip pn">${stTrim}</span>` : `<span class="chip qt">${stTrim||'—'}</span>`;
      const amt = _toInt(r.amount);
      const sal = _toInt(r.sales);
      h += `<tr>
        <td style="font-weight:600">${r.period}</td>
        <td class="dt">${$d(r.dueDate)}</td>
        <td class="num" style="color:${sal>0?'var(--ink2)':'var(--ink4)'}">${sal>0?$m(sal):'—'}</td>
        <td class="num" style="color:${amt>0?'var(--ink)':'var(--am)'};font-weight:700">${amt>0?$m(amt):'<span style="color:var(--am)">待填</span>'}</td>
        <td class="dt">${r.paidDate?$d(r.paidDate):'—'}</td>
        <td style="font-size:12px;color:var(--ink3)">${r.method||'—'}</td>
        <td>${stChip}</td>
        <td style="font-size:12px;color:var(--ink4)">${r.note||''}</td>
      </tr>`;
    });
    h += `<tr><td colspan="3" style="text-align:right;font-weight:700">${curYear} 年度合計</td><td class="num" style="font-weight:700;color:var(--ink)">${$m(yearBusinessTotal)}</td><td colspan="4" style="color:var(--ink4);font-size:12px">＊ 申報後請於 sheet 填入實際稅額</td></tr>`;
  }
  h += `</tbody></table></div></div>`;

  // 區塊 2：會計代辦費
  h += `<div class="card"><div class="ch"><h3>📋 冠融會計代辦費</h3><span class="meta">年繳 · 不列入每月固定成本</span></div>
    <div class="tw"><table class="pay-table" style="table-layout:auto"><thead><tr>
      <th>年度</th><th>服務項目</th><th style="text-align:right">金額</th><th>付款日期</th><th>付款方式</th><th>狀態</th><th>備註</th>
    </tr></thead><tbody>`;
  if(accountingRows.length===0){
    h += `<tr><td colspan="7" style="text-align:center;color:var(--ink4);padding:24px">稅務 sheet 沒有資料</td></tr>`;
  }else{
    accountingRows.forEach(r=>{
      const stTrim = String(r.status||'').trim();
      const isPaid = stTrim.includes('已繳')||stTrim.includes('已付');
      const stChip = isPaid ? `<span class="chip pd">${stTrim}</span>` : `<span class="chip pn">${stTrim||'⏳待繳'}</span>`;
      const amt = _toInt(r.amount);
      h += `<tr>
        <td style="font-weight:700">${r.year}</td>
        <td>${r.item||'—'}</td>
        <td class="num" style="font-weight:700">${$m(amt)}</td>
        <td class="dt">${r.paidDate?$d(r.paidDate):'—'}</td>
        <td style="font-size:12px;color:var(--ink3)">${r.method||'—'}</td>
        <td>${stChip}</td>
        <td style="font-size:12px;color:var(--ink4)">${r.note||''}</td>
      </tr>`;
    });
    h += `<tr><td colspan="2" style="text-align:right;font-weight:700">${curYear} 年度合計</td><td class="num" style="font-weight:700;color:var(--ink)">${$m(yearAccountingTotal)}</td><td colspan="4"></td></tr>`;
  }
  h += `</tbody></table></div>`;

  // 連動說明
  h += `<div style="font-size:12px;color:var(--ink4);margin-top:14px;padding:10px 14px;background:var(--paper2);border-radius:var(--r5);line-height:1.7">
    <div style="font-weight:700;color:var(--ink2);margin-bottom:4px">🔗 與月付清單的連動</div>
    <div>• 營業稅項目只在「申報截止日」當月出現在月付清單（例：3-4 月期截止日 5/15 → 5 月顯示）</div>
    <div>• 會計費項目只在「付款日期」當月出現在月付清單</div>
    <div>• 月付清單的金額/狀態以稅務 sheet 為準，不能在月付清單編輯（chip 不可點）</div>
    <div>• 若 sheet 未填金額，月付清單會顯示「待確認 → 稅務頁」連結</div>
  </div>`;

  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ STAFF RECORDS（同仁填寫紀錄）═════════

    gs('同仁_設計師月費').catch(()=>[]),

// ═══ VENDORS ══════════════════════════════
async function rVendors(){
  const results=await Promise.all(PKS.map(k=>gs(k+'_付款帳').catch(()=>[])));
  const vm={};
  results.forEach((d,i)=>{
    const k=PKS[i];
    d.slice(5).filter($valid).forEach(r=>{
      const nm=String(r[2]||'').trim();if(!nm)return;
      if(!vm[nm])vm[nm]={name:nm,total:0,paid:0,pend:0,projs:new Set(),cnt:0};
      const amt=parseInt(r[4])||0,s=String(r[7]||'');
      vm[nm].total+=amt;
      if(s.includes('已付'))vm[nm].paid+=amt;
      else if(s.includes('待付')&&!s.includes('報價'))vm[nm].pend+=amt;
      vm[nm].projs.add(PROJ[k]);vm[nm].cnt++;
    });
  });
  const vendors=Object.values(vm).sort((a,b)=>b.total-a.total);
  const gTot=vendors.reduce((s,v)=>s+v.total,0);
  
  let h=`<div class="kpi-row cols3">
    <div class="kc yl"><div class="kl">廠商總數</div><div class="kv">${vendors.length}</div></div>
    <div class="kc gr"><div class="kl">歷史總支出</div><div class="kv">${$m(gTot)}</div></div>
    <div class="kc"><div class="kl">平均每筆</div><div class="kv">${$m(Math.round(gTot/Math.max(1,vendors.reduce((s,v)=>s+v.cnt,0))))}</div></div>
  </div>
  <div class="card"><div class="ch"><h3>廠商清單</h3><span class="meta">${vendors.length} 個廠商</span></div>
  <div class="vd-row hd"><span>廠商名稱</span><span>專案</span><span style="text-align:right">歷史總支出</span><span style="text-align:right">已付款</span><span style="text-align:right">待付款</span></div>`;
  vendors.forEach(v=>{
    h+=`<div class="vd-row"><span class="vd-nm">${v.name}</span><div class="vd-tags">${[...v.projs].map(p=>`<span class="vd-tag">${p.substring(0,4)}</span>`).join('')}</div><span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right">${$m(v.total)}</span><span style="font-variant-numeric:tabular-nums;text-align:right;color:var(--gr)">${$m(v.paid)}</span><span style="font-variant-numeric:tabular-nums;text-align:right;color:${v.pend?'var(--am)':'var(--ink4)'}">${v.pend?$m(v.pend):'—'}</span></div>`;
  });
  h+=`</div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ FILTERS / STATUS ═════════════════════
let _curStatusFilter = 'all';  // 目前狀態篩選
let _curMonthFilter = '';      // 目前月份篩選（YYYY-MM；空字串=全部）

function _applyFilters(){
  document.querySelectorAll('#pt tbody tr').forEach(tr=>{
    let show = true;
    // 狀態篩選
    if(_curStatusFilter!=='all'){
      if(_curStatusFilter==='od'){
        show = tr.dataset.od==='true';
      } else {
        show = tr.dataset.sc===_curStatusFilter;
      }
    }
    // 月份篩選
    if(show && _curMonthFilter){
      show = tr.dataset.month===_curMonthFilter;
    }
    tr.style.display = show ? '' : 'none';
  });
}

function filt(type,el){
  document.querySelectorAll('.fr .fc').forEach(f=>f.classList.remove('on'));
  if(el)el.classList.add('on');
  _curStatusFilter = type;
  _applyFilters();
}

function filtMonth(monthKey){
  _curMonthFilter = monthKey || '';
  _applyFilters();
}

// 編輯付款記錄列
function editPayRow(idx){
  if(!window._curRows||!window._curRows[idx])return;
  const r=window._curRows[idx];
  _editingPayIdx=idx;
  // prefill
  const toDateInput=v=>{if(!v)return'';const s=String(v).substring(0,10).replace(/\//g,'-');return /^\d{4}-\d{2}-\d{2}$/.test(s)?s:'';};
  const setVal=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v||'';};
  setVal('p0',toDateInput(r[0]));
  setVal('p1',r[1]);
  setVal('p2',r[2]);
  setVal('p3',r[3]);
  setVal('p4',r[4]);
  setVal('p5',r[5]||'匯款');
  setVal('p6',r[6]||'公司');
  // 狀態：如果 raw value 不在 4 個 option 中（例如純文字），直接設值；否則 select 會 fallback 到第一個
  const stEl=document.getElementById('p7');
  const stRaw=String(r[7]||'⏳待付');
  let matched=false;
  Array.from(stEl.options).forEach(o=>{if(o.value===stRaw){stEl.value=stRaw;matched=true;}});
  if(!matched){
    if(stRaw.includes('已付'))stEl.value='✅已付';
    else if(stRaw.includes('待估價'))stEl.value='📋待估價';
    else if(stRaw.includes('待報價'))stEl.value='📋待報價';
    else if(stRaw.includes('待付'))stEl.value='⏳待付';
  }
  setVal('p8',r[9]); // 報價單連結 (col J = idx 9)
  // 備註 (col I = idx 8)：拆出執行項目標籤
  const rawNote=String(r[8]||'');
  const execTags=getExecTagsFromNote(rawNote);
  const cleanNote=rawNote.replace(/\s*\[執行:[^\]]+\]\s*/,'').trim();
  setVal('p9',cleanNote);
  setVal('p10',toDateInput(r[10]));
  setVal('p11',r[11]);
  document.querySelector('#ov-pay .mh h3').textContent='編輯付款記錄';
  document.querySelector('#ov-pay .mf .btn-y').textContent='儲存修改';
  document.getElementById('payDelBtn').style.display='inline-flex';
  // 編輯模式：隱藏分期欄位（編輯不能分期）
  const expWrap=document.getElementById('p-expand-wrap'); if(expWrap)expWrap.style.display='none';
  // 載入執行項目並把已勾選的還原
  loadExecItems(execTags);
  document.getElementById('ov-pay').classList.add('on');
}

// 刪除付款記錄列（軟刪除：用 clearRow 一次清空整列，比 12 次 updateCell 快 12 倍）
async function deletePayRow(){
  if(_editingPayIdx==null){toast('⚠️ 請先選擇要刪除的記錄');return;}
  if(!confirm('確定要刪除這筆付款記錄嗎？此操作無法復原。'))return;
  const sheet=PKS.includes(cur)?cur+'_付款帳':null;
  if(!sheet)return;
  const editingRow=window._curRows&&window._curRows[_editingPayIdx];
  const sheetRow=editingRow&&editingRow.__sheetRow?editingRow.__sheetRow:(_editingPayIdx+6);
  const delBtn=document.getElementById('payDelBtn');
  if(delBtn){delBtn.disabled=true;delBtn.textContent='🔄 刪除中...';}
  cdel(sheet);
  toast('刪除中...');
  try{
    // 一次 API call 清空整列（後端 clearRow action）
    await post({action:'clearRow',sheetName:sheet,row:sheetRow});
    closeModal('pay');
    toast('✅ 記錄已刪除');
    setTimeout(render,500);
  }catch(e){
    toast('⚠️ 刪除失敗: '+e.message);
  }finally{
    if(delBtn){delBtn.disabled=false;delBtn.innerHTML='🗑️ 刪除此筆';}
  }
}

// ═══ 付款記錄多選刪除 ═══════════════════
window._selectedPayRows = new Set();

function togglePayRowCheck(cb, idx){
  if(cb.checked) window._selectedPayRows.add(idx);
  else window._selectedPayRows.delete(idx);
  updateBulkBar();
}

function toggleAllPayRows(headerCb){
  const checkboxes = document.querySelectorAll('.row-cb');
  checkboxes.forEach(cb=>{
    // 只勾選目前可見的（被篩選器隱藏的不勾）
    const tr = cb.closest('tr');
    if(tr && tr.style.display === 'none') return;
    cb.checked = headerCb.checked;
    const idx = parseInt(cb.dataset.idx);
    if(headerCb.checked) window._selectedPayRows.add(idx);
    else window._selectedPayRows.delete(idx);
  });
  updateBulkBar();
}

function clearPayRowSelection(){
  window._selectedPayRows.clear();
  document.querySelectorAll('.row-cb').forEach(cb=>cb.checked=false);
  document.querySelectorAll('.cb-th input').forEach(cb=>cb.checked=false);
  updateBulkBar();
}

function updateBulkBar(){
  const bar = document.getElementById('bulkBar');
  if(!bar) return;
  const n = window._selectedPayRows.size;
  if(n > 0){
    bar.classList.add('on');
    bar.querySelector('.bulk-cnt').textContent = `已選 ${n} 筆`;
  }else{
    bar.classList.remove('on');
  }
}

async function bulkDeletePayRows(){
  const n = window._selectedPayRows.size;
  if(n === 0){toast('⚠️ 請先勾選要刪除的記錄');return;}
  if(!confirm(`確定要刪除選中的 ${n} 筆付款記錄嗎？\n\n此操作無法復原。`))return;
  
  const sheet = PKS.includes(cur) ? cur+'_付款帳' : null;
  if(!sheet) return;
  
  // 取出 sheet row numbers，從大到小排序（從下往上刪以避免 index 偏移）
  const rowNums = Array.from(window._selectedPayRows)
    .map(idx => window._curRows && window._curRows[idx] && window._curRows[idx].__sheetRow)
    .filter(r => r)
    .sort((a, b) => b - a);
  
  if(rowNums.length === 0){toast('⚠️ 找不到對應的 sheet 列');return;}
  
  const btn = document.getElementById('bulkDelBtn');
  btn.disabled = true;
  cdel(sheet);
  
  let done = 0, failed = 0;
  for(const r of rowNums){
    btn.textContent = `🔄 刪除中 ${done+1}/${rowNums.length}...`;
    try{
      await post({action:'clearRow', sheetName:sheet, row:r});
      done++;
    }catch(e){
      failed++;
      console.error(`刪除 row ${r} 失敗:`, e);
    }
  }
  
  if(failed === 0){
    toast(`✅ 已刪除 ${done} 筆`);
  }else{
    toast(`⚠️ 完成 ${done} 筆，失敗 ${failed} 筆`);
  }
  
  window._selectedPayRows.clear();
  setTimeout(render, 500);
}

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會飛的手｜財務管理系統</title>
<style>
  :root {
    --navy: #1a2744;
    --navy-light: #243358;
    --teal: #0f6e56;
    --teal-light: #1d9e75;
    --teal-bg: #e1f5ee;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --gray: #5f5e5a;
    --gray-light: #f1efe8;
    --gray-border: #d3d1c7;
    --white: #ffffff;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --text: #2c2c2a;
    --text-muted: #888780;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', -apple-system, sans-serif;
    background: #f4f3ef;
    color: var(--text);
    min-height: 100vh;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--navy);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo .company { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.05em; }
  .sidebar-logo .title { font-size: 16px; color: #fff; font-weight: 600; margin-top: 4px; }

  .sidebar-nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 16px 20px 6px; font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); text-transform: uppercase; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 20px;
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.05); }
  .nav-item.active { color: #fff; background: rgba(255,255,255,0.1); border-left-color: var(--teal-light); }
  .nav-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.2); flex-shrink: 0;
  }
  .nav-item.active .dot { background: var(--teal-light); }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }

  /* Main */
  .main { flex: 1; overflow: hidden; }

  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 { font-size: 18px; font-weight: 600; color: var(--navy); }
  .topbar .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: var(--teal); color: #fff; }
  .btn-primary:hover { background: var(--teal-light); }
  .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--gray-border); }
  .btn-ghost:hover { background: var(--gray-light); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .content { padding: 24px 32px; }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--white);
    border-radius: 10px;
    padding: 16px 20px;
    border: 1px solid var(--gray-border);
  }
  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--navy); font-variant-numeric: tabular-nums; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .stat-card.green .stat-value { color: var(--teal); }
  .stat-card.amber .stat-value { color: var(--amber); }
  .stat-card.red .stat-value { color: var(--red); }

  /* Table container */
  .table-container {
    background: var(--white);
    border-radius: 10px;
    border: 1px solid var(--gray-border);
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--gray-border);
  }
  .table-header h2 { font-size: 14px; font-weight: 600; color: var(--navy); }
  .table-header .count { font-size: 12px; color: var(--text-muted); margin-left: 8px; }

  .filter-row {
    display: flex; gap: 8px; align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid #f1efe8;
    background: #fafaf8;
  }
  .filter-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    cursor: pointer; border: 1px solid var(--gray-border);
    background: var(--white); color: var(--text-muted); transition: all 0.15s;
  }
  .filter-chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .filter-chip:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th {
    text-align: left; padding: 10px 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--text-muted); background: #fafaf8;
    border-bottom: 1px solid var(--gray-border);
    white-space: nowrap;
  }
  .data-table td {
    padding: 12px; font-size: 13px; color: var(--text);
    border-bottom: 1px solid #f1efe8; vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #fafaf9; }

  .data-table td.date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
  .data-table td.amount { font-weight: 600; color: var(--navy); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .data-table td.desc { max-width: 200px; }
  .data-table td.desc span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Status badges */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
    white-space: nowrap;
  }
  .badge-paid { background: var(--teal-bg); color: var(--teal); }
  .badge-pending { background: var(--amber-bg); color: var(--amber); }
  .badge-quote { background: var(--red-bg); color: var(--red); }
  .badge-confirm { background: #e6f1fb; color: #185fa5; }

  /* Status click */
  .status-cell { cursor: pointer; position: relative; }
  .status-cell:hover .badge { opacity: 0.8; }

  /* Payer chip */
  .payer { font-size: 11px; padding: 2px 8px; border-radius: 4px; }
  .payer-company { background: var(--gray-light); color: var(--gray); }
  .payer-boss { background: var(--amber-bg); color: var(--amber); }

  /* Category tag */
  .category { font-size: 11px; color: var(--text-muted); }

  /* Loading & empty */
  .loading { padding: 60px; text-align: center; color: var(--text-muted); }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--gray-border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { padding: 60px; text-align: center; color: var(--text-muted); font-size: 14px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--white); border-radius: 12px; width: 560px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto;
    transform: translateY(8px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-head {
    padding: 20px 24px; border-bottom: 1px solid var(--gray-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-size: 16px; font-weight: 600; color: var(--navy); }
  .modal-close { cursor: pointer; font-size: 20px; color: var(--text-muted); line-height: 1; }
  .modal-body { padding: 20px 24px; }
  .modal-foot {
    padding: 16px 24px; border-top: 1px solid var(--gray-border);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
  .form-control {
    padding: 9px 12px; border-radius: 6px; border: 1px solid var(--gray-border);
    font-size: 13px; color: var(--text); background: var(--white);
    outline: none; transition: border-color 0.15s; font-family: inherit;
  }
  .form-control:focus { border-color: var(--teal); }
  select.form-control { cursor: pointer; }

  /* Action dropdown */
  .action-btn { cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .action-btn:hover { background: var(--gray-light); color: var(--text); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy); color: #fff;
    padding: 12px 18px; border-radius: 8px; font-size: 13px;
    transform: translateY(80px); transition: transform 0.3s; z-index: 200;
  }
  .toast.show { transform: translateY(0); }

  /* Status dropdown */
  .status-select {
    appearance: none; background: transparent; border: none;
    cursor: pointer; font-size: 11px; padding: 3px 10px;
    border-radius: 20px; outline: none;
  }
  .status-select.paid { background: var(--teal-bg); color: var(--teal); }
  .status-select.pending { background: var(--amber-bg); color: var(--amber); }
  .status-select.quote { background: var(--red-bg); color: var(--red); }

  /* Fixed costs table */
  .fixed-table { width: 100%; border-collapse: collapse; }
  .fixed-table th {
    text-align: left; padding: 10px 16px;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    background: #fafaf8; border-bottom: 1px solid var(--gray-border);
  }
  .fixed-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f1efe8; }
  .fixed-table tr:last-child td { border-bottom: none; }
  .fixed-table .total { font-weight: 700; color: var(--navy); background: #f4f3ef; }

  @media (max-width: 900px) {
    .sidebar { width: 180px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">

          <label class="form-label">金額（NT$）</label>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="form-label">說明／用途</label>

    <div class="modal-foot">

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzZtlWYD6xGbDsundR3hYxRoofMle1gHeToNp7WNqlGysGIa5DciZOcwhuNnxf5a3MO/exec';

let currentSheet = 'dashboard';
let currentData = [];

const SHEET_NAMES = {
  'dashboard': '儀表板',
  '1_海保署海洋友善_付款帳': '海保署海洋友善行銷',
  '2_海保署月曆_付款帳': '海保署月曆',
  '3_冠球共編曆_付款帳': '冠球共編曆',
  '4_冠球利百代_付款帳': '冠球利百代',
  '5_冠球SEO_付款帳': '冠球SEO顧問',
  '6_冠球小型_付款帳': '冠球小型',
  '公司固定成本': '公司固定成本',
};

function getStatusClass(s) {
  if (!s) return 'quote';
  if (s.includes('已付')) return 'paid';
  if (s.includes('待付')) return 'pending';
  return 'quote';
}

function fmtAmount(v) {
  const n = parseInt(v) || 0;
  return 'NT$' + n.toLocaleString('zh-TW');
}

function fmtDate(v) {
  if (!v) return '';
  if (typeof v === 'object' && v.getFullYear) {
    return v.getFullYear() + '/' + String(v.getMonth()+1).padStart(2,'0') + '/' + String(v.getDate()).padStart(2,'0');
  }
  return String(v).replace('T',' ').substring(0,10);
}

async function fetchSheet(sheetName) {
  const res = await fetch(GAS_URL + '?sheetName=' + encodeURIComponent(sheetName));
  const json = await res.json();
  return json.data || [];
}

async function postData(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body),
  });
  return await res.json();
}

function switchSheet(name) {
  currentSheet = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('topbar-title').textContent = SHEET_NAMES[name] || name;
  loadCurrentSheet();
}

async function loadCurrentSheet() {
  const content = document.getElementById('content');
  document.getElementById('topbar-sub').textContent = '載入中...';
  content.innerHTML = '<div class="loading"><div class="spinner"></div>連接 Google Sheets...</div>';

  try {
    if (currentSheet === 'dashboard') {
      await renderDashboard();
    } else if (currentSheet === '公司固定成本') {
      await renderFixedCosts();
    } else {
      await renderPaymentSheet(currentSheet);
    }
    const now = new Date();
    document.getElementById('topbar-sub').textContent = '最後更新：' + now.toLocaleTimeString('zh-TW');
  } catch(e) {
    content.innerHTML = '<div class="empty">⚠️ 無法連接 Google Sheets<br><br><small>' + e.message + '</small></div>';
    document.getElementById('topbar-sub').textContent = '連線失敗';
  }
}

async function renderPaymentSheet(sheetName) {
  const data = await fetchSheet(sheetName);
  currentData = data;

  const rows = data.slice(5).filter(r => r[0] || r[1] || r[4]);
  const content = document.getElementById('content');

  const totalPaid = rows.filter(r => String(r[7]).includes('已付')).reduce((s, r) => s + (parseInt(r[4]) || 0), 0);
  const totalPending = rows.filter(r => String(r[7]).includes('待付')).reduce((s, r) => s + (parseInt(r[4]) || 0), 0);
  const totalQuote = rows.filter(r => String(r[7]).includes('待報價')).length;
  const total = rows.reduce((s, r) => s + (parseInt(r[4]) || 0), 0);

  let html = `
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">已付款</div>
        <div class="stat-value">${fmtAmount(totalPaid)}</div>
        <div class="stat-sub">${rows.filter(r=>String(r[7]).includes('已付')).length} 筆</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">待付款</div>
        <div class="stat-value">${fmtAmount(totalPending)}</div>
        <div class="stat-sub">${rows.filter(r=>String(r[7]).includes('待付')).length} 筆</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">待報價</div>
        <div class="stat-value">${totalQuote} 筆</div>
        <div class="stat-sub">尚未確認金額</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">總計支出</div>
        <div class="stat-value">${fmtAmount(total)}</div>
        <div class="stat-sub">全部記錄合計</div>
      </div>
    </div>
    <div class="table-container">
      <div class="table-header">
        <div><span style="font-size:14px;font-weight:600;color:var(--navy)">付款記錄</span><span class="count">${rows.length} 筆</span></div>
      </div>
      <div class="filter-row" id="filter-row">
        <span class="filter-chip active" onclick="filterRows('all',this)">全部</span>
        <span class="filter-chip" onclick="filterRows('paid',this)">✅ 已付</span>
        <span class="filter-chip" onclick="filterRows('pending',this)">⏳ 待付</span>
        <span class="filter-chip" onclick="filterRows('quote',this)">📋 待報價</span>
      </div>
      <div style="overflow-x:auto;">
      <table class="data-table" id="main-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>類別</th>
            <th>廠商</th>
            <th>說明</th>
            <th style="text-align:right">金額</th>
            <th>付款方式</th>
            <th>付款人</th>
            <th>狀態</th>
          </tr>
        </thead>
        <tbody>`;

  rows.forEach((r, i) => {
    const status = String(r[7] || '');
    const sc = getStatusClass(status);
    const payer = String(r[6] || '');
    const payerClass = payer.includes('老闆') ? 'payer-boss' : 'payer-company';
    html += `
      <tr data-status="${sc}">
        <td class="date">${fmtDate(r[0])}</td>
        <td><span class="category">${r[1] || ''}</span></td>
        <td>${r[2] || ''}</td>
        <td class="desc"><span title="${r[3] || ''}">${r[3] || ''}</span></td>
        <td class="amount">${r[4] ? fmtAmount(r[4]) : ''}</td>
        <td style="font-size:12px;color:var(--text-muted)">${r[5] || ''}</td>
        <td><span class="payer ${payerClass}">${payer}</span></td>
        <td class="status-cell">
          <select class="status-select ${sc}" onchange="updateStatus(this, ${i + 5 + 1}, '${sheetName}')">
            <option ${status.includes('已付') ? 'selected' : ''}>✅已付</option>
            <option ${status.includes('待付') && !status.includes('報價') ? 'selected' : ''}>⏳待付</option>
            <option ${status.includes('待報價') ? 'selected' : ''}>⏳待報價</option>
          </select>
        </td>
      </tr>`;
  });

  html += `</tbody></table></div></div>`;
  content.innerHTML = html;
}

async function renderFixedCosts() {
  const data = await fetchSheet('公司固定成本');
  const rows = data.slice(5).filter(r => r[0]);
  const content = document.getElementById('content');

  const total = rows.reduce((s, r) => s + (parseInt(r[1]) || 0), 0);

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">每月固定合計</div>
        <div class="stat-value">${fmtAmount(total)}</div>
        <div class="stat-sub">每月固定支出</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">年度預估</div>
        <div class="stat-value">${fmtAmount(total * 12)}</div>
        <div class="stat-sub">×12 個月</div>
      </div>
    </div>
    <div class="table-container">
      <div class="table-header">
        <div><span style="font-size:14px;font-weight:600;color:var(--navy)">每月固定支出</span></div>
      </div>
      <table class="fixed-table">
        <thead>
          <tr>
            <th>項目</th>
            <th style="text-align:right">每月金額</th>
            <th>說明</th>
            <th>付款方式</th>
          </tr>
        </thead>
        <tbody>`;

  rows.forEach(r => {
    html += `<tr>
      <td style="font-weight:500">${r[0]}</td>
      <td style="text-align:right;font-weight:600;color:var(--navy)">${fmtAmount(r[1])}</td>
      <td style="color:var(--text-muted);font-size:12px">${r[2] || ''}</td>
      <td style="color:var(--text-muted);font-size:12px">${r[3] || ''}</td>
    </tr>`;
  });

  html += `
    <tr class="total">
      <td>每月合計</td>
      <td style="text-align:right">${fmtAmount(total)}</td>
      <td colspan="2"></td>
    </tr>
    </tbody></table></div>`;

  document.getElementById('add-btn').style.display = 'none';
  content.innerHTML = html;
}

async function renderDashboard() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>彙整所有專案資料...</div>';

  const sheets = [
    '1_海保署海洋友善_付款帳',
    '2_海保署月曆_付款帳',
    '3_冠球共編曆_付款帳',
    '4_冠球利百代_付款帳',
    '5_冠球SEO_付款帳',
    '6_冠球小型_付款帳',
  ];

  let totalPaid = 0, totalPending = 0, totalQuote = 0, allRows = 0;
  let sheetStats = [];

  for (const name of sheets) {
    try {
      const data = await fetchSheet(name);
      const rows = data.slice(5).filter(r => r[0] || r[1] || r[4]);
      const paid = rows.filter(r=>String(r[7]).includes('已付')).reduce((s,r)=>s+(parseInt(r[4])||0),0);
      const pending = rows.filter(r=>String(r[7]).includes('待付')).reduce((s,r)=>s+(parseInt(r[4])||0),0);
      totalPaid += paid; totalPending += pending;
      totalQuote += rows.filter(r=>String(r[7]).includes('待報價')).length;
      allRows += rows.length;
      sheetStats.push({ name, displayName: SHEET_NAMES[name], paid, pending, count: rows.length });
    } catch(e) {}
  }

  let html = `
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-label">已付款總計</div>
        <div class="stat-value">${fmtAmount(totalPaid)}</div>
        <div class="stat-sub">所有專案合計</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">待付款總計</div>
        <div class="stat-value">${fmtAmount(totalPending)}</div>
        <div class="stat-sub">需要處理</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">待報價筆數</div>
        <div class="stat-value">${totalQuote} 筆</div>
        <div class="stat-sub">等廠商報價</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">總記錄數</div>
        <div class="stat-value">${allRows}</div>
        <div class="stat-sub">全部專案記錄</div>
      </div>
    </div>
    <div class="table-container">
      <div class="table-header">
        <div><span style="font-size:14px;font-weight:600;color:var(--navy)">專案支出概覽</span></div>
      </div>
      <table class="fixed-table">
        <thead>
          <tr>
            <th>專案</th>
            <th style="text-align:right">已付款</th>
            <th style="text-align:right">待付款</th>
            <th style="text-align:right">記錄數</th>
          </tr>
        </thead>
        <tbody>`;

  sheetStats.forEach(s => {
    html += `<tr>
      <td style="font-weight:500">${s.displayName}</td>
      <td style="text-align:right;color:var(--teal);font-weight:600">${fmtAmount(s.paid)}</td>
      <td style="text-align:right;color:var(--amber)">${fmtAmount(s.pending)}</td>
      <td style="text-align:right;color:var(--text-muted)">${s.count}</td>
    </tr>`;
  });

  html += `
    <tr class="total">
      <td>合計</td>
      <td style="text-align:right">${fmtAmount(totalPaid)}</td>
      <td style="text-align:right">${fmtAmount(totalPending)}</td>
      <td style="text-align:right">${allRows}</td>
    </tr>
    </tbody></table></div>`;

  document.getElementById('add-btn').style.display = 'none';
  content.innerHTML = html;
}

function filterRows(type, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#main-table tbody tr').forEach(tr => {
    if (type === 'all') { tr.style.display = ''; return; }
    const s = tr.dataset.status;
    tr.style.display = (s === type) ? '' : 'none';
  });
}

async function updateStatus(select, rowNum, sheetName) {
  const val = select.value;
  select.className = 'status-select ' + getStatusClass(val);
  try {
    await postData({ action: 'updateCell', sheetName, row: rowNum, col: 8, value: val });
    showToast('✅ 狀態已更新');
  } catch(e) {
    showToast('⚠️ 更新失敗，請重試');
  }
}

function openAddModal() {
  if (currentSheet === 'dashboard' || currentSheet === '公司固定成本') return;
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-date').value = today;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function submitAdd() {
  const row = [
    document.getElementById('f-date').value,
    document.getElementById('f-category').value,
    document.getElementById('f-vendor').value,
    document.getElementById('f-desc').value,
    parseInt(document.getElementById('f-amount').value) || 0,
    document.getElementById('f-method').value,
    document.getElementById('f-payer').value,
    document.getElementById('f-status').value,
    document.getElementById('f-note').value,
    ''
  ];

  try {
    await postData({ sheetName: currentSheet, row });
    closeModal();
    showToast('✅ 記錄已新增到 Google Sheets');
    setTimeout(() => loadCurrentSheet(), 1000);
  } catch(e) {
    showToast('⚠️ 新增失敗：' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('topbar-title').style.cssText = 'font-size:18px;font-weight:600;color:var(--navy)';
  document.getElementById('topbar-title').textContent = '儀表板';
  loadCurrentSheet();
});
</script>

</html>

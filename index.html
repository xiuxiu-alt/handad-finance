<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會飛的手｜財務管理系統</title>
<style>
  :root {
    --yellow: #F6C31C;
    --yellow-dark: #D9AB0E;
    --yellow-light: #FDF3C0;
    --yellow-bg: #FFFBE6;
    --gray: #9B9EA4;
    --gray-light: #F2F2F2;
    --gray-border: #E0E0E0;
    --black: #2C2C2A;
    --black-soft: #3D3D3A;
    --white: #FFFFFF;
    --red: #C0392B;
    --red-bg: #FDEDEB;
    --green: #27AE60;
    --green-bg: #E8F8EE;
    --amber: #E67E22;
    --amber-bg: #FEF3E2;
    --text: #2C2C2A;
    --text-muted: #9B9EA4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC','PingFang TC',-apple-system,sans-serif; background:#F5F5F3; color:var(--text); min-height:100vh; }
  .app { display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar { width:220px; background:var(--black); flex-shrink:0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .sidebar-logo { padding:24px 20px 18px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sidebar-logo .arrow { font-size:22px; color:var(--yellow); margin-bottom:8px; display:block; }
  .sidebar-logo .company { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:0.08em; }
  .sidebar-logo .title { font-size:14px; color:#fff; font-weight:600; margin-top:3px; letter-spacing:0.02em; }
  .sidebar-logo .subtitle { font-size:10px; color:var(--yellow); margin-top:2px; letter-spacing:0.06em; }
  .sidebar-nav { padding:10px 0; flex:1; }
  .nav-section { padding:14px 20px 5px; font-size:9px; letter-spacing:0.12em; color:rgba(255,255,255,0.25); text-transform:uppercase; }
  .nav-item { display:flex; align-items:center; gap:8px; padding:9px 20px; font-size:12.5px; color:rgba(255,255,255,0.55); cursor:pointer; border-left:2px solid transparent; transition:all 0.15s; }
  .nav-item:hover { color:rgba(255,255,255,0.9); background:rgba(255,255,255,0.05); }
  .nav-item.active { color:#fff; background:rgba(246,195,28,0.12); border-left-color:var(--yellow); }
  .nav-item .dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.2); flex-shrink:0; }
  .nav-item.active .dot { background:var(--yellow); }
  .nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:9px; padding:1px 6px; border-radius:10px; font-weight:600; }
  .sidebar-footer { padding:14px 20px; border-top:1px solid rgba(255,255,255,0.06); font-size:10px; color:rgba(255,255,255,0.2); }

  /* Main */
  .main { flex:1; overflow:hidden; }
  .topbar { background:var(--white); border-bottom:1px solid var(--gray-border); padding:14px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-tag { background:var(--yellow); color:var(--black); font-size:10px; font-weight:700; padding:2px 8px; border-radius:3px; letter-spacing:0.04em; }
  .topbar-left h1 { font-size:16px; font-weight:600; color:var(--black); }
  .topbar-left .sub { font-size:12px; color:var(--text-muted); }
  .topbar-actions { display:flex; gap:8px; align-items:center; }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:5px; font-size:12.5px; font-weight:500; cursor:pointer; border:none; transition:all 0.15s; font-family:inherit; }
  .btn-primary { background:var(--yellow); color:var(--black); font-weight:700; }
  .btn-primary:hover { background:var(--yellow-dark); }
  .btn-ghost { background:transparent; color:var(--gray); border:1px solid var(--gray-border); }
  .btn-ghost:hover { background:var(--gray-light); }
  .btn-sm { padding:5px 10px; font-size:11.5px; }
  .content { padding:24px 32px; }

  /* Alert */
  .alert-banner { border-radius:6px; padding:11px 16px; margin-bottom:18px; display:flex; align-items:center; gap:10px; border-left:3px solid; }
  .alert-banner.danger { background:var(--red-bg); border-color:var(--red); }
  .alert-banner.warn { background:var(--amber-bg); border-color:var(--amber); }
  .alert-text { font-size:13px; font-weight:500; }
  .alert-banner.danger .alert-text { color:var(--red); }
  .alert-banner.warn .alert-text { color:var(--amber); }

  /* Stats */
  .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
  .stat-card { background:var(--white); border-radius:8px; padding:14px 18px; border:1px solid var(--gray-border); }
  .stat-card.highlight { background:var(--yellow); border-color:var(--yellow-dark); }
  .stat-label { font-size:10px; color:var(--text-muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px; font-weight:600; }
  .stat-card.highlight .stat-label { color:var(--black-soft); opacity:0.65; }
  .stat-value { font-size:20px; font-weight:700; color:var(--black); font-variant-numeric:tabular-nums; }
  .stat-card.highlight .stat-value { color:var(--black); }
  .stat-sub { font-size:10px; color:var(--text-muted); margin-top:3px; }
  .stat-card.highlight .stat-sub { color:var(--black-soft); opacity:0.6; }
  .stat-card.red .stat-value { color:var(--red); }
  .stat-card.green .stat-value { color:var(--green); }

  /* Table container */
  .table-container { background:var(--white); border-radius:8px; border:1px solid var(--gray-border); overflow:hidden; }
  .table-header { padding:14px 18px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--gray-border); background:#FAFAF8; }
  .table-header h2 { font-size:13px; font-weight:700; color:var(--black); letter-spacing:0.02em; }
  .table-header .count { font-size:11px; color:var(--text-muted); margin-left:6px; }
  .filter-row { display:flex; gap:6px; padding:10px 16px; border-bottom:1px solid #F0F0EE; background:#FAFAF8; flex-wrap:wrap; }
  .filter-chip { padding:3px 11px; border-radius:20px; font-size:11px; cursor:pointer; border:1px solid var(--gray-border); background:var(--white); color:var(--text-muted); transition:all 0.12s; font-weight:500; }
  .filter-chip:hover { border-color:var(--black); color:var(--black); }
  .filter-chip.active { background:var(--black); color:#fff; border-color:var(--black); }
  .filter-chip.danger { border-color:var(--red); color:var(--red); }
  .filter-chip.danger.active { background:var(--red); color:#fff; }

  /* Table */
  .data-table { width:100%; border-collapse:collapse; }
  .data-table th { text-align:left; padding:9px 12px; font-size:10px; font-weight:700; letter-spacing:0.06em; color:var(--text-muted); background:#FAFAF8; border-bottom:1px solid var(--gray-border); white-space:nowrap; }
  .data-table td { padding:11px 12px; font-size:12.5px; color:var(--text); border-bottom:1px solid #F5F5F3; vertical-align:middle; }
  .data-table tr:last-child td { border-bottom:none; }
  .data-table tr:hover td { background:#FDFDF9; }
  .data-table tr.overdue td { background:#FFF8F7; }
  .data-table tr.due-soon td { background:#FFFDF5; }
  .data-table td.date { color:var(--text-muted); font-size:11.5px; white-space:nowrap; }
  .data-table td.amount { font-weight:700; color:var(--black); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; font-size:13px; }

  /* Due badge */
  .due-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .due-badge.overdue { background:var(--red-bg); color:var(--red); }
  .due-badge.due-soon { background:var(--amber-bg); color:var(--amber); }
  .due-badge.ok { color:var(--text-muted); font-size:11.5px; }
  .due-badge.empty { color:var(--gray-border); font-size:11px; }

  /* Status select */
  .status-select { appearance:none; border:none; cursor:pointer; font-size:11px; padding:3px 10px; border-radius:20px; outline:none; font-family:inherit; font-weight:600; }
  .status-select.paid { background:var(--green-bg); color:var(--green); }
  .status-select.pending { background:var(--yellow-light); color:#8A6D00; }
  .status-select.quote { background:var(--gray-light); color:var(--gray); }

  /* Links */
  .link-cell a { color:var(--black); font-size:11.5px; text-decoration:none; border-bottom:1px solid var(--yellow); padding-bottom:1px; }
  .link-cell a:hover { border-bottom-color:var(--black); }
  .link-add { color:var(--gray-border); font-size:11.5px; cursor:pointer; }
  .link-add:hover { color:var(--text-muted); }

  /* Payer */
  .payer { font-size:11px; padding:2px 7px; border-radius:3px; font-weight:600; }
  .payer-company { background:var(--gray-light); color:var(--gray); }
  .payer-boss { background:var(--yellow-light); color:#8A6D00; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(44,44,42,0.5); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--white); border-radius:10px; width:580px; max-width:95vw; max-height:90vh; overflow-y:auto; transform:translateY(8px); transition:transform 0.2s; border-top:3px solid var(--yellow); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-head { padding:18px 22px; border-bottom:1px solid var(--gray-border); display:flex; align-items:center; justify-content:space-between; }
  .modal-head h3 { font-size:15px; font-weight:700; color:var(--black); }
  .modal-close { cursor:pointer; font-size:20px; color:var(--text-muted); line-height:1; }
  .modal-body { padding:20px 22px; }
  .modal-foot { padding:14px 22px; border-top:1px solid var(--gray-border); display:flex; justify-content:flex-end; gap:8px; background:#FAFAF8; border-radius:0 0 10px 10px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group.full { grid-column:1/-1; }
  .form-label { font-size:11px; font-weight:700; color:var(--text-muted); letter-spacing:0.04em; text-transform:uppercase; }
  .form-control { padding:8px 11px; border-radius:5px; border:1px solid var(--gray-border); font-size:12.5px; color:var(--text); background:var(--white); outline:none; transition:border-color 0.15s; font-family:inherit; }
  .form-control:focus { border-color:var(--yellow); box-shadow:0 0 0 2px rgba(246,195,28,0.15); }

  /* Fixed costs */
  .fixed-table { width:100%; border-collapse:collapse; }
  .fixed-table th { text-align:left; padding:9px 16px; font-size:10px; font-weight:700; letter-spacing:0.06em; color:var(--text-muted); background:#FAFAF8; border-bottom:1px solid var(--gray-border); }
  .fixed-table td { padding:11px 16px; font-size:12.5px; border-bottom:1px solid #F5F5F3; }
  .fixed-table tr:last-child td { border-bottom:none; }
  .fixed-table .total td { font-weight:700; color:var(--black); background:var(--yellow-bg); border-top:2px solid var(--yellow); }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--black); color:#fff; padding:11px 18px; border-radius:6px; font-size:13px; border-left:3px solid var(--yellow); transform:translateY(80px); transition:transform 0.3s; z-index:200; }
  .toast.show { transform:translateY(0); }

  .loading { padding:60px; text-align:center; color:var(--text-muted); }
  .spinner { width:22px; height:22px; border:2px solid var(--gray-border); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .empty { padding:60px; text-align:center; color:var(--text-muted); font-size:13px; }

  @media (max-width:900px) {
    .sidebar { width:180px; }
    .stats-grid { grid-template-columns:repeat(2,1fr); }
    .content { padding:16px; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzZtlWYD6xGbDsundR3hYxRoofMle1gHeToNp7WNqlGysGIa5DciZOcwhuNnxf5a3MO/exec';
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let currentSheet = 'dashboard';
const SHEET_NAMES = {
  'dashboard':'儀表板','1_海保署海洋友善_付款帳':'海保署海洋友善',
  '2_海保署月曆_付款帳':'海保署月曆','3_冠球共編曆_付款帳':'冠球共編曆',
  '4_冠球利百代_付款帳':'冠球利百代','5_冠球SEO_付款帳':'冠球SEO',
  '6_冠球小型_付款帳':'冠球小型','公司固定成本':'公司固定成本'
};
const PAY_SHEETS = Object.keys(SHEET_NAMES).filter(k=>k.includes('付款帳'));

function sc(s){ if(!s)return'quote'; if(s.includes('已付'))return'paid'; if(s.includes('待付')&&!s.includes('報價'))return'pending'; return'quote'; }
function fmtAmt(v){ return'NT$'+(parseInt(v)||0).toLocaleString('zh-TW'); }
function fmtDate(v){ if(!v)return''; return String(v).substring(0,10).replace(/-/g,'/'); }
function dueDays(d){ if(!d)return null; const dt=new Date(d); dt.setHours(0,0,0,0); return Math.round((dt-TODAY)/(864e5)); }

function dueBadge(ds, paid){
  if(paid||!ds) return ds?`<span class="due-badge ok">${fmtDate(ds)}</span>`:`<span class="due-badge empty">—</span>`;
  const d=dueDays(ds);
  if(d<0) return`<span class="due-badge overdue">逾期 ${Math.abs(d)} 天</span>`;
  if(d<=3) return`<span class="due-badge due-soon">${d===0?'今天到期':d+'天後到期'}</span>`;
  return`<span class="due-badge ok">${fmtDate(ds)}</span>`;
}
function linkCell(url,label){ return url?`<a href="${url}" target="_blank">${label}</a>`:`<span class="link-add">+ 上傳</span>`; }

async function fetch_(name){ const r=await fetch(GAS_URL+'?sheetName='+encodeURIComponent(name)); return(await r.json()).data||[]; }
async function post_(b){ const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(b)}); return r.json(); }

function switchSheet(name,el){
  currentSheet=name;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topbar-title').textContent=SHEET_NAMES[name]||name;
  document.getElementById('add-btn').style.display=(name==='dashboard'||name==='公司固定成本')?'none':'';
  loadCurrentSheet();
}

async function loadCurrentSheet(){
  const c=document.getElementById('content');
  document.getElementById('topbar-sub').textContent='連線中...';
  c.innerHTML='<div class="loading"><div class="spinner"></div>載入中...</div>';
  try{
    if(currentSheet==='dashboard') await renderDashboard();
    else if(currentSheet==='公司固定成本') await renderFixed();
    else await renderPay(currentSheet);
    document.getElementById('topbar-sub').textContent='更新：'+new Date().toLocaleTimeString('zh-TW');
  }catch(e){
    c.innerHTML=`<div class="empty">⚠️ 連線失敗<br><small>${e.message}</small></div>`;
    document.getElementById('topbar-sub').textContent='連線失敗';
  }
}

async function renderPay(sheet){
  const data=await fetch_(sheet);
  const rows=data.slice(5).filter(r=>r[0]||r[1]||r[4]);
  const paid=rows.filter(r=>String(r[7]).includes('已付'));
  const pending=rows.filter(r=>String(r[7]).includes('待付')&&!String(r[7]).includes('報價'));
  const quote=rows.filter(r=>String(r[7]).includes('待報價'));
  const tPaid=paid.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const tPend=pending.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const overdue=pending.filter(r=>{const d=dueDays(r[10]);return d!==null&&d<0;});
  const soon=pending.filter(r=>{const d=dueDays(r[10]);return d!==null&&d>=0&&d<=3;});
  const c=document.getElementById('content');

  let html='';
  if(overdue.length) html+=`<div class="alert-banner danger"><span>🔴</span><span class="alert-text">有 ${overdue.length} 筆已逾期未付款，請立即處理！</span></div>`;
  if(soon.length) html+=`<div class="alert-banner warn"><span>⚠️</span><span class="alert-text">有 ${soon.length} 筆付款即將到期（3天內）</span></div>`;

  html+=`<div class="stats-grid">
    <div class="stat-card highlight"><div class="stat-label">待付款</div><div class="stat-value">${fmtAmt(tPend)}</div><div class="stat-sub">${pending.length} 筆待處理</div></div>
    <div class="stat-card green"><div class="stat-label">已付款</div><div class="stat-value">${fmtAmt(tPaid)}</div><div class="stat-sub">${paid.length} 筆</div></div>
    <div class="stat-card ${overdue.length?'red':''}"><div class="stat-label">逾期未付</div><div class="stat-value">${overdue.length} 筆</div><div class="stat-sub">${soon.length} 筆即將到期</div></div>
    <div class="stat-card"><div class="stat-label">待報價</div><div class="stat-value">${quote.length} 筆</div><div class="stat-sub">金額未確認</div></div>
  </div>
  <div class="table-container">
    <div class="table-header"><div><h2>付款記錄<span class="count">${rows.length} 筆</span></h2></div></div>
    <div class="filter-row">
      <span class="filter-chip active" onclick="filterRows('all',this)">全部</span>
      <span class="filter-chip" onclick="filterRows('paid',this)">✅ 已付</span>
      <span class="filter-chip" onclick="filterRows('pending',this)">⏳ 待付</span>
      <span class="filter-chip" onclick="filterRows('quote',this)">📋 待報價</span>
      ${overdue.length?`<span class="filter-chip danger" onclick="filterRows('overdue',this)">🔴 逾期 ${overdue.length}</span>`:''}
    </div>
    <div style="overflow-x:auto"><table class="data-table" id="main-table">
      <thead><tr>
        <th>日期</th><th>類別</th><th>廠商</th><th>說明</th>
        <th style="text-align:right">金額</th><th>付款人</th>
        <th>截止日</th><th>狀態</th><th>報價單</th><th>轉帳證明</th>
      </tr></thead><tbody>`;

  rows.forEach((r,i)=>{
    const s=String(r[7]||''), cls=sc(s), isPaid=cls==='paid';
    const payer=String(r[6]||'');
    const dl=String(r[10]||'');
    const days=dueDays(dl);
    const isOD=!isPaid&&days!==null&&days<0;
    const isDS=!isPaid&&days!==null&&days>=0&&days<=3;
    html+=`<tr data-status="${cls}" data-overdue="${isOD}" class="${isOD?'overdue':isDS?'due-soon':''}">
      <td class="date">${fmtDate(r[0])}</td>
      <td style="font-size:11.5px;color:var(--text-muted)">${r[1]||''}</td>
      <td style="font-weight:600">${r[2]||''}</td>
      <td style="font-size:11.5px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r[3]||''}">${r[3]||''}</td>
      <td class="amount">${r[4]?fmtAmt(r[4]):''}</td>
      <td><span class="payer ${payer.includes('老闆')?'payer-boss':'payer-company'}">${payer}</span></td>
      <td>${dueBadge(dl,isPaid)}</td>
      <td><select class="status-select ${cls}" onchange="updateSt(this,${i+6},'${sheet}')">
        <option ${s.includes('已付')?'selected':''}>✅已付</option>
        <option ${s.includes('待付')&&!s.includes('報價')?'selected':''}>⏳待付</option>
        <option ${s.includes('待報價')?'selected':''}>⏳待報價</option>
      </select></td>
      <td class="link-cell">${linkCell(r[9],'報價單')}</td>
      <td class="link-cell">${linkCell(r[11],'證明')}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  c.innerHTML=html;
}

async function renderFixed(){
  const data=await fetch_('公司固定成本');
  const rows=data.slice(5).filter(r=>r[0]);
  const total=rows.reduce((s,r)=>s+(parseInt(r[1])||0),0);
  const c=document.getElementById('content');
  let html=`<div class="stats-grid" style="grid-template-columns:repeat(2,1fr)">
    <div class="stat-card highlight"><div class="stat-label">每月固定合計</div><div class="stat-value">${fmtAmt(total)}</div><div class="stat-sub">固定支出</div></div>
    <div class="stat-card"><div class="stat-label">年度預估</div><div class="stat-value">${fmtAmt(total*12)}</div><div class="stat-sub">×12 個月</div></div>
  </div>
  <div class="table-container"><div class="table-header"><h2>每月固定支出</h2></div>
  <table class="fixed-table"><thead><tr><th>項目</th><th style="text-align:right">每月金額</th><th>說明</th><th>付款方式</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    html+=`<tr><td style="font-weight:600">${r[0]}</td><td style="text-align:right;font-weight:700">${fmtAmt(r[1])}</td><td style="color:var(--text-muted);font-size:12px">${r[2]||''}</td><td style="color:var(--text-muted);font-size:12px">${r[3]||''}</td></tr>`;
  });
  html+=`</tbody><tfoot><tr class="total"><td>每月合計</td><td style="text-align:right">${fmtAmt(total)}</td><td colspan="2"></td></tr></tfoot></table></div>`;
  c.innerHTML=html;
}

async function renderDashboard(){
  const c=document.getElementById('content');
  c.innerHTML='<div class="loading"><div class="spinner"></div>彙整所有專案...</div>';
  let tPaid=0,tPend=0,tOD=0,allOD=[];
  let stats=[];
  for(const name of PAY_SHEETS){
    try{
      const data=await fetch_(name);
      const rows=data.slice(5).filter(r=>r[0]||r[1]||r[4]);
      const paidR=rows.filter(r=>String(r[7]).includes('已付'));
      const pendR=rows.filter(r=>String(r[7]).includes('待付')&&!String(r[7]).includes('報價'));
      const paid=paidR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
      const pend=pendR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
      const odR=pendR.filter(r=>{const d=dueDays(r[10]);return d!==null&&d<0;});
      tPaid+=paid; tPend+=pend; tOD+=odR.length;
      odR.forEach(r=>allOD.push({s:SHEET_NAMES[name],v:r[2],d:dueDays(r[10])}));
      stats.push({name,display:SHEET_NAMES[name],paid,pend,od:odR.length,cnt:rows.length});
    }catch(e){}
  }
  let html='';
  if(allOD.length) html+=`<div class="alert-banner danger"><span>🔴</span><span class="alert-text">全公司共 ${allOD.length} 筆逾期：${allOD.slice(0,3).map(o=>`${o.v}（${Math.abs(o.d)}天）`).join('、')}${allOD.length>3?'...':''}</span></div>`;

  html+=`<div class="stats-grid">
    <div class="stat-card highlight"><div class="stat-label">待付款總計</div><div class="stat-value">${fmtAmt(tPend)}</div><div class="stat-sub">全部專案</div></div>
    <div class="stat-card green"><div class="stat-label">已付款總計</div><div class="stat-value">${fmtAmt(tPaid)}</div><div class="stat-sub">全部專案</div></div>
    <div class="stat-card ${tOD?'red':''}"><div class="stat-label">逾期未付</div><div class="stat-value">${tOD} 筆</div><div class="stat-sub">立即處理</div></div>
    <div class="stat-card"><div class="stat-label">進行中專案</div><div class="stat-value">${PAY_SHEETS.length}</div><div class="stat-sub">個專案</div></div>
  </div>
  <div class="table-container"><div class="table-header"><h2>專案支出概覽</h2></div>
  <table class="fixed-table"><thead><tr><th>專案</th><th style="text-align:right">已付款</th><th style="text-align:right">待付款</th><th style="text-align:right">逾期</th><th style="text-align:right">記錄</th></tr></thead><tbody>`;
  stats.forEach(s=>{
    html+=`<tr><td style="font-weight:600">${s.display}</td>
      <td style="text-align:right;color:var(--green);font-weight:700">${fmtAmt(s.paid)}</td>
      <td style="text-align:right;color:${s.od?'var(--red)':'#8A6D00'};font-weight:${s.od?700:400}">${fmtAmt(s.pend)}</td>
      <td style="text-align:right;color:${s.od?'var(--red)':'var(--text-muted)'};font-weight:${s.od?700:400}">${s.od?s.od+'筆':'—'}</td>
      <td style="text-align:right;color:var(--text-muted)">${s.cnt}</td>
    </tr>`;
  });
  html+=`<tr class="total"><td>合計</td><td style="text-align:right">${fmtAmt(tPaid)}</td><td style="text-align:right">${fmtAmt(tPend)}</td><td style="text-align:right;color:${tOD?'var(--red)':'var(--text-muted)'}">${tOD?tOD+'筆':'—'}</td><td></td></tr></tbody></table></div>`;
  c.innerHTML=html;
}

function filterRows(type,el){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#main-table tbody tr').forEach(tr=>{
    if(type==='all'){tr.style.display='';return;}
    if(type==='overdue'){tr.style.display=tr.dataset.overdue==='true'?'':'none';return;}
    tr.style.display=tr.dataset.status===type?'':'none';
  });
}

async function updateSt(sel,row,sheet){
  const val=sel.value; sel.className='status-select '+sc(val);
  try{ await post_({action:'updateCell',sheetName:sheet,row,col:8,value:val}); showToast('狀態已更新'); }
  catch(e){ showToast('⚠️ 更新失敗'); }
}

function openAddModal(){ if(currentSheet==='dashboard'||currentSheet==='公司固定成本')return; document.getElementById('f-date').value=new Date().toISOString().split('T')[0]; document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

async function submitAdd(){
  const row=[document.getElementById('f-date').value,document.getElementById('f-category').value,document.getElementById('f-vendor').value,document.getElementById('f-desc').value,parseInt(document.getElementById('f-amount').value)||0,document.getElementById('f-method').value,document.getElementById('f-payer').value,document.getElementById('f-status').value,document.getElementById('f-note').value,document.getElementById('f-quote').value,document.getElementById('f-deadline').value,document.getElementById('f-proof').value];
  try{ await post_({sheetName:currentSheet,row}); closeModal(); showToast('✅ 記錄已新增'); setTimeout(()=>loadCurrentSheet(),1000); }
  catch(e){ showToast('⚠️ 新增失敗'); }
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

document.addEventListener('DOMContentLoaded',()=>{ document.getElementById('add-btn').style.display='none'; loadCurrentSheet(); });
</script>
</body>
</html>

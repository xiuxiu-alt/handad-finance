// 分期展開預覽
function onExpandChange(){
  const sel=document.getElementById('p-expand');
  const inp=document.getElementById('p-expand-n');
  const dayInp=document.getElementById('p-expand-day');
  const prev=document.getElementById('p-expand-preview');
  if(sel.value==='custom'){
    inp.style.display='inline-block';
  } else {
    inp.style.display='none';
  }
  // 自動把「每月幾號」設為付款日的日數（如果還沒填）
  const date=document.getElementById('p0').value;
  if(date && dayInp && !dayInp.value){
    const d=new Date(date);
    if(!isNaN(d.getTime()))dayInp.value=d.getDate();
  }
  const n=getExpandCount();
  if(n<=1){prev.style.display='none';return;}
  const amt=parseInt(document.getElementById('p4').value)||0;
  const desc=document.getElementById('p3').value||'(說明)';
  if(!date){prev.innerHTML='⚠️ 請先填入付款日期';prev.style.display='block';return;}
  const day=parseInt(dayInp.value)||(new Date(date).getDate());
  const lines=[];
  for(let i=0;i<Math.min(n,5);i++){
    const dt=addMonthsWithDay(date,i,day);
    lines.push(`<div>📌 第 ${i+1} 期：${dt}　${desc}（${i+1}/${n}）　NT$${amt.toLocaleString('zh-TW')}</div>`);
  }
  if(n>5)lines.push(`<div style="color:var(--ink4)">… 共 ${n} 期</div>`);
  prev.innerHTML=`即將建立 <b>${n} 筆</b>付款記錄（每月 ${day} 號）：${lines.join('')}`;
  prev.style.display='block';
}
function getExpandCount(){
  const sel=document.getElementById('p-expand');
  if(!sel)return 1;
  if(sel.value==='custom'){
    return Math.max(1,parseInt(document.getElementById('p-expand-n').value)||1);
  }
  return parseInt(sel.value)||1;
}
function getExpandDay(){
  const dayInp=document.getElementById('p-expand-day');
  if(dayInp&&dayInp.value)return parseInt(dayInp.value)||1;
  const date=document.getElementById('p0').value;
  return date?new Date(date).getDate():1;
}
function addMonths(dateStr,months){
  const d=new Date(dateStr);
  if(isNaN(d.getTime()))return dateStr;
  const day=d.getDate();
  d.setMonth(d.getMonth()+months);
  if(d.getDate()!==day)d.setDate(0);
  return d.toISOString().split('T')[0];
}
// 加 N 月後落在指定的日（如「每月 5 號」），若該月沒有此日則用月底最後一日
function addMonthsWithDay(dateStr,months,day){
  const d=new Date(dateStr);
  if(isNaN(d.getTime()))return dateStr;
  d.setDate(1);  // 先設為 1 號避免跳月
  d.setMonth(d.getMonth()+months);
  // 嘗試設為指定日
  const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  d.setDate(Math.min(day,lastDay));
  return d.toISOString().split('T')[0];
}

async function submitPay(){
  const sheet=PKS.includes(cur)?cur+'_付款帳':null;
  if(!sheet){toast('⚠️ 請先選擇一個專案');return;}
  const baseDate=document.getElementById('p0').value;
  const baseDesc=document.getElementById('p3').value;
  const baseAmount=parseInt(document.getElementById('p4').value)||0;
  const baseDeadline=document.getElementById('p10').value;
  const baseStatus=document.getElementById('p7').value || '⏳待付';
  // 把勾選的執行項目編碼進備註欄
  const execTags=getSelectedExecTags();
  const baseNote=setExecTagsToNote(document.getElementById('p9').value,execTags);
  const buildRow=(date,desc,deadline,status)=>[date,document.getElementById('p1').value,document.getElementById('p2').value,desc,baseAmount,document.getElementById('p5').value,document.getElementById('p6').value,(status||'⏳待付'),baseNote,document.getElementById('p8').value,deadline,document.getElementById('p11').value];
  cdel(sheet);
  try{
    if(_editingPayIdx!=null){
      // 編輯模式：用 updateRow 一次寫入整列（比 12 次 updateCell 快 12 倍）
      const editingRow=window._curRows&&window._curRows[_editingPayIdx];
      const sheetRow=editingRow&&editingRow.__sheetRow?editingRow.__sheetRow:(_editingPayIdx+6);
      const row=buildRow(baseDate,baseDesc,baseDeadline,baseStatus);
      toast('儲存中...');
      await post({action:'updateRow',sheetName:sheet,row:sheetRow,values:row});
      closeModal('pay');toast('✅ 記錄已更新');setTimeout(render,500);
    } else {
      // 新增模式：檢查是否要分期展開
      const n=getExpandCount();
      if(n<=1){
        // 一次付清：單筆
        await post({sheetName:sheet,row:buildRow(baseDate,baseDesc,baseDeadline,baseStatus)});
        closeModal('pay');toast('✅ 記錄已新增');setTimeout(render,800);
      } else {
        // 分 N 期：建立 N 筆，每期日期 = 每月指定日
        const day=getExpandDay();
        if(!confirm(`即將建立 ${n} 筆付款記錄（每月 ${day} 號付款，共 ${n} 個月），確定嗎？`))return;
        // 鎖按鈕避免重複
        const submitBtn=document.querySelector('#ov-pay .mf .btn-y');
        if(submitBtn){submitBtn.disabled=true;submitBtn.textContent='🔄 建立中...';}
        let success=0;
        try{
          for(let i=0;i<n;i++){
            const d=addMonthsWithDay(baseDate,i,day);
            const dl=baseDeadline?addMonths(baseDeadline,i):'';
            const desc=`${baseDesc}（${i+1}/${n}）`;
            const st=i===0?baseStatus:'⏳待付';
            toast(`寫入中... ${i+1}/${n}`);
            await post({sheetName:sheet,row:buildRow(d,desc,dl,st)});
            success++;
          }
          closeModal('pay');
          toast(`✅ 已建立 ${success} 筆分期記錄（每月 ${day} 號）`);
          setTimeout(render,1200);
        }catch(e){
          toast(`⚠️ 寫入到第 ${success+1} 筆失敗: ${e.message}（前 ${success} 筆已成功）`);
        }finally{
          if(submitBtn){submitBtn.disabled=false;submitBtn.textContent='新增記錄';}
        }
      }
    }
  }catch(e){toast('⚠️ 失敗: '+e.message);}
}

async function toggleMonthlyPaid(itemName, markPaid){
  const ym = window._monthlyViewYM || (() => {
    const n=new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();
  cdel('月付狀態紀錄');
  
  // 防呆：sheet A 欄可能被自動解析為日期，正規化成 YYYY-MM
  const normalizeYM = (val) => {
    if(!val) return '';
    const s = String(val);
    if(/^\d{4}-\d{2}$/.test(s)) return s;
    if(/^\d{4}-\d{2}-/.test(s)) return s.substring(0,7);
    const d = new Date(s);
    if(!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return s;
  };
  
  try{
    // 找該月該項目是否已存在 row
    const data=await gs('月付狀態紀錄').catch(()=>[]);
    let foundRow=null;
    const targetName = itemName.trim();
    for(let i=1;i<data.length;i++){
      const r=data[i];
      if(r && normalizeYM(r[0])===ym && String(r[1]||'').trim()===targetName){
        foundRow=i+1;
        break;
      }
    }
    
    // 用 local time 取今天日期（避免 UTC 時差問題）
    const n2=new Date();
    const today=`${n2.getFullYear()}-${String(n2.getMonth()+1).padStart(2,'0')}-${String(n2.getDate()).padStart(2,'0')}`;
    const status=markPaid?'✅已付':'⏳待付';
    const paidDate=markPaid?today:'';
    
    if(foundRow){
      // 改既有列：用 updateCell（跟代墊款 toggle 同模式，已驗證可行）
      await post({action:'updateCell',sheetName:'月付狀態紀錄',row:foundRow,col:3,value:status});
      await post({action:'updateCell',sheetName:'月付狀態紀錄',row:foundRow,col:4,value:paidDate});
    }else{
      // 新增一列（append）
      await post({sheetName:'月付狀態紀錄',row:[ym,itemName,status,paidDate,'']});
    }
    
    cdel('月付狀態紀錄');
    toast(markPaid?'✅ 已標記為已付':'已改回待付');
    setTimeout(render,500);
  }catch(e){
    console.error('toggleMonthlyPaid error:', e);
    toast('⚠️ 切換失敗: '+(e&&e.message?e.message:'未知錯誤，請開 F12 看 console'));
  }
}

// ═══ EXEC ITEMS（執行項目對應）═══════════
// 從備註欄解析「[執行:項目名稱; 項目名稱]」標籤，回傳項目名稱陣列
function getExecTagsFromNote(note){
  if(!note)return[];
  const m=String(note).match(/\[執行:([^\]]+)\]/);
  if(!m)return[];
  return m[1].split(';').map(s=>s.trim()).filter(Boolean);
}
// 把執行項目陣列編碼回備註欄（保留使用者其他文字）
function setExecTagsToNote(note,tags){
  const cleanedNote=String(note||'').replace(/\s*\[執行:[^\]]+\]\s*/,'').trim();
  if(!tags||tags.length===0)return cleanedNote;
  const tag=`[執行:${tags.join('; ')}]`;
  return cleanedNote?`${cleanedNote} ${tag}`:tag;
}
// 動態載入當前專案的執行項目，渲染成多選 checkbox 清單
async function loadExecItems(preselectedTags){
  const wrap=document.getElementById('p-exec-wrap');
  const list=document.getElementById('p-exec-list');
  if(!wrap||!list)return;
  // 只有專案頁才顯示這個欄位
  if(!PKS.includes(cur)){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML='<div style="font-size:12px;color:var(--ink4)">載入中...</div>';
  try{
    const data=await gs(cur+'_總覽');
    // 抓取執行項目區（A 欄含「執行項目」字樣的下方至「執行預算合計」之前）
    let startIdx=-1, endIdx=-1;
    for(let i=0;i<data.length;i++){
      const c0=String(data[i][0]||'');
      if(c0.includes('執行項目')&&!c0.includes('追蹤')){startIdx=i+1;}
      if(startIdx>0&&c0.includes('執行預算合計')){endIdx=i;break;}
    }
    if(startIdx<0||endIdx<0){
      list.innerHTML='<div style="font-size:12px;color:var(--ink4)">此專案尚未設定執行項目</div>';
      return;
    }
    const items=[];
    for(let i=startIdx;i<endIdx;i++){
      const name=String(data[i][0]||'').trim();
      const budget=parseInt(data[i][1])||0;
      const used=parseInt(data[i][2])||0;
      if(!name||name.includes('(請新增'))continue;
      items.push({name,budget,used,remaining:budget-used});
    }
    if(items.length===0){
      list.innerHTML='<div style="font-size:12px;color:var(--ink4)">此專案尚未設定執行項目</div>';
      return;
    }
    const pre=preselectedTags||[];
    list.innerHTML=items.map(it=>{
      const checked=pre.includes(it.name)?'checked':'';
      const remColor=it.remaining<=0?'var(--re)':it.remaining<it.budget*0.2?'var(--am)':'var(--ink4)';
      return `<label style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--paper);border-radius:var(--r3);cursor:pointer;border:1px solid var(--paper3);font-size:13px">
        <input type="checkbox" class="p-exec-cb" value="${it.name.replace(/"/g,'&quot;')}" ${checked} style="width:16px;height:16px;cursor:pointer">
        <span style="flex:1;font-weight:600">${it.name}</span>
        <span style="font-size:11px;color:${remColor}">餘 ${$m(it.remaining)}</span>
      </label>`;
    }).join('');
  }catch(e){
    list.innerHTML='<div style="font-size:12px;color:var(--re)">載入執行項目失敗</div>';
  }
}
// 從目前勾選的 checkbox 拿到選中的執行項目名稱
function getSelectedExecTags(){
  return Array.from(document.querySelectorAll('.p-exec-cb:checked')).map(cb=>cb.value);
}

// 摺疊分組（收款進度、付款記錄）
function toggleGroup(id){
  const body=document.getElementById(id+'-body');
  const arrow=document.getElementById(id+'-arrow');
  const head=arrow?.parentElement;
  if(!body||!arrow)return;
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'';
  arrow.textContent=isOpen?'▶':'▼';
  if(head){
    if(isOpen)head.classList.add('collapsed');
    else head.classList.remove('collapsed');
  }
}
</script>

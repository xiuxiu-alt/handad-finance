<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HANDAD FINANCE 2026</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#111110;--ink2:#3A3A38;--ink3:#6B6B68;--ink4:#9A9A96;
  --paper:#FAFAF8;--paper2:#F0EFE9;--paper3:#E2E1DB;
  --y:#F6C31C;--yd:#D9AB0E;--yl:rgba(246,195,28,.15);
  --re:#B91C1C;--rl:rgba(185,28,28,.07);
  --gr:#166534;--gl:rgba(22,101,52,.07);
  --am:#92400E;--al:rgba(146,64,14,.08);
  --bl:#1E40AF;--bll:rgba(30,64,175,.07);
  --sans:'Noto Sans TC',-apple-system,sans-serif;
  --r3:3px;--r5:5px;--r8:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}

/* ── SPLASH ─── */
#splash{position:fixed;inset:0;background:var(--ink);display:grid;place-items:center;z-index:9999;transition:opacity .35s ease;}
#splash.out{opacity:0;pointer-events:none;}
.sp-brand{font-size:10px;letter-spacing:.18em;color:rgba(246,195,28,.6);text-transform:uppercase;margin-bottom:10px;}
.sp-logo{font-size:36px;font-weight:700;color:#fff;letter-spacing:-.03em;}
.sp-logo span{color:var(--y);}
.sp-bar{width:100px;height:2px;background:rgba(255,255,255,.08);margin:18px auto 0;border-radius:1px;overflow:hidden;}
.sp-fill{height:100%;background:var(--y);animation:sfill 1.4s cubic-bezier(.25,.1,.25,1) forwards;}
@keyframes sfill{0%{width:0%}100%{width:100%}}

/* ── LAYOUT ─── */
.app{display:none;min-height:100vh;}
.app.on{display:flex;}
.is-admin .adm-only{display:flex!important;}
.is-admin .adm-section{display:block!important;}
.adm-only{display:none;}
.adm-section{display:none;}

/* ── SIDEBAR ─── */
aside{width:200px;background:var(--ink);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-top{padding:16px 15px 13px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-brand{font-size:9px;letter-spacing:.14em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:5px;}
.sb-nm{font-size:14px;font-weight:700;color:#fff;}
.sb-sub{font-size:9px;color:var(--y);letter-spacing:.06em;margin-top:1px;}
.sb-user{margin-top:10px;display:flex;align-items:center;gap:8px;}
.av{width:26px;height:26px;border-radius:50%;background:var(--y);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;}
.un{font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rb{display:inline-block;font-size:9px;padding:1px 7px;border-radius:2px;margin-top:5px;font-weight:700;letter-spacing:.04em;}
.rb.adm{background:var(--y);color:var(--ink);}
.rb.stf{background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);}
.sb-nav{flex:1;padding:6px 0;}
.ns{padding:11px 15px 3px;font-size:9px;letter-spacing:.12em;color:rgba(255,255,255,.22);text-transform:uppercase;}
.ni{display:flex;align-items:center;gap:7px;padding:7px 15px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;border-left:2px solid transparent;transition:all .1s;}
.ni:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04);}
.ni.on{color:#fff;border-left-color:var(--y);background:rgba(246,195,28,.08);}
.ni .d{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.4;flex-shrink:0;}
.ni.on .d{background:var(--y);opacity:1;}
.ni .bd{margin-left:auto;background:var(--re);color:#fff;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;}
.sb-ft{padding:12px 15px;border-top:1px solid rgba(255,255,255,.07);}
.lo-btn{display:block;width:100%;padding:7px 10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r3);color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;font-family:inherit;transition:all .1s;text-align:left;}
.lo-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}

/* ── TOPBAR ─── */
.topbar{background:var(--paper);border-bottom:1px solid var(--paper3);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--paper3);}
.tb-l{display:flex;align-items:center;gap:10px;}
.tg{font-size:9px;letter-spacing:.1em;font-weight:700;background:var(--y);color:var(--ink);padding:3px 8px;border-radius:var(--r3);}
.tb-title{font-size:15px;font-weight:700;}
.tb-sub{font-size:12px;color:var(--ink4);}
.tb-r{display:flex;gap:6px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r5);font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .1s;font-family:inherit;line-height:1.4;}
.btn-y{background:var(--y);color:var(--ink);border-color:var(--yd);font-weight:700;}
.btn-y:hover{background:var(--yd);}
.btn-o{background:transparent;color:var(--ink3);border-color:var(--paper3);}
.btn-o:hover{background:var(--paper2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{background:transparent;color:var(--re);border-color:rgba(185,28,28,.3);}
.btn-danger:hover{background:var(--rl);}

/* ── CONTENT ─── */
.ct{padding:20px 22px;flex:1;overflow-y:auto;}
.ct-inner{max-width:1400px;margin:0 auto;}
.ld{padding:70px;text-align:center;color:var(--ink4);}

/* ── 2-COL GRID（同畫面兩個 block 並排） ─── */
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-items:start;margin-bottom:12px;}
.grid2 > *{margin-bottom:0;min-width:0;}
.col-full{grid-column:1/-1;}
@media (max-width:980px){.grid2{grid-template-columns:1fr;}}
.ring{width:24px;height:24px;border:2px solid var(--paper3);border-top-color:var(--y);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── ALERTS ─── */
.al{display:flex;align-items:center;gap:8px;border-left:3px solid;padding:9px 13px;border-radius:0 var(--r5) var(--r5) 0;margin-bottom:12px;font-size:13px;font-weight:500;}
.al.re{background:var(--rl);border-color:var(--re);color:var(--re);}
.al.am{background:var(--al);border-color:var(--am);color:var(--am);}
.al.bl{background:var(--bll);border-color:var(--bl);color:var(--bl);}
.al.gr{background:var(--gl);border-color:var(--gr);color:var(--gr);}

/* ── KPI ─── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.kpi-row.cols3{grid-template-columns:repeat(3,1fr);}
.kpi-row.cols2{grid-template-columns:repeat(2,1fr);}
.kc{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r8);padding:14px 16px;}
.kc.yl{background:var(--y);border-color:var(--yd);}
.kl{font-size:10px;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;font-weight:600;margin-bottom:5px;}
.kc.yl .kl{color:rgba(17,17,16,.5);}
.kv{font-size:22px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.1;letter-spacing:-.02em;}
.ks{font-size:12px;color:var(--ink4);margin-top:3px;}
.kc.yl .kv,.kc.yl .ks{color:var(--ink);}
.kc.re .kv{color:var(--re);}
.kc.gr .kv{color:var(--gr);}

/* ── PROGRESS ─── */
.prog{height:4px;background:var(--paper3);border-radius:2px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:2px;}
.fill-y{background:var(--y);}
.fill-am{background:#F59E0B;}
.fill-re{background:var(--re);}
.fill-gr{background:#16A34A;}

/* ── CARD ─── */
.card{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r8);overflow:hidden;margin-bottom:12px;}
.ch{padding:11px 15px;border-bottom:1px solid var(--paper3);display:flex;align-items:center;justify-content:space-between;background:var(--paper2);}
.ch h3{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.ch .meta{font-size:12px;color:var(--ink4);}

/* ── SECTION LABEL ─── */
.sl{display:flex;align-items:center;gap:8px;margin:14px 0 8px;}
.sl::before{content:'';width:3px;height:14px;background:var(--y);border-radius:2px;flex-shrink:0;}
.sl h4{font-size:13px;font-weight:700;}
.sl .sm{margin-left:auto;font-size:12px;color:var(--ink4);}

/* ── COST STRUCTURE ─── */
/* ── COST STRUCTURE（清單式，適合窄欄） ─── */
.cost-list{padding:4px 0;}
.cost-list .ci{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 16px;border-bottom:1px solid var(--paper2);}
.cost-list .ci:last-child{border-bottom:none;}
.cost-list .ci.total{background:linear-gradient(90deg,rgba(255,201,25,.12),rgba(255,201,25,.04));border-bottom:1px solid var(--yd);font-weight:700;}
.cost-list .ci-left{display:flex;flex-direction:column;min-width:0;flex:1;}
.cost-list .ci-nm{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
.cost-list .ci-ds{font-size:11px;color:var(--ink4);line-height:1.3;margin-top:2px;}
.cost-list .ci-right{display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.cost-list .ci-am{font-size:15px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.cost-list .ci.total .ci-am{font-size:17px;}
.cost-list .ci-pct{font-size:11px;color:var(--ink4);font-variant-numeric:tabular-nums;min-width:42px;text-align:right;}

/* ── TABLES ─── */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 11px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);background:var(--paper2);border-bottom:1px solid var(--paper3);white-space:nowrap;}
td{padding:7px 11px;font-size:13px;border-bottom:1px solid var(--paper2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(246,195,28,.04);}
tr.rod td{background:rgba(185,28,28,.04);}
tr.rds td{background:rgba(146,64,14,.04);}
td.num{font-variant-numeric:tabular-nums;font-weight:600;text-align:right;white-space:nowrap;}
td.dt{font-size:12px;color:var(--ink4);white-space:nowrap;}
tfoot td{font-weight:700;background:var(--paper2)!important;font-size:13px;border-top:2px solid var(--paper3)!important;}

/* 付款記錄表格：固定欄寬，避免在窄畫面下欄位被拉開 */
table.pay-table{table-layout:fixed;}
table.pay-table th:nth-child(1),table.pay-table td:nth-child(1){width:84px;}
table.pay-table th:nth-child(2),table.pay-table td:nth-child(2){width:90px;}
table.pay-table th:nth-child(3),table.pay-table td:nth-child(3){width:120px;}
table.pay-table th:nth-child(4),table.pay-table td:nth-child(4){width:auto;}
table.pay-table th:nth-child(5),table.pay-table td:nth-child(5){width:90px;}
table.pay-table th:nth-child(6),table.pay-table td:nth-child(6){width:80px;}
table.pay-table th:nth-child(7),table.pay-table td:nth-child(7){width:90px;}
table.pay-table th:nth-child(8),table.pay-table td:nth-child(8){width:100px;}
table.pay-table th:nth-child(9),table.pay-table td:nth-child(9){width:70px;}
table.pay-table th:nth-child(10),table.pay-table td:nth-child(10){width:70px;}
table.pay-table td{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── CHIPS ─── */
.chip{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:2px;font-weight:600;}
.chip.pd{background:var(--gl);color:var(--gr);}
.chip.pn{background:var(--yl);color:var(--am);}
.chip.qt{background:var(--paper2);color:var(--ink4);}
.chip.rc{background:var(--gl);color:var(--gr);}
.chip.pr{background:var(--yl);color:var(--am);}
.chip.od{background:var(--rl);color:var(--re);}
.ss{appearance:none;border:none;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:2px;outline:none;font-family:inherit;font-weight:600;}
.ss.pd{background:var(--gl);color:var(--gr);}
.ss.pn{background:var(--yl);color:var(--am);}
.ss.qt{background:var(--paper2);color:var(--ink4);}
.due{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:2px;font-weight:500;}
.due.od{background:var(--rl);color:var(--re);}
.due.ds{background:var(--al);color:var(--am);}
.due.ok{color:var(--ink4);}
.due.em{color:var(--paper3);}
.payer{font-size:11px;padding:1px 6px;border-radius:2px;font-weight:600;}
.py-co{background:var(--paper2);color:var(--ink4);}
.py-bo{background:var(--yl);color:var(--am);}
.lk a{color:var(--ink);font-size:12px;text-decoration:none;border-bottom:1px solid var(--y);}
.lk a:hover{border-bottom-color:var(--ink);}

/* ── FILTERS ─── */
.fr{display:flex;gap:5px;padding:9px 13px;border-bottom:1px solid var(--paper3);background:var(--paper2);flex-wrap:wrap;}
.fc{padding:3px 10px;border-radius:var(--r3);font-size:11px;cursor:pointer;border:1px solid var(--paper3);background:var(--paper);color:var(--ink4);transition:all .1s;font-weight:500;}
.fc:hover{border-color:var(--ink);color:var(--ink);}
.fc.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.fc.fc-red{border-color:var(--re);color:var(--re);}
.fc.fc-red.on{background:var(--re);color:#fff;}

/* ── BUDGET ROWS ─── */
.br-head,.br-row{display:grid;grid-template-columns:1fr 100px 100px 100px 110px 80px;align-items:center;gap:14px;padding:9px 16px;border-bottom:1px solid var(--paper2);}
.br-row:hover{background:rgba(246,195,28,.04);}
.br-nm{font-size:13px;font-weight:500;color:var(--ink2);display:flex;align-items:center;gap:8px;min-width:0;}
.br-nm-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.br-edit-btn{background:none;border:none;cursor:pointer;padding:2px 4px;color:var(--ink4);font-size:12px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.br-row:hover .br-edit-btn{opacity:1;}
.br-edit-btn:hover{color:var(--ink);}
.br-num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;}
.br-num.pos{color:var(--gr);}
.br-num.neg{color:var(--re);}
.br-head{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.br-row:last-child{border-bottom:none;}
.br-edit{display:flex;gap:4px;}

/* ── RECEIPT ROWS ─── */
.rr-head,.rr-row{display:grid;grid-template-columns:minmax(160px,260px) 110px 110px 110px 80px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--paper2);}
.rr-head{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.rr-row:last-child{border-bottom:none;}
.rr-row:hover{background:rgba(246,195,28,.03);}

/* ── FIXED COST GROUPS ─── */
.fg-head{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--paper2);border-bottom:1px solid var(--paper3);}
.fg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fg-nm{font-size:13px;font-weight:700;}
.fg-pct{font-size:11px;color:var(--ink4);}
.fg-total{margin-left:auto;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.fg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;border-bottom:1px solid var(--paper2);}
.fg-item:last-child{border-bottom:none;}
.fg-item:hover{background:rgba(246,195,28,.03);}
.fi-nm{font-size:13px;font-weight:500;color:var(--ink2);}
.fi-am{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;letter-spacing:-.01em;flex-shrink:0;}
.fi-ds{font-size:11px;color:var(--ink4);line-height:1.4;margin-top:2px;}
.fi-mt{font-size:11px;color:var(--ink4);text-align:right;}
.fi-cat-head{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}

/* ── BE (BREAK EVEN) ─── */
.be-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px;}
.be-item{padding:12px 14px;background:var(--paper2);border-radius:var(--r5);border:1px solid var(--paper3);}
.be-nm{font-size:12px;color:var(--ink3);margin-bottom:4px;}
.be-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;}
.be-ds{font-size:11px;color:var(--ink4);margin-top:2px;}

/* ── REMINDER ─── */
.rm-item{display:grid;grid-template-columns:100px 1fr 110px 90px 90px;align-items:center;gap:12px;padding:11px 14px;background:var(--paper2);border-radius:var(--r5);border:1px solid var(--paper3);border-left:3px solid var(--paper3);margin-bottom:7px;}
.rm-item.urg{border-left-color:var(--re);}
.rm-item.soon{border-left-color:#F59E0B;}
.rm-proj{font-size:11px;color:var(--ink4);}
.rm-nm{font-size:13px;font-weight:600;}
.rm-ds{font-size:11px;color:var(--ink4);}
.rm-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;}
.rm-due{font-size:12px;color:var(--ink4);}

/* ── VENDOR ─── */
.vd-row{display:grid;grid-template-columns:minmax(140px,180px) 1fr 100px 100px 100px;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--paper2);}
.vd-row.hd{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.vd-row:last-child{border-bottom:none;}
.vd-row:hover{background:rgba(246,195,28,.03);}
.vd-nm{font-size:13px;font-weight:600;}
.vd-tags{display:flex;gap:4px;flex-wrap:wrap;}
.vd-tag{font-size:10px;padding:1px 5px;border-radius:2px;background:var(--paper3);color:var(--ink3);}

/* ── ADVANCES ─── */
.adv-row{display:grid;grid-template-columns:90px minmax(120px,160px) minmax(180px,1fr) 100px 90px 100px 90px;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--paper2);}
.adv-row.hd{background:var(--paper2);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}

/* ── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(17,17,16,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .15s;}
.ov.on{opacity:1;pointer-events:all;}
.md{background:var(--paper);border-radius:var(--r8);width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;transform:translateY(8px);transition:transform .15s;border-top:3px solid var(--y);}
.ov.on .md{transform:translateY(0);}
.md-sm .md{width:420px;}
.mh{padding:15px 18px;border-bottom:1px solid var(--paper3);display:flex;align-items:center;justify-content:space-between;}
.mh h3{font-size:15px;font-weight:700;}
.mx{cursor:pointer;font-size:20px;color:var(--ink4);}
.mb{padding:18px;}
.mf{padding:12px 18px;border-top:1px solid var(--paper3);display:flex;justify-content:flex-end;gap:6px;background:var(--paper2);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fp{display:flex;flex-direction:column;gap:5px;}
.fp.full{grid-column:1/-1;}
.fl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4);}
.fi{padding:8px 11px;border:1px solid var(--paper3);border-radius:var(--r5);font-size:13px;color:var(--ink);background:var(--paper);outline:none;font-family:inherit;transition:border-color .1s;}
.fi:focus{border-color:var(--y);box-shadow:0 0 0 2px rgba(246,195,28,.12);}

/* ── INLINE EDIT ─── */

<script>
// ═══ CONFIG ═══════════════════════════════
const ADMINS = ['xiuxiu@handad.com.tw'];
const GAS = 'https://script.google.com/macros/s/AKfycbzZtlWYD6xGbDsundR3hYxRoofMle1gHeToNp7WNqlGysGIa5DciZOcwhuNnxf5a3MO/exec';
const CACHE_MS = 8 * 60 * 1000;

const PROJ = {'1_海保署海洋友善':'海洋友善行銷','2_海保署月曆':'海保署月曆','3_冠球共編曆':'冠球共編曆','4_冠球利百代':'冠球利百代','5_冠球SEO':'冠球SEO顧問','6_冠球小型':'冠球小型'};
const PKS = Object.keys(PROJ);
const PNS = {db:'儀表板',remind:'本月結帳提醒',vendors:'廠商清單',fixed:'公司固定成本',advances:'老闆代墊款',...Object.fromEntries(Object.entries(PROJ))};

let cur='db', role=null;
const T0=new Date(); T0.setHours(0,0,0,0);

// ═══ IDENTITY ════════════════════════════
netlifyIdentity.on('init',u=>u?boot(u):netlifyIdentity.open());
netlifyIdentity.on('login',u=>{netlifyIdentity.close();boot(u);});
netlifyIdentity.on('logout',()=>{document.getElementById('app').classList.remove('on');netlifyIdentity.open();});

function boot(u){
  role=ADMINS.includes(u.email)?'admin':'staff';
  const ini=(u.user_metadata?.full_name||u.email)[0].toUpperCase();
  document.getElementById('uAv').textContent=ini;
  document.getElementById('uNm').textContent=u.user_metadata?.full_name||u.email.split('@')[0];
  const rb=document.getElementById('uRb'); rb.textContent=role==='admin'?'負責人':'同仁';
  rb.className='rb '+(role==='admin'?'adm':'stf');
  const app=document.getElementById('app');
  if(role==='admin'){app.classList.add('is-admin');document.getElementById('tg').textContent='ADMIN';}
  else document.getElementById('tg').textContent='STAFF';
  setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.style.display='none',380);},1400);
  app.classList.add('on');
  render();
}

// ═══ CACHE ════════════════════════════════
function cget(k){try{const x=JSON.parse(sessionStorage.getItem('hf_'+k));if(x&&Date.now()-x.t<CACHE_MS)return x.d;}catch(e){}return null;}
function cset(k,d){try{sessionStorage.setItem('hf_'+k,JSON.stringify({t:Date.now(),d}));}catch(e){}}
function cdel(k){try{sessionStorage.removeItem('hf_'+k);}catch(e){}}

// ═══ FETCH ════════════════════════════════
async function gs(name){
  const c=cget(name); if(c)return c;
  const r=await fetch(GAS+'?sheetName='+encodeURIComponent(name));
  const j=await r.json();
  if(j.error)throw new Error(j.error);
  cset(name,j.data||[]);
  return j.data||[];
}
async function post(body){
  const r=await fetch(GAS,{method:'POST',body:JSON.stringify(body)});
  return r.json();
}

// ═══ HELPERS ══════════════════════════════
const $m=v=>'NT$'+(parseInt(v)||0).toLocaleString('zh-TW');
const $d=v=>v?String(v).substring(0,10).replace(/-/g,'/'):' ';
const $dd=d=>{if(!d)return null;const t=new Date(d);t.setHours(0,0,0,0);return Math.round((t-T0)/864e5);};
const $p=(a,b)=>b>0?Math.min(100,Math.round(a/b*100)):0;
const $sc=s=>!s?'qt':s.includes('已付')?'pd':s.includes('待付')&&!s.includes('報價')?'pn':'qt';
const $pf=p=>p>100?'fill-re':p>85?'fill-am':'fill-y';
// Filter out template placeholder rows
const SKIP_WORDS=['(請','請新增','合計','小計','類別範','老闆代墊','執行項目類'];
const SUBHEADER_PATTERNS=[/^存在日曆\s*SEO\s*$/,/^包裝研究所\s*SEO\s*$/,/^海保署/,/^冠球/,/^利百代/,/^月曆/,/^海洋友善/];
const $valid=r=>{
  // 改為以「廠商欄(C)」為主判斷：A 欄日期可空白（待估價/待付情況），但廠商欄一定要有
  const vendor=String(r[2]||'').trim();
  if(!vendor)return false;
  if(SKIP_WORDS.some(w=>vendor.includes(w)))return false;
  if(SUBHEADER_PATTERNS.some(p=>p.test(vendor)))return false;
  // 同時也過濾 A 欄出現 SKIP_WORDS（例如 sub-header 寫在 A 欄）
  const dateCol=String(r[0]||'');
  if(dateCol&&SKIP_WORDS.some(w=>dateCol.includes(w)))return false;
  return true;
};

function $due(dl,paid){
  if(paid||!dl||dl==='undefined'||dl===' ')return dl&&dl!==' '?`<span class="due ok">${$d(dl)}</span>`:`<span class="due em">—</span>`;
  const d=$dd(dl);if(d===null)return`<span class="due em">—</span>`;
  if(d<0)return`<span class="due od">逾期${Math.abs(d)}天</span>`;
  if(d<=3)return`<span class="due ds">${d===0?'今天到期':d+'天後'}</span>`;
  return`<span class="due ok">${$d(dl)}</span>`;
}
function $lk(url,lbl){return url&&url.startsWith('http')?`<a href="${url}" target="_blank">${lbl}</a>`:`<span style="color:var(--paper3)">—</span>`;}
function $st(s,row,sheet){
  const c=$sc(s);
  if(role==='staff')return`<span class="chip ${c}">${s||'—'}</span>`;
  return`<select class="ss ${c}" onchange="upSt(this,${row},'${sheet}')"><option ${s.includes('已付')?'selected':''}>✅已付</option><option ${s.includes('待付')&&!s.includes('報價')?'selected':''}>⏳待付</option><option ${s.includes('待報價')?'selected':''}>⏳待報價</option></select>`;
}

// ═══ NAV ══════════════════════════════════
function go(el){
  if(role==='staff'&&['fixed','advances'].includes(el.dataset.k))return;
  cur=el.dataset.k;
  document.querySelectorAll('.ni').forEach(i=>i.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tt').textContent=PNS[cur]||cur;
  const isproj=PKS.includes(cur);
  // addBtn now embedded in 付款記錄 section
  document.getElementById('csvBtn').style.display=isproj?'':'none'; // keep CSV in topbar
  document.getElementById('advBtn').style.display=(cur==='advances'&&role==='admin')?'':'none';
  render();
}

async function render(){
  const ct=document.getElementById('ct');
  document.getElementById('ts').textContent='連線中...';
  ct.innerHTML=`<div class="ld"><div class="ring"></div>載入中...</div>`;
  try{
    if(cur==='db')await rDB();
    else if(cur==='remind')await rRemind();
    else if(cur==='vendors')await rVendors();
    else if(cur==='fixed')await rFixed();
    else if(cur==='advances')await rAdvances();
    else await rProj(cur);
    document.getElementById('ts').textContent='更新 '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){
    ct.innerHTML=`<div class="ld" style="color:var(--re)">⚠️ 載入失敗<br><small style="color:var(--ink4)">${e.message}</small></div>`;
    document.getElementById('ts').textContent='連線失敗';
  }
}

// ═══ DASHBOARD ════════════════════════════
async function rDB(){
  const results=await Promise.all(PKS.map(k=>gs(k+'_付款帳').catch(()=>[])));
  let tP=0,tPn=0,tOD=0,odList=[],stats=[];
  results.forEach((d,i)=>{
    const k=PKS[i], rows=d.slice(5).filter($valid);
    const pR=rows.filter(r=>String(r[7]).includes('已付'));
    const pnR=rows.filter(r=>String(r[7]).includes('待付')&&!String(r[7]).includes('報價'));
    const p=pR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
    const pn=pnR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
    const od=pnR.filter(r=>{const d=$dd(r[10]);return d!==null&&d<0;});
    tP+=p;tPn+=pn;tOD+=od.length;
    od.forEach(r=>odList.push({proj:PROJ[k],vendor:r[2],days:Math.abs($dd(r[10]))}));
    stats.push({k,nm:PROJ[k],p,pn,od:od.length,cnt:rows.length});
  });
  const rdBd=document.getElementById('rdBd');
  tOD>0?(rdBd.style.display='',rdBd.textContent=tOD):(rdBd.style.display='none');
  
  let h='';
  if(odList.length)h+=`<div class="al re">🔴 逾期 ${odList.length} 筆：${odList.slice(0,3).map(o=>`${o.vendor}（${o.days}天）`).join('、')}${odList.length>3?'…':''}</div>`;
  
  h+=`<div class="kpi-row">
    <div class="kc yl"><div class="kl">待付款</div><div class="kv">${$m(tPn)}</div><div class="ks">需處理</div></div>
    <div class="kc gr"><div class="kl">已付款</div><div class="kv">${$m(tP)}</div><div class="ks">全部專案</div></div>
    <div class="kc ${tOD?'re':''}"><div class="kl">逾期未付</div><div class="kv">${tOD} 筆</div><div class="ks">立即處理</div></div>
    <div class="kc"><div class="kl">進行中專案</div><div class="kv">${PKS.length}</div><div class="ks">個</div></div>
  </div>
  <div class="card"><div class="ch"><h3>專案支出概覽</h3><span class="meta">點擊列可進入專案</span></div>
  <div class="tw"><table><thead><tr><th>專案</th><th style="text-align:right">已付款</th><th style="text-align:right">待付款</th><th style="min-width:120px">付款進度</th><th style="text-align:right">逾期</th><th style="text-align:right">筆數</th></tr></thead><tbody>`;
  stats.forEach(s=>{
    const tot=s.p+s.pn,pct=$p(s.p,tot);
    h+=`<tr style="cursor:pointer" onclick="document.querySelector('[data-k=${s.k}]').click()">
      <td style="font-weight:600">${s.nm}</td>
      <td class="num" style="color:var(--gr)">${$m(s.p)}</td>
      <td class="num" style="color:var(--am)">${$m(s.pn)}</td>
      <td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill ${$pf(pct)}" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4);width:32px;text-align:right;flex-shrink:0">${pct}%</span></div></td>
      <td class="num" style="color:${s.od?'var(--re)':'var(--ink4)'}">${s.od?s.od+'筆':'—'}</td>
      <td class="num" style="color:var(--ink4)">${s.cnt}</td>
    </tr>`;
  });
  h+=`<tfoot><tr><td>合計</td><td class="num" style="color:var(--gr)">${$m(tP)}</td><td class="num" style="color:var(--am)">${$m(tPn)}</td><td></td><td class="num" style="color:${tOD?'var(--re)':'var(--ink4)'}">${tOD?tOD+'筆':'—'}</td><td></td></tr></tfoot></tbody></table></div></div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ PROJECT ══════════════════════════════
async function rProj(key){
  const [ov,pay]=await Promise.all([gs(key+'_總覽').catch(()=>[]),gs(key+'_付款帳').catch(()=>[])]);
  const rows=pay.slice(5).filter($valid);
  const pR=rows.filter(r=>String(r[7]).includes('已付'));
  const pnR=rows.filter(r=>String(r[7]).includes('待付')&&!String(r[7]).includes('報價'));
  const qR=rows.filter(r=>String(r[7]).includes('待報價'));
  const tP=pR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const tPn=pnR.reduce((s,r)=>s+(parseInt(r[4])||0),0);
  const od=pnR.filter(r=>{const d=$dd(r[10]);return d!==null&&d<0;});
  const soon=pnR.filter(r=>{const d=$dd(r[10]);return d!==null&&d>=0&&d<=3;});

  // Parse overview
  let projTotal=0,costItems=[],budgetRows=[],receiptRows=[];
  if(ov.length>5){
    projTotal=parseInt(ov[5]?.[1])||0;
    for(let i=6;i<=9;i++){const r=ov[i];if(r?.[0]&&!String(r[0]).includes('▌'))costItems.push({nm:String(r[0]),am:parseInt(r[1])||0,pct:String(r[2]||''),ds:String(r[3]||'')});}
    // Budget rows: find rows between header and 合計
    let budgetStart=-1,budgetEnd=-1;
    for(let i=0;i<ov.length;i++){
      if(String(ov[i]?.[0]||'').includes('執行項目')&&ov[i]?.[1])budgetStart=i+1;
      if(budgetStart>0&&String(ov[i]?.[0]||'').includes('合計')&&i>budgetStart){budgetEnd=i;break;}
    }
    if(budgetStart>0){
      for(let i=budgetStart;i<(budgetEnd>0?budgetEnd:ov.length);i++){
        const r=ov[i];
        if(!r||!r[0]||String(r[0]).includes('(請')||String(r[0]).trim()==='')continue;
        budgetRows.push({nm:String(r[0]),budget:parseInt(r[1])||0,actual:parseInt(r[2])||0,remain:parseInt(r[3])||0,st:String(r[4]||''),rowNum:i+1});
      }
    }
    // Receipt rows
    let rcStart=-1;
    for(let i=0;i<ov.length;i++){
      if(String(ov[i]?.[0]||'').includes('期數')||String(ov[i]?.[0]||'').includes('客戶收款'))rcStart=i+1;
    }
    if(rcStart>0){
      for(let i=rcStart;i<ov.length;i++){
        const r=ov[i];
        if(!r||!r[0]||String(r[0]).includes('合計')||String(r[0]).includes('▌'))continue;
        if(r[1])receiptRows.push({desc:String(r[0]),amount:parseInt(r[1])||0,date:String(r[2]||''),actual:parseInt(r[3])||0,st:String(r[4]||'')});
      }
    }
  }

  let h='';
  if(od.length)h+=`<div class="al re">🔴 ${od.length} 筆逾期付款</div>`;
  if(soon.length)h+=`<div class="al am">⚠️ ${soon.length} 筆即將到期（3天內）</div>`;
  if(role==='staff')h+=`<div class="al bl">ℹ️ 同仁模式 — 可新增記帳、查看報價單與轉帳證明</div>`;

  h+=`<div class="kpi-row">
    <div class="kc yl"><div class="kl">待付款</div><div class="kv">${$m(tPn)}</div><div class="ks">${pnR.length} 筆待處理</div></div>
    <div class="kc gr"><div class="kl">已付款</div><div class="kv">${$m(tP)}</div><div class="ks">${pR.length} 筆</div></div>
    <div class="kc ${od.length?'re':''}"><div class="kl">逾期未付</div><div class="kv">${od.length} 筆</div><div class="ks">${soon.length} 筆即將到期</div></div>
    <div class="kc"><div class="kl">待報價</div><div class="kv">${qR.length} 筆</div><div class="ks">金額未確認</div></div>
  </div>`;
  // ── 成本結構 + 客戶收款進度（同畫面並排顯示）
  const _showCost = projTotal>0||costItems.length>0;
  const _showReceipt = receiptRows.length>0;
  const _pair = _showCost && _showReceipt;
  if(_pair) h+=`<div class="grid2">`;


  // 成本結構
  if(projTotal>0||costItems.length>0){
    h+=`<div class="card"><div class="ch"><h3>成本結構</h3><span class="meta">專案總金額 ${$m(projTotal)}</span></div>
    <div class="cost-list">
      <div class="ci total">
        <div class="ci-left"><div class="ci-nm">專案總金額</div></div>
        <div class="ci-right"><div class="ci-am">${$m(projTotal)}</div><div class="ci-pct">100%</div></div>
      </div>`;
    costItems.forEach(c=>h+=`<div class="ci">
      <div class="ci-left"><div class="ci-nm">${c.nm}</div>${c.ds?`<div class="ci-ds">${c.ds}</div>`:''}</div>
      <div class="ci-right"><div class="ci-am">${$m(c.am)}</div><div class="ci-pct">${c.pct}</div></div>
    </div>`);
    h+=`</div></div>`;
  }

  // 客戶收款進度
  if(receiptRows.length>0){
    const totS=receiptRows.reduce((s,r)=>s+r.amount,0);
    const totR=receiptRows.reduce((s,r)=>s+r.actual,0);
    const pct=$p(totR,totS);
    h+=`<div class="card"><div class="ch"><h3>客戶收款進度</h3><span class="meta">已收 ${$m(totR)} / ${$m(totS)} (${pct}%)</span></div>
    <div style="padding:6px 14px 10px;border-bottom:1px solid var(--paper3)">
      <div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill fill-gr" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4)">${pct}%</span></div>
    </div>
    <div class="rr-head"><span>期數/說明</span><span style="text-align:right">應收金額</span><span>預計收款日</span><span style="text-align:right">實際到帳</span><span>狀態</span></div>`;
    receiptRows.forEach(r=>{
      const sc=r.st.includes('已收')?'rc':'pr';
      h+=`<div class="rr-row"><span style="font-weight:600">${r.desc}</span><span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right">${$m(r.amount)}</span><span style="font-size:12px;color:var(--ink4)">${$d(r.date)}</span><span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right;color:${r.actual>0?'var(--gr)':'var(--ink4)'}">${r.actual>0?$m(r.actual):'—'}</span><span><span class="chip ${sc}">${r.st}</span></span></div>`;
    });
    h+=`</div>`;
  }
  if(_pair) h+=`</div>`;


  // 執行預算追蹤
  if(budgetRows.length>0){
    const totB=budgetRows.reduce((s,r)=>s+r.budget,0);
    const totA=budgetRows.reduce((s,r)=>s+r.actual,0);
    const pct=$p(totA,totB);
    h+=`<div class="card"><div class="ch"><h3>執行預算追蹤</h3>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="meta">已使用 ${$m(totA)} / ${$m(totB)} (${pct}%)</span>
        ${role==='admin'?`<button class="btn btn-o btn-sm" onclick="showAddBudget('${key}',${budgetRows.length>0?budgetRows[budgetRows.length-1].rowNum+1:14})">+ 新增項目</button>`:''}
      </div></div>
    <div style="padding:6px 14px 10px;border-bottom:1px solid var(--paper3)">
      <div style="display:flex;align-items:center;gap:6px"><div style="flex:1"><div class="prog"><div class="prog-fill ${$pf(pct)}" style="width:${pct}%"></div></div></div><span style="font-size:12px;color:var(--ink4)">${pct}%</span></div>
    </div>
    <div class="br-head"><span>執行項目</span><span style="text-align:right">預算</span><span style="text-align:right">已支出</span><span style="text-align:right">剩餘</span><span style="text-align:right">使用率</span><span>狀態</span></div>`;
    budgetRows.forEach(r=>{
      const rp=$p(r.actual,r.budget);
      const stc=r.st.includes('超支')?'od':r.st.includes('用罄')?'pd':r.st.includes('結餘')?'pn':'qt';
      h+=`<div class="br-row" id="br-${r.rowNum}">
        <span class="br-nm" title="${r.nm}">
          <span class="br-nm-text">${r.nm}</span>
          ${role==='admin'?`<button class="br-edit-btn" onclick="editBudgetRow('${key}',${r.rowNum},'${r.nm.replace(/'/g,"\\'")}',${r.budget})" title="編輯">✏️</button>`:''}
        </span>
        <span class="br-num">${$m(r.budget)}</span>
        <span class="br-num pos">${$m(r.actual)}</span>
        <span class="br-num ${r.remain<0?'neg':''}">${$m(r.remain)}</span>
        <span style="text-align:right"><div style="display:flex;align-items:center;gap:5px;justify-content:flex-end"><div style="width:50px"><div class="prog"><div class="prog-fill ${$pf(rp)}" style="width:${Math.min(100,rp)}%"></div></div></div><span style="font-size:11px;color:var(--ink4);width:32px;text-align:right">${rp}%</span></div></span>
        <span><span class="chip ${stc}" style="font-size:11px">${r.st}</span></span>
      </div>`;
    });
    const totR=budgetRows.reduce((s,r)=>s+r.remain,0);
    h+=`<div class="br-row" style="background:var(--paper2);font-weight:700"><span class="br-nm"><span class="br-nm-text">合計</span></span><span class="br-num">${$m(totB)}</span><span class="br-num pos">${$m(totA)}</span><span class="br-num ${totR<0?'neg':''}">${$m(totR)}</span><span></span><span></span></div></div>`;
  }

  // 付款記錄
  h+=`<div class="card"><div class="ch"><h3>付款記錄</h3><div style="display:flex;align-items:center;gap:8px"><span class="meta">${rows.length} 筆</span>${PKS.includes(cur)&&role!=='readonly'?`<button class="btn btn-y btn-sm" onclick="openModal('pay')">+ 新增記帳</button>`:''}</div></div>
  <div class="fr"><span class="fc on" onclick="filt('all',this)">全部 (${rows.length})</span><span class="fc" onclick="filt('pd',this)">✅ 已付 (${pR.length})</span><span class="fc" onclick="filt('pn',this)">⏳ 待付 (${pnR.length})</span><span class="fc" onclick="filt('qt',this)">📋 待報價 (${qR.length})</span>${od.length?`<span class="fc fc-red" onclick="filt('od',this)">🔴 逾期 (${od.length})</span>`:''}</div>
  <div class="tw"><table class="pay-table" id="pt"><thead><tr><th>日期</th><th>類別</th><th>廠商</th><th>說明</th><th style="text-align:right">金額</th><th>付款人</th><th>截止日</th><th>狀態</th><th>報價單</th><th>轉帳證明</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const s=String(r[7]||''),sc=$sc(s),ip=sc==='pd';
    const py=String(r[6]||''),dl=String(r[10]||'');
    const dd=$dd(dl),isOD=!ip&&dd!==null&&dd<0,isDS=!ip&&dd!==null&&dd>=0&&dd<=3;
    h+=`<tr data-sc="${sc}" data-od="${isOD}" class="${isOD?'rod':isDS?'rds':''}">
      <td class="dt">${$d(r[0])}</td><td style="font-size:12px;color:var(--ink4)">${r[1]||''}</td>
      <td style="font-weight:600">${r[2]||''}</td>
      <td style="font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r[3]||''}">${r[3]||''}</td>
      <td class="num">${r[4]?$m(r[4]):''}</td>
      <td><span class="payer ${py.includes('老闆')?'py-bo':'py-co'}">${py}</span></td>
      <td>${$due(dl,ip)}</td><td>${$st(s,i+6,key+'_付款帳')}</td>
      <td class="lk">${$lk(r[9],'報價單')}</td><td class="lk">${$lk(r[11],'證明')}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
  window._curRows=rows;window._curKey=key;
}

// ═══ BUDGET INLINE EDIT ═══════════════════
function editBudgetRow(key,rowNum,nm,budget){
  const row=document.getElementById('br-'+rowNum);
  if(!row)return;
  const first=row.querySelector('.br-nm');
  first.style.display='block';
  first.innerHTML=`<input class="ie-input" id="ie-nm" value="${nm}" style="width:140px"><br>
    <div style="display:flex;gap:5px;margin-top:4px">
      <input class="ie-input" id="ie-bud" type="number" value="${budget}" placeholder="預算" style="width:100px">
    </div>
    <div class="ie-actions">
      <button class="ie-save" onclick="saveBudgetRow('${key}',${rowNum})">✓ 儲存</button>
      <button class="ie-cancel" onclick="rProj('${key}')">✕ 取消</button>
    </div>`;
}

async function saveBudgetRow(key,rowNum){
  const nm=document.getElementById('ie-nm').value.trim();
  const budget=parseInt(document.getElementById('ie-bud').value)||0;
  if(!nm){toast('⚠️ 項目名稱不能空白');return;}
  cdel(key+'_總覽');
  try{
    await post({action:'updateCell',sheetName:key+'_總覽',row:rowNum,col:1,value:nm});
    await post({action:'updateCell',sheetName:key+'_總覽',row:rowNum,col:2,value:budget});
    toast('✅ 已更新');
    setTimeout(()=>rProj(key),800);
  }catch(e){toast('⚠️ 更新失敗: '+e.message);}
}

function showAddBudget(key,insertRow){
  const ct=document.getElementById('ct');
  const existing=document.getElementById('add-budget-form');
  if(existing){existing.remove();return;}
  const div=document.createElement('div');
  div.id='add-budget-form';
  div.style.cssText='background:var(--yl);border-radius:var(--r5);padding:14px;margin:10px 0;border:1px solid var(--yd)';
  div.innerHTML=`<div style="font-size:13px;font-weight:700;margin-bottom:10px">新增執行項目</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fp"><label class="fl">項目名稱</label><input class="fi" id="nb-nm" placeholder="如：設計費"></div>
      <div class="fp"><label class="fl">預算上限 NT$</label><input type="number" class="fi" id="nb-bud" placeholder="0"></div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="btn btn-y btn-sm" onclick="submitNewBudget('${key}',${insertRow})">新增</button>
      <button class="btn btn-o btn-sm" onclick="document.getElementById('add-budget-form').remove()">取消</button>
    </div>
    <div style="font-size:11px;color:var(--am);margin-top:8px">⚠️ 注意：「已實際支出」欄位由 Google Sheets SUMIFS 公式自動計算，新增後需稍候片刻才會同步。</div>`;
  // Insert after budget section
  ct.appendChild(div);
  document.getElementById('nb-nm').focus();
}

async function submitNewBudget(key,insertRow){
  const nm=document.getElementById('nb-nm').value.trim();
  const budget=parseInt(document.getElementById('nb-bud').value)||0;
  if(!nm){toast('⚠️ 請填寫項目名稱');return;}
  cdel(key+'_總覽');
  try{
    await post({action:'updateCell',sheetName:key+'_總覽',row:insertRow,col:1,value:nm});
    await post({action:'updateCell',sheetName:key+'_總覽',row:insertRow,col:2,value:budget});
    toast('✅ 已新增（SUMIFS 公式將自動計算支出）');
    setTimeout(()=>rProj(key),800);
  }catch(e){toast('⚠️ 新增失敗: '+e.message);}
}

// ═══ FIXED COSTS ══════════════════════════
async function rFixed(){
  const data=await gs('公司固定成本');
  const rows=data.slice(5).filter(r=>r[0]&&!String(r[0]).includes('📌')&&!String(r[0]).includes('合計')&&!String(r[0]).includes('▌')&&String(r[0]).trim());
  const total=data.slice(5).find(r=>String(r[0]||'').includes('合計'))?.[1]||rows.reduce((s,r)=>s+(parseInt(r[1])||0),0);

  // Break even
  let beRows=[];
  let inBE=false;
  for(const r of data){
    if(String(r[0]||'').includes('損益平衡'))inBE=true;
    if(inBE&&r[0]&&r[1]&&!String(r[0]).includes('損益平衡線')&&!String(r[0]).includes('▌')){
      beRows.push({nm:String(r[0]),val:parseInt(r[1])||0,ds:String(r[2]||'')});
      if(beRows.length>=3)break;
    }
  }

  // Annual costs
  let annRows=[];
  let inAnn=false;
  for(const r of data){
    if(String(r[0]||'').includes('年度')&&String(r[0]||'').includes('費'))inAnn=true;
    if(inAnn&&r[0]&&r[1]&&!String(r[0]).includes('▌')&&!String(r[0]).includes('年度費'))
      annRows.push(r);
  }

  const GROUPS=[
    {nm:'人事薪資',keys:['薪水','勞保','健保','勞退'],color:'#1E40AF'},
    {nm:'工具訂閱',keys:['Google','ChatGPT','Claude','Seameet','Notion'],color:'#7C3AED'},
    {nm:'辦公室',keys:['停車','租金','主機','會計'],color:'#065F46'},
    {nm:'其他',keys:[],color:'#6B7280'},
  ];
  const grouped=GROUPS.map(g=>({...g,items:[]}));
  rows.forEach(r=>{
    const nm=String(r[0]);
    let found=false;
    for(let i=0;i<GROUPS.length-1;i++){
      if(GROUPS[i].keys.some(k=>nm.includes(k))){grouped[i].items.push(r);found=true;break;}
    }
    if(!found)grouped[3].items.push(r);
  });

  let h=`<div class="kpi-row cols3">
    <div class="kc yl"><div class="kl">每月固定合計</div><div class="kv">${$m(total)}</div><div class="ks">每月支出</div></div>
    <div class="kc"><div class="kl">年度預估</div><div class="kv">${$m(total*12)}</div><div class="ks">×12 個月</div></div>
    <div class="kc"><div class="kl">每日成本</div><div class="kv">${$m(Math.round(total/30))}</div><div class="ks">÷30 天</div></div>
  </div>`;

  if(beRows.length>0){
    h+=`<div class="card"><div class="ch"><h3>損益平衡線</h3></div><div class="be-grid">`;
    beRows.forEach(r=>h+=`<div class="be-item"><div class="be-nm">${r.nm}</div><div class="be-v">${$m(r.val)}</div><div class="be-ds">${r.ds}</div></div>`);
    h+=`</div></div>`;
  }

  // 4 類分組 2x2 並排
  const _groups = grouped.filter(g=>g.items.length>0);
  if(_groups.length>0){
    h+=`<div class="grid2">`;
    _groups.forEach(g=>{
      const gTot=g.items.reduce((s,r)=>s+(parseInt(r[1])||0),0);
      const pct=$p(gTot,parseInt(total)||1);
      h+=`<div class="card"><div class="fg-head"><div class="fg-dot" style="background:${g.color}"></div><span class="fg-nm">${g.nm}</span><span class="fg-pct">${pct}% of total</span><span class="fg-total">${$m(gTot)}</span></div>`;
      g.items.forEach(r=>h+=`<div class="fg-item">
        <div style="min-width:0;flex:1">
          <div class="fi-nm">${r[0]}</div>
          ${(r[2]||r[3])?`<div class="fi-ds">${[r[2],r[3]].filter(Boolean).join(' · ')}</div>`:''}
        </div>
        <div class="fi-am">${$m(r[1])}</div>
      </div>`);
      h+=`</div>`;
    });
    h+=`</div>`;
  }

  if(annRows.length>0){
    h+=`<div class="card"><div class="ch"><h3>年度 / 一次性費用</h3></div>
    <div class="tw"><table><thead><tr><th>項目</th><th style="text-align:right">金額</th><th>首次付款</th><th>週期</th><th>付款狀態</th></tr></thead><tbody>`;
    annRows.forEach(r=>h+=`<tr><td style="font-weight:500">${r[0]}</td><td class="num">${$m(r[1])}</td><td class="dt">${$d(r[2])}</td><td style="font-size:12px;color:var(--ink4)">${r[3]||''}</td><td><span class="chip ${$sc(String(r[6]||''))}">${r[6]||'—'}</span></td></tr>`);
    h+=`</tbody></table></div></div>`;
  }
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ ADVANCES ═════════════════════════════

  <div class="tw"><table><thead><tr><th>日期</th><th>來源</th><th>說明</th><th style="text-align:right">金額</th><th>付款方式</th><th>還款日</th><th>狀態</th></tr></thead><tbody>`;
  rows.forEach(r=>{
    const ip=String(r[6]||'').includes('已還清');
    h+=`<tr class="${ip?'':'rds'}"><td class="dt">${$d(r[0])}</td><td style="font-size:12px;color:var(--ink4)">${r[1]||''}</td><td style="font-size:13px">${r[2]||''}</td><td class="num">${$m(r[3])}</td><td style="font-size:12px;color:var(--ink4)">${r[4]||''}</td><td class="dt">${$d(r[5])}</td><td><span class="chip ${ip?'pd':'pn'}">${r[6]||'—'}</span></td></tr>`;
  });
  h+=`</tbody></table></div></div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ REMINDER ═════════════════════════════
async function rRemind(){
  const results=await Promise.all(PKS.map(k=>gs(k+'_付款帳').catch(()=>[])));
  let items=[];
  results.forEach((d,i)=>{
    const k=PKS[i];
    d.slice(5).filter($valid).forEach(r=>{
      if(String(r[7]||'').includes('已付'))return;
      const dl=String(r[10]||'');if(!dl||dl===' '||dl==='undefined')return;
      const dd=$dd(dl);if(dd!==null&&dd<=14)items.push({proj:PROJ[k],vendor:r[2]||'',desc:r[3]||'',amount:parseInt(r[4])||0,dl,dd,st:r[7]});
    });
  });
  items.sort((a,b)=>a.dd-b.dd);
  const od=items.filter(x=>x.dd<0),urg=items.filter(x=>x.dd>=0&&x.dd<=3),soon=items.filter(x=>x.dd>3&&x.dd<=14);
  
  let h='';
  if(od.length)h+=`<div class="al re">🔴 ${od.length} 筆已逾期，請立即處理</div>`;
  if(urg.length)h+=`<div class="al am">⚠️ ${urg.length} 筆 3 天內到期</div>`;
  if(!items.length)h+=`<div class="al gr">✅ 近 14 天內無待付款項目，太棒了！</div>`;
  
  const grp=(title,list,cls)=>{
    if(!list.length)return'';
    let s=`<div class="sl"><h4>${title}</h4><span class="sm">${list.length} 筆 / ${$m(list.reduce((t,x)=>t+x.amount,0))}</span></div>`;
    list.forEach(x=>{
      const dl=x.dd<0?`逾期${Math.abs(x.dd)}天`:x.dd===0?'今天到期':`${x.dd}天後`;
      s+=`<div class="rm-item ${cls}"><span class="rm-proj">${x.proj}</span><div><div class="rm-nm">${x.vendor}</div><div class="rm-ds">${x.desc}</div></div><span class="rm-amt" style="color:${cls==='urg'?'var(--re)':'var(--am)'}">${$m(x.amount)}</span><span class="rm-due">${$d(x.dl)}</span><span><span class="chip ${cls==='urg'?'od':'pn'}">${dl}</span></span></div>`;
    });
    return s;
  };
  h+=grp('🔴 已逾期',od,'urg')+grp('⚠️ 3 天內到期',urg,'urg')+grp('📅 14 天內到期',soon,'soon');

  // === 每月固定應付項目（依類別分組） ===
  // 注意：薪資類別只給 admin 看；同仁模式會自動隱藏整個薪資 block
  const isAdmin = role==='admin';
  const MONTHLY_FIXED_ALL = [
    // 員工薪資（每月 8 號前支付）—— admin only
    {cat:'薪資', name:'老闆薪水（陳昕秀）', amount:55000, payer:'公司', note:'每月8號前'},
    {cat:'薪資', name:'專案PM薪水（Renn 鄭琇仁）', amount:29800, payer:'公司', note:'每月8號前'},
    {cat:'薪資', name:'設計師薪水（兼職）', amount:15000, payer:'公司', note:'每月8號前'},

    // SEO 內容稿費
    {cat:'SEO', name:'Wonda 存在日曆 SEO 稿費', amount:4000, payer:'公司', note:'每月 2 篇 × NT$2,000'},
    {cat:'SEO', name:'Wonda 包裝研究所 SEO 稿費', amount:4000, payer:'公司', note:'每月 2 篇 × NT$2,000'},

    // 社群
    {cat:'社群', name:'Amy 小編 社群發文', amount:20000, payer:'公司', note:'每月固定支付'},

    // 工具訂閱（老闆代墊，信用卡自動扣）
    {cat:'工具', name:'Google Workspace', amount:550, payer:'老闆代墊', note:'信用卡自動扣'},
    {cat:'工具', name:'ChatGPT Plus', amount:690, payer:'老闆代墊', note:'信用卡自動扣'},
    {cat:'工具', name:'Claude Max', amount:600, payer:'老闆代墊', note:'信用卡自動扣'},
    {cat:'工具', name:'Seameet', amount:320, payer:'老闆代墊', note:'信用卡自動扣'},
  ];
  const MONTHLY_FIXED = isAdmin ? MONTHLY_FIXED_ALL : MONTHLY_FIXED_ALL.filter(x=>x.cat!=='薪資');
  const CAT_META = {
    '薪資':{color:'var(--bl)', icon:'👥'},
    'SEO':{color:'#7C3AED', icon:'📝'},
    '社群':{color:'#DC2626', icon:'📱'},
    '工具':{color:'#065F46', icon:'🔧'},
  };
  const monthlyTotal = MONTHLY_FIXED.reduce((s,x)=>s+x.amount,0);
  const now2=new Date();
  const dayOfMonth = now2.getDate();
  
  h+=`<div class="sl" style="margin-top:20px"><h4>📅 每月固定應付清單</h4><span class="sm">${now2.getMonth()+1}月 / 合計 ${$m(monthlyTotal)}</span></div>`;
  
  if(isAdmin && dayOfMonth>=1&&dayOfMonth<=8){
    h+=`<div class="al am">⚠️ 目前是每月 ${dayOfMonth} 號，薪資支付期（1-8號），請確認是否已付款</div>`;
  }

  // 依類別分組顯示（2x2 並排，每張卡內部單欄）
  const cats = ['薪資','SEO','社群','工具'];
  h+=`<div class="grid2">`;
  cats.forEach(cat=>{
    const items = MONTHLY_FIXED.filter(x=>x.cat===cat);
    if(!items.length) return;
    const catTotal = items.reduce((s,x)=>s+x.amount,0);
    const meta = CAT_META[cat];
    h+=`<div class="card">
      <div class="fg-head" style="border-left:3px solid ${meta.color}">
        <span style="font-size:14px">${meta.icon}</span>
        <span class="fg-nm">${cat}</span>
        <span class="fg-pct">${items.length} 項</span>
        <span class="fg-total">${$m(catTotal)}</span>
      </div>`;
    items.forEach(x=>{
      const isPlaceholder = x.amount===0;
      h+=`<div style="padding:9px 14px;border-bottom:1px solid var(--paper2);display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="min-width:0;flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--ink)">${x.name}</div>
          <div style="font-size:11px;color:var(--ink4);margin-top:1px">${x.note}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:${isPlaceholder?'var(--am)':'var(--ink)'}">${isPlaceholder?'待確認':$m(x.amount)}</div>
          <div style="font-size:10px;color:var(--ink4);margin-top:1px">${x.payer}</div>
        </div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  h+=`<div style="font-size:11px;color:var(--ink4);margin-top:8px;padding:8px 12px;background:var(--paper2);border-radius:var(--r5)">
    💡 以上清單為每月提醒用，實際付款後請在對應的付款帳或代墊款頁面新增記錄。標示「待確認」的項目請告知 Claude 補上正確金額。
  </div>`;

  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ VENDORS ══════════════════════════════
async function rVendors(){
  const results=await Promise.all(PKS.map(k=>gs(k+'_付款帳').catch(()=>[])));
  const vm={};
  results.forEach((d,i)=>{
    const k=PKS[i];
    d.slice(5).filter($valid).forEach(r=>{
      const nm=String(r[2]||'').trim();if(!nm)return;
      if(!vm[nm])vm[nm]={name:nm,total:0,paid:0,pend:0,projs:new Set(),cnt:0};
      const amt=parseInt(r[4])||0,s=String(r[7]||'');
      vm[nm].total+=amt;
      if(s.includes('已付'))vm[nm].paid+=amt;
      else if(s.includes('待付')&&!s.includes('報價'))vm[nm].pend+=amt;
      vm[nm].projs.add(PROJ[k]);vm[nm].cnt++;
    });
  });
  const vendors=Object.values(vm).sort((a,b)=>b.total-a.total);
  const gTot=vendors.reduce((s,v)=>s+v.total,0);
  
  let h=`<div class="kpi-row cols3">
    <div class="kc yl"><div class="kl">廠商總數</div><div class="kv">${vendors.length}</div></div>
    <div class="kc gr"><div class="kl">歷史總支出</div><div class="kv">${$m(gTot)}</div></div>
    <div class="kc"><div class="kl">平均每筆</div><div class="kv">${$m(Math.round(gTot/Math.max(1,vendors.reduce((s,v)=>s+v.cnt,0))))}</div></div>
  </div>
  <div class="card"><div class="ch"><h3>廠商清單</h3><span class="meta">${vendors.length} 個廠商</span></div>
  <div class="vd-row hd"><span>廠商名稱</span><span>專案</span><span style="text-align:right">歷史總支出</span><span style="text-align:right">已付款</span><span style="text-align:right">待付款</span></div>`;
  vendors.forEach(v=>{
    h+=`<div class="vd-row"><span class="vd-nm">${v.name}</span><div class="vd-tags">${[...v.projs].map(p=>`<span class="vd-tag">${p.substring(0,4)}</span>`).join('')}</div><span style="font-variant-numeric:tabular-nums;font-weight:700;text-align:right">${$m(v.total)}</span><span style="font-variant-numeric:tabular-nums;text-align:right;color:var(--gr)">${$m(v.paid)}</span><span style="font-variant-numeric:tabular-nums;text-align:right;color:${v.pend?'var(--am)':'var(--ink4)'}">${v.pend?$m(v.pend):'—'}</span></div>`;
  });
  h+=`</div>`;
  document.getElementById('ct').innerHTML='<div class="ct-inner">'+h+'</div>';
}

// ═══ FILTERS / STATUS ═════════════════════
function filtMonth(months,el){
  document.querySelectorAll('.fr .fc').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  const cutoff = months===0?null:new Date(Date.now()-months*30*864e5);
  document.querySelectorAll('#pt tbody tr').forEach(tr=>{
    if(!cutoff){tr.style.display='';return;}
    const dt=tr.querySelector('td')?.textContent?.replace(/\//g,'-');
    if(!dt||dt.trim()===''||dt.trim()==='-'){tr.style.display='';return;}
    tr.style.display = new Date(dt)>=cutoff?'':'none';
  });
}

function filt(type,el){
  document.querySelectorAll('.fr .fc').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('#pt tbody tr').forEach(tr=>{
    if(type==='all'){tr.style.display='';return;}
    if(type==='od'){tr.style.display=tr.dataset.od==='true'?'':'none';return;}
    tr.style.display=tr.dataset.sc===type?'':'none';
  });
}

async function upSt(sel,row,sheet){
  const val=sel.value;sel.className='ss '+$sc(val);
  cdel(sheet);
  try{await post({action:'updateCell',sheetName:sheet,row,col:8,value:val});toast('✅ 已更新');}
  catch(e){toast('⚠️ 更新失敗');}
}

// ═══ MODALS ═══════════════════════════════
function openModal(type){
  if(type==='pay'){
    document.getElementById('p0').value=new Date().toISOString().split('T')[0];
    ['p1','p2','p3','p4','p5','p6','p7','p8','p9','p10','p11'].forEach(id=>{const el=document.getElementById(id);if(el.tagName!=='SELECT')el.value='';});
    document.getElementById('p7').value='⏳待付';
  } else {
    document.getElementById('a0').value=new Date().toISOString().split('T')[0];
    ['a1','a2','a3','a5','a7'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('a6').value='⏳待還清';
  }
  document.getElementById('ov-'+type).classList.add('on');
}
function closeModal(type){document.getElementById('ov-'+type).classList.remove('on');}

async function submitPay(){
  const sheet=PKS.includes(cur)?cur+'_付款帳':null;
  if(!sheet){toast('⚠️ 請先選擇一個專案');return;}
  const row=[document.getElementById('p0').value,document.getElementById('p1').value,document.getElementById('p2').value,document.getElementById('p3').value,parseInt(document.getElementById('p4').value)||0,document.getElementById('p5').value,document.getElementById('p6').value,document.getElementById('p7').value,document.getElementById('p9').value,document.getElementById('p8').value,document.getElementById('p10').value,document.getElementById('p11').value];
  cdel(sheet);
  try{await post({sheetName:sheet,row});closeModal('pay');toast('✅ 記錄已新增');setTimeout(render,800);}
  catch(e){toast('⚠️ 新增失敗: '+e.message);}
}

async function submitAdvance(){
  const row=[document.getElementById('a0').value,document.getElementById('a1').value,document.getElementById('a2').value,parseInt(document.getElementById('a3').value)||0,document.getElementById('a4').value,document.getElementById('a5').value,document.getElementById('a6').value,document.getElementById('a7').value];
  cdel('老闆代墊款彙整');
  try{await post({sheetName:'老闆代墊款彙整',row});closeModal('advances');toast('✅ 代墊款記錄已新增');setTimeout(render,800);}
  catch(e){toast('⚠️ 新增失敗: '+e.message);}
}

// ═══ CSV ══════════════════════════════════
function exportCSV(){
  if(!window._curRows)return;
  const H=['日期','類別','廠商','說明','金額','付款方式','付款人','狀態','備註','報價單','截止日','轉帳證明'];
  const csv=[H.join(','),..._curRows.map(r=>H.map((_,i)=>`"${String(r[i]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`${_curKey}_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
  a.click();toast('✅ CSV 匯出完成');
}

// ═══ TOAST ════════════════════════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2800);}
